<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Study Tracker | Pro Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS Variables / Themes */
        :root {
            --primary: #3B82F6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #050505;
            --navbar-bg: rgba(5, 5, 5, 0.65);
            --card-bg: rgba(20, 20, 20, 0.7);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --input-bg: rgba(0,0,0,0.2);
            --btn-text: #050505;
            --btn-bg: #FFFFFF;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --chart-grid: rgba(255, 255, 255, 0.06);
            --chart-text: #71717A;
            --chart-tooltip-bg: #18181B;
            --chart-tooltip-border: rgba(255, 255, 255, 0.1);
            --chart-point-border: #0a0a0a;
        }

        [data-theme="light"] {
            --primary: #006FEE;
            --primary-glow: rgba(0, 111, 238, 0.3);
            --bg-dark: #F4F7FF;
            --navbar-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #FFFFFF;
            --text-main: #001C39;
            --text-dim: #64748B;
            --border: rgba(0, 28, 57, 0.08);
            --glass-border: 1px solid rgba(0, 28, 57, 0.08);
            --input-bg: #F1F5F9;
            --btn-text: #FFFFFF;
            --btn-bg: #001C39;
            --gradient: linear-gradient(135deg, #006FEE 0%, #7828C8 100%);
            --card-shadow: 0 12px 40px rgba(0, 30, 80, 0.06);
            --chart-grid: rgba(0, 28, 57, 0.06);
            --chart-text: #64748B;
            --chart-tooltip-bg: #FFFFFF;
            --chart-tooltip-border: rgba(0, 28, 57, 0.12);
            --chart-point-border: #FFFFFF;
        }

        [data-theme="glass"] {
            --primary: #F43F5E;
            --primary-glow: rgba(244, 63, 94, 0.5);
            --bg-dark: #0f172a;
            --navbar-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #e2e8f0;
            --border: rgba(255, 255, 255, 0.2);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --input-bg: rgba(255, 255, 255, 0.05);
            --btn-text: #FFFFFF;
            --btn-bg: rgba(255, 255, 255, 0.2);
            --gradient: linear-gradient(135deg, #F43F5E 0%, #8B5CF6 100%);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --chart-grid: rgba(255, 255, 255, 0.08);
            --chart-text: #CBD5E1;
            --chart-tooltip-bg: rgba(15, 23, 42, 0.95);
            --chart-tooltip-border: rgba(255, 255, 255, 0.15);
            --chart-point-border: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none; opacity: 0.05;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            mix-blend-mode: overlay;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; display: block; position: relative; transition: background-color 0.5s ease; }

        /* Dynamic Background */
        .live-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #050505, #120917, #0d0b14, #08111e); background-size: 400% 400%; animation: gradientBG 20s ease infinite; transition: background 0.5s; }
        [data-theme="glass"] .live-bg { background: linear-gradient(135deg, #1e3a8a, #831843, #581c87); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        [data-theme="light"] .live-bg { background: linear-gradient(135deg, #F8FAFC, #E0E7FF, #F3E8FF, #F8FAFC); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .blob { position: absolute; width: 800px; height: 800px; filter: blur(120px); border-radius: 50%; animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1); opacity: 0.6; }
        .blob-1 { top: -200px; right: -200px; background: rgba(59, 130, 246, 0.15); }
        .blob-2 { bottom: -300px; left: -300px; background: rgba(139, 92, 246, 0.15); }
        .blob-3 { top: 40%; left: 30%; width: 400px; height: 400px; background: rgba(0, 212, 255, 0.1); animation-duration: 20s; }
        @keyframes move { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(150px, -50px) scale(1.1) rotate(180deg); } 100% { transform: translate(-50px, 150px) scale(1) rotate(360deg); } }

        /* Subject Floating Backgrounds */
        .floating-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; opacity: 0.35; }
        .float-icon { position: absolute; font-size: 7rem; animation: floatUp linear infinite; color: var(--text-main); text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); filter: drop-shadow(0 0 8px var(--primary)); }
        .float-icon-0 { left: 5%; bottom: -20%; animation-duration: 25s; animation-delay: 0s; }
        .float-icon-1 { left: 15%; bottom: -20%; animation-duration: 32s; animation-delay: 12s; }
        .float-icon-2 { left: 25%; bottom: -20%; animation-duration: 20s; animation-delay: 3s; }
        .float-icon-3 { left: 35%; bottom: -20%; animation-duration: 38s; animation-delay: 8s; }
        .float-icon-4 { left: 45%; bottom: -20%; animation-duration: 28s; animation-delay: 1s; }
        .float-icon-5 { left: 55%; bottom: -20%; animation-duration: 24s; animation-delay: 15s; }
        .float-icon-6 { left: 65%; bottom: -20%; animation-duration: 30s; animation-delay: 5s; }
        .float-icon-7 { left: 75%; bottom: -20%; animation-duration: 22s; animation-delay: 2s; }
        .float-icon-8 { left: 85%; bottom: -20%; animation-duration: 35s; animation-delay: 10s; }
        .float-icon-9 { left: 95%; bottom: -20%; animation-duration: 26s; animation-delay: 6s; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Navbar - Top Ribbon Style */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: var(--navbar-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            display: flex; align-items: center; justify-content: center;
            padding: 0 2rem; z-index: 2000; border-bottom: var(--glass-border); transition: background 0.5s;
        }

        .nav-container { width: 100%; max-width: 1400px; display: flex; align-items: center; justify-content: space-between; }

        .nav-brand { display: flex; align-items: center; gap: 15px; color: var(--text-main); text-decoration: none; }
        .nav-logo { 
            width: 44px; height: 44px; background: var(--gradient); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            font-size: 1.2rem; box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
        }
        .nav-title { font-family: 'Outfit'; font-weight: 700; letter-spacing: 1px; font-size: 1.4rem; color: var(--text-main); }

        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; padding: 8px 16px; 
            border-radius: 8px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; cursor: pointer;
        }
        .nav-link.active { color: var(--text-main); background: var(--input-bg); border: var(--glass-border); }
        .nav-link:hover { color: var(--text-main); background: var(--border); }

        .nav-btn-danger { color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-weight: 600; margin-left: 10px; transition: 0.3s; background: rgba(239, 68, 68, 0.05); }
        .nav-btn-danger:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); }

        .main-content { width: 100%; padding: 120px 0 5rem 0; display: flex; flex-direction: column; align-items: center; }

        .dashboard-wrapper {
            width: 95%; max-width: 1400px; margin: 0 auto;
            position: relative; border-radius: 24px; padding: 3rem 0;
        }

        .greeting { margin-bottom: 3rem; margin-top: 0; text-align: center; }
        .greeting h1 { 
            font-family: 'Outfit'; font-size: 3.5rem; font-weight: 700; 
            color: var(--text-main);
            line-height: 1.2; letter-spacing: -1px;
        }
        .greeting p { color: var(--text-dim); font-size: 1.2rem; font-weight: 400; margin-top: 10px; }

        .countdown-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; padding: 2rem; border: var(--glass-border);
            display: flex; justify-content: space-around; margin-bottom: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); color: var(--text-main);
            transition: all 0.5s;
        }

        .cd-val { font-family: 'Outfit'; font-size: 3.5rem; font-weight: 700; line-height: 1; letter-spacing: -1px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cd-lbl { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; color: var(--text-dim); }

        .hero-card {
            background: var(--card-bg); border-radius: 24px; padding: 3rem;
            border: var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow); margin-bottom: 2.5rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 2rem;
            position: relative; overflow: hidden; z-index: 10;
        }
        .hero-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 50%);
            animation: heroGlow 8s infinite alternate; z-index: -1; opacity: 0.2; pointer-events: none;
        }
        @keyframes heroGlow { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }
        .hero-title { font-family: 'Outfit'; font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 10px; color: var(--text-main); letter-spacing: -1px; }
        .hero-subtitle { color: var(--text-dim); font-size: 1.2rem; font-weight: 500; }
        .hero-cd-wrapper { background: var(--input-bg); padding: 1.5rem 2.5rem; border-radius: 20px; border: var(--glass-border); display: flex; gap: 2rem; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .dash-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 2.2rem;
            border: var(--glass-border); height: 100%; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--card-shadow); transition: transform 0.3s, border-color 0.3s, background 0.5s, box-shadow 0.5s;
            position: relative; z-index: 10;
        }
        .card:hover { 
            border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); 
            transform: translateY(-8px) scale(1.01); z-index: 20;
        }
        [data-theme="light"] .card:hover { box-shadow: 0 20px 40px rgba(0, 30, 80, 0.15); }
        [data-theme="glass"] .card:hover { box-shadow: 0 20px 40px rgba(31, 38, 135, 0.4); }
        .card-title { font-family: 'Outfit'; font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        .tracker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 25px; }
        .hour-btn {
            aspect-ratio: 1; background: var(--input-bg); border: var(--glass-border);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--text-dim); font-size: 1.8rem; font-family: 'Outfit';
        }
        .hour-btn:hover { background: var(--border); border-color: var(--text-dim); }
        .hour-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); animation: pulseActive 2s infinite; }
        @keyframes pulseActive { 0% { box-shadow: 0 0 10px var(--primary-glow); transform: scale(1); } 50% { box-shadow: 0 0 25px var(--primary-glow); transform: scale(1.05); } 100% { box-shadow: 0 0 10px var(--primary-glow); transform: scale(1); } }

        .stat-card { background: var(--input-bg); padding: 1.5rem; border-radius: 16px; border: var(--glass-border); margin-bottom: 1.2rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stat-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); border-color: var(--primary); }
        [data-theme="light"] .stat-card:hover { box-shadow: 0 15px 30px rgba(0, 30, 80, 0.1); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--text-main); font-family: 'Outfit'; }
        .stat-lbl { font-size: 0.9rem; color: var(--text-dim); margin-top: 5px; }

        input, select { background: var(--input-bg); border: var(--glass-border); color: var(--text-main); padding: 14px 16px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); background: var(--border); box-shadow: 0 0 0 3px var(--primary-glow); }
        button.btn-primary { background: var(--btn-bg); border: var(--glass-border); color: var(--btn-text); padding: 14px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem; width: 100%; transition: 0.3s; }
        button.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); opacity: 0.9; }

        .marks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; position: relative; z-index: 10; }
        .subject-section { margin-bottom: 3rem; }
        .subject-title { font-family: 'Outfit'; font-size: 1.8rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .chart-box { height: 200px; margin-top: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }

        .theme-select { width: auto; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; margin-left: 10px; }

        /* ============ RESPONSIVE BREAKPOINTS ============ */

        /* Large Tablets / Small Laptops (max-width: 1200px) */
        @media (max-width: 1200px) {
            .dashboard-wrapper { width: 96%; padding: 2rem 0; }
            .hero-title { font-size: 3rem; }
            .hero-cd-wrapper { padding: 1.2rem 2rem; gap: 1.5rem; }
            .cd-val { font-size: 3rem; }
            .subject-bottom-grid { grid-template-columns: 1fr 280px !important; }
        }

        /* Tablets / iPad (max-width: 1024px) */
        @media (max-width: 1024px) {
            .dash-grid { grid-template-columns: 1fr 1fr !important; }
            .hero-card { padding: 2.5rem; }
            .hero-title { font-size: 2.8rem; }
            .greeting h1 { font-size: 2.8rem; }
            .subject-bottom-grid { grid-template-columns: 1fr !important; }
            .marks-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }

        /* Tablet Portrait / Large Phones (max-width: 768px) */
        @media (max-width: 768px) {
            .navbar { height: auto; padding: 0.8rem 1rem; }
            .nav-container { flex-direction: column; gap: 0.8rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 8px; }
            .nav-link { padding: 6px 10px; font-size: 0.85rem; }
            .nav-btn-danger { padding: 6px 12px; font-size: 0.8rem; margin-left: 0; }
            .theme-select { margin-left: 0; }
            .main-content { padding-top: 160px; padding-left: 0.5rem; padding-right: 0.5rem; }
            .dashboard-wrapper { width: 100%; padding: 1.5rem 0; }

            .hero-card { padding: 2rem; justify-content: center; text-align: center; flex-direction: column; }
            .hero-title { font-size: 2.5rem; }
            .hero-subtitle { font-size: 1rem; }
            .hero-cd-wrapper { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; padding: 1.2rem; }
            .cd-val { font-size: 2.2rem; }
            .cd-lbl { font-size: 0.7rem; letter-spacing: 1.5px; }

            .greeting h1 { font-size: 2.2rem; }
            .greeting p { font-size: 1rem; }

            .dash-grid { grid-template-columns: 1fr !important; gap: 1rem; }
            .card { padding: 1.5rem; border-radius: 16px; min-width: auto !important; width: 100%; }
            .card:hover { transform: none; }
            .card-title { font-size: 1.1rem; }

            .tracker-grid { gap: 12px; margin-top: 15px; grid-template-columns: repeat(5, 1fr); }
            .hour-btn { border-radius: 12px; font-size: 1.2rem; }

            .stat-card { padding: 1rem; margin-bottom: 0.8rem; }
            .stat-card:hover { transform: none; }
            .stat-val { font-size: 1.6rem; }

            .marks-grid { grid-template-columns: 1fr !important; gap: 1rem; }
            .chart-box { height: 180px; }
            .chart-container { height: 250px !important; }

            .floating-bg { opacity: 0.15; }
            .float-icon { font-size: 4rem; }
        }

        /* Mobile Phones (max-width: 480px) */
        @media (max-width: 480px) {
            .main-content { padding-top: 170px; }
            .nav-logo { width: 36px; height: 36px; font-size: 1rem; border-radius: 10px; }
            .nav-title { font-size: 1.1rem; }
            .nav-link { padding: 5px 8px; font-size: 0.8rem; }

            .hero-card { padding: 1.5rem; border-radius: 16px; gap: 1.2rem; }
            .hero-title { font-size: 1.8rem; letter-spacing: -0.5px; }
            .hero-subtitle { font-size: 0.85rem; }
            .hero-cd-wrapper { padding: 1rem; gap: 0.8rem; border-radius: 14px; }
            .cd-val { font-size: 1.8rem; }

            .greeting h1 { font-size: 1.8rem; letter-spacing: 0; }
            .greeting p { font-size: 0.9rem; }
            .greeting { margin-bottom: 2rem; }

            .card { padding: 1.2rem; border-radius: 14px; }
            .card-title { font-size: 1rem; margin-bottom: 1rem; }

            .tracker-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px; }
            .hour-btn { font-size: 1rem; border-radius: 10px; }

            .stat-card { padding: 0.8rem; border-radius: 12px; }
            .stat-val { font-size: 1.4rem; }
            .stat-lbl { font-size: 0.8rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 0.8rem; }

            .chart-box { height: 160px; }
            .chart-container { height: 220px !important; }

            input, select { padding: 12px 14px; font-size: 0.9rem; border-radius: 10px; }
            button.btn-primary { padding: 12px 20px; font-size: 0.9rem; border-radius: 10px; }

            .floating-bg { opacity: 0.1; }
            .float-icon { font-size: 3rem; }
            .blob { width: 400px; height: 400px; filter: blur(80px); }
        }

        /* Small Mobile Phones (max-width: 360px) */
        @media (max-width: 360px) {
            .main-content { padding-top: 180px; padding-left: 0.3rem; padding-right: 0.3rem; }
            .navbar { padding: 0.6rem 0.8rem; }
            .nav-logo { width: 32px; height: 32px; font-size: 0.9rem; }
            .nav-title { font-size: 1rem; }

            .hero-title { font-size: 1.5rem; }
            .cd-val { font-size: 1.5rem; }
            .cd-lbl { font-size: 0.6rem; }
            .hero-cd-wrapper { padding: 0.8rem; gap: 0.6rem; }

            .greeting h1 { font-size: 1.5rem; }
            .greeting p { font-size: 0.8rem; }

            .card { padding: 1rem; border-radius: 12px; }
            .tracker-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .hour-btn { font-size: 0.9rem; border-radius: 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 0.6rem; }

            .chart-box { height: 140px; }
            .chart-container { height: 200px !important; }
        }

        /* Touch device optimization - disable hover effects that cause sticky states */
        @media (hover: none) and (pointer: coarse) {
            .card:hover { transform: none !important; box-shadow: var(--card-shadow) !important; }
            .stat-card:hover { transform: none !important; }
            .hour-btn:hover { background: var(--input-bg); border-color: transparent; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CLOUD SYNC CONFIG (Supabase) ---
        const SB_URL = "https://gemcglmmjbicgbvdhdee.supabase.co";

                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.disconnect();
                    }
                }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div ref={ref} style={{
                    opacity: isVisible ? 1 : 0,
                    transform: isVisible ? 'translateY(0)' : `translateY(${y}px)`,
                    transition: `all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${delay}s`,

                                {subjectData.length === 0 && <div style={{ color: 'var(--text-dim)', textAlign: 'center', marginTop: '20px' }}>No records yet</div>}
                            </div>
                        </Reveal>
                    </div>

                    <div style={{ marginTop: '3rem', position: 'relative', zIndex: 10 }}>
                        <div className="subject-bottom-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: '2rem' }}>
                            <Reveal delay={0.2}>
                                <div className="subject-section">
                                    <div className="marks-grid" style={{ gridTemplateColumns: 'repeat(2, 1fr)' }}>
                                        <MarkChart title="MCQ" data={subjectData} field="mcq" color="#3B82F6" />
                                        <MarkChart title="STR" data={subjectData} field="str" color="#8B5CF6" />
                                        <MarkChart title="ESY" data={subjectData} field="esy" color="#F43F5E" />
                                        <MarkChart title="Total" data={subjectData} field="total" color="#10B981" />
                                    </div>
                                </div>
                            </Reveal>
                            <Reveal delay={0.3}>
                                <SubjectSummaryCard subject={subject} data={subjectData} />
                            </Reveal>
                        </div>
                    </div>
                </div>
            );
        };

        const MarkChart = ({ title, data, field, color }) => {
            const chartRef = useRef(null); const chartInst = useRef(null);

            const buildChart = () => {
                if (!chartRef.current) return; if (chartInst.current) chartInst.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-10);
                
                const rootStyles = getComputedStyle(document.documentElement);
                const gridColor = rootStyles.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.06)';
                const textColor = rootStyles.getPropertyValue('--chart-text').trim() || '#71717A';
                const tooltipBg = rootStyles.getPropertyValue('--chart-tooltip-bg').trim() || '#18181B';
                const tooltipBorder = rootStyles.getPropertyValue('--chart-tooltip-border').trim() || 'rgba(255,255,255,0.1)';
                const pointBorder = rootStyles.getPropertyValue('--chart-point-border').trim() || '#0a0a0a';

                // Gradient fill
                const gradient = ctx.createLinearGradient(0, 0, 0, chartRef.current.height);
                gradient.addColorStop(0, color + '40');
                gradient.addColorStop(0.5, color + '15');
                gradient.addColorStop(1, color + '00');

                // Paper number labels (P1, P2, P3...)
                const paperLabels = sorted.map((m, i) => 'P' + (i + 1));
                // Store dates for tooltip
                const paperDates = sorted.map(m => m.date);

                chartInst.current = new Chart(ctx, {
                    type: 'line', data: {
                        labels: paperLabels,
                        datasets: [{
                            data: sorted.map(m => m[field]),
                            borderColor: color,
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.45,
                            borderWidth: 2.5,
                            pointRadius: 4,
                            pointHoverRadius: 7,
                            pointBackgroundColor: color,
                            pointBorderColor: pointBorder,
                            pointBorderWidth: 2,
                            pointHoverBorderColor: '#fff',
                            pointHoverBorderWidth: 3
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: tooltipBg,
                                titleColor: '#FFFFFF',
                                bodyColor: '#A1A1AA',
                                borderColor: tooltipBorder,
                                borderWidth: 1,
                                padding: 12,
                                cornerRadius: 12,
                                displayColors: false,
                                titleFont: { family: 'Outfit', size: 13, weight: '600' },
                                bodyFont: { family: 'Inter', size: 12 },
                                callbacks: {
                                    title: (items) => {
                                        const idx = items[0].dataIndex;
                                        return 'Paper ' + (idx + 1) + '  •  ' + paperDates[idx];
                                    },
                                    label: (item) => title + ': ' + item.raw + ' marks'
                                }
                            }
                        },
                        scales: { 
                            y: { beginAtZero: true, grid: { color: gridColor, drawBorder: false }, ticks: { color: textColor, font: { size: 11 }, padding: 8 } },
                            x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10, weight: '600' }, maxRotation: 0 } }
                        }
                    }
                });
            };

            useEffect(() => { buildChart(); }, [data]);

            // Re-render on theme change
            useEffect(() => {
                const observer = new MutationObserver(() => buildChart());
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, [data]);

            const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-10);
            const latest = sorted.length > 0 ? sorted[sorted.length - 1][field] : 0;
            const prev = sorted.length > 1 ? sorted[sorted.length - 2][field] : latest;
            const change = latest - prev;

            return (
                <div className="card" style={{ padding: '1.5rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.8rem' }}>
                        <div style={{ fontWeight: '700', fontSize: '0.85rem', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px' }}>{title}</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                            <span style={{ fontSize: '1.3rem', fontWeight: '800', fontFamily: 'Outfit', color: 'var(--text-main)' }}>{latest}</span>
                            {sorted.length > 1 && (
                                <span style={{ fontSize: '0.75rem', fontWeight: '700', color: change >= 0 ? '#10B981' : '#ef4444', background: change >= 0 ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)', padding: '2px 8px', borderRadius: '6px' }}>
                                    {change >= 0 ? '▲' : '▼'} {Math.abs(change)}
                                </span>
                            )}
                        </div>
                    </div>
                    <div className="chart-box"><canvas ref={chartRef}></canvas></div>
                </div>
            );
        };

        /* ============ Subject Summary Card (Doughnut + Stats) ============ */
        const SubjectSummaryCard = ({ subject, data }) => {
            const chartRef = useRef(null); const chartInst = useRef(null);
            const subjectIcons = { 'ICT': '💻', 'ET': '⚙️', 'SFT': '🧬' };
            const subjectNames = { 'ICT': 'Information & Communication Technology', 'ET': 'Engineering Technology', 'SFT': 'Science for Technology' };

            const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
            const totalPapers = sorted.length;
            const avgTotal = totalPapers > 0 ? (sorted.reduce((a, c) => a + c.total, 0) / totalPapers) : 0;
            const bestScore = totalPapers > 0 ? Math.max(...sorted.map(m => m.total)) : 0;
            const latestScore = totalPapers > 0 ? sorted[sorted.length - 1].total : 0;
            const prevScore = totalPapers > 1 ? sorted[sorted.length - 2].total : latestScore;
            const changePercent = prevScore > 0 ? (((latestScore - prevScore) / prevScore) * 100).toFixed(1) : '0.0';
            const performancePercent = Math.min(Math.round((avgTotal / 100) * 100), 100);
            const remaining = 100 - performancePercent;

            const buildDonut = () => {
                if (!chartRef.current) return; if (chartInst.current) chartInst.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                
                const rootStyles = getComputedStyle(document.documentElement);
                const primaryColor = rootStyles.getPropertyValue('--primary').trim() || '#3B82F6';
                const bgColor = rootStyles.getPropertyValue('--input-bg').trim() || 'rgba(0,0,0,0.2)';

                // Multi-color gradient segments
                const colors = [primaryColor, '#8B5CF6', '#F43F5E', '#F59E0B'];
                const segSize = performancePercent / colors.length;

                chartInst.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Performance', 'Remaining'],
                        datasets: [{
                            data: [performancePercent, remaining],
                            backgroundColor: [
                                (ctx2) => {
                                    const chart = ctx2.chart;
                                    const { ctx: c, chartArea } = chart;
                                    if (!chartArea) return primaryColor;
                                    const grad = c.createConicGradient(Math.PI * 1.5, chartArea.width / 2 + chartArea.left, chartArea.height / 2 + chartArea.top);
                                    grad.addColorStop(0, '#F43F5E');
                                    grad.addColorStop(0.25, '#F59E0B');
                                    grad.addColorStop(0.5, '#8B5CF6');
                                    grad.addColorStop(0.75, primaryColor);
                                    grad.addColorStop(1, '#10B981');
                                    return grad;
                                },
                                bgColor
                            ],
                            borderWidth: 0,
                            cutout: '78%',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: true,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        animation: { animateRotate: true, duration: 1500, easing: 'easeOutQuart' }
                    }
                });
            };

            useEffect(() => { buildDonut(); }, [data]);
            useEffect(() => {
                const observer = new MutationObserver(() => buildDonut());
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, [data]);

            const statRows = [
                { label: 'Total Papers', value: totalPapers, isNumber: true },
                { label: 'Average', value: avgTotal.toFixed(1), isNumber: true },
                { label: 'Best Score', value: bestScore, isNumber: true },
                { label: '% Change', value: (changePercent >= 0 ? '+' : '') + changePercent + '%', color: changePercent >= 0 ? '#10B981' : '#ef4444' }
            ];

            return (
                <div className="card" style={{ padding: '2rem', display: 'flex', flexDirection: 'column', height: '100%' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '1.5rem' }}>
                        <div style={{ width: '42px', height: '42px', background: 'var(--gradient)', borderRadius: '12px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.3rem' }}>{subjectIcons[subject] || '📊'}</div>
                        <div>
                            <div style={{ fontFamily: 'Outfit', fontWeight: '700', fontSize: '1.1rem' }}>{subject}</div>
                            <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{subjectNames[subject] || subject}</div>
                        </div>
                    </div>

                    {/* Big Score */}
                    <div style={{ textAlign: 'center', marginBottom: '0.5rem' }}>
                        <div style={{ fontSize: '0.75rem', color: 'var(--text-dim)', fontWeight: '500', letterSpacing: '1px', textTransform: 'uppercase' }}>Average Score</div>
                        <div style={{ fontSize: '2.8rem', fontWeight: '800', fontFamily: 'Outfit', background: 'var(--gradient)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', lineHeight: '1.2' }}>{avgTotal.toFixed(1)}</div>
                    </div>

                    {/* Donut Chart */}
                    <div style={{ position: 'relative', width: '180px', height: '180px', margin: '0.5rem auto 1.5rem' }}>
                        <canvas ref={chartRef}></canvas>
                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', textAlign: 'center' }}>
                            <div style={{ fontSize: '2rem', fontWeight: '800', fontFamily: 'Outfit', color: 'var(--text-main)', lineHeight: 1 }}>{performancePercent}<span style={{ fontSize: '1rem' }}>%</span></div>
                            <div style={{ fontSize: '0.65rem', color: 'var(--text-dim)', fontWeight: '600', letterSpacing: '0.5px', marginTop: '2px' }}>Performance</div>
                        </div>
                    </div>

                    {/* Stats Table */}
                    <div style={{ borderTop: '1px solid var(--border)', paddingTop: '1rem', flex: 1 }}>
                        {statRows.map((row, i) => (
                            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: i < statRows.length - 1 ? '1px solid var(--border)' : 'none' }}>
                                <span style={{ fontSize: '0.85rem', color: 'var(--text-dim)', fontWeight: '500' }}>{row.label}</span>
                                <span style={{ fontSize: '0.95rem', fontWeight: '700', fontFamily: 'Outfit', color: row.color || 'var(--text-main)' }}>{row.value}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const StatBox = ({ val, lbl, sub, color }) => (
            <div className="card" style={{ padding: '1.5rem', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', borderColor: color ? color + '44' : 'var(--glass-border)' }}>
                <div style={{ fontSize: '2.2rem', fontWeight: '800', color: color || 'var(--text-main)', fontFamily: 'Outfit' }}>{val}</div>
                <div style={{ fontSize: '0.9rem', fontWeight: '600', marginTop: '5px' }}>{lbl}</div>
                <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{sub}</div>
            </div>
        );

        const CDUnit = ({ v, l }) => (
            <div style={{ textAlign: 'center' }}>
                <div className="cd-val">{String(v).padStart(2, '0')}</div>
                <div className="cd-lbl" style={{ fontSize: '0.7rem', opacity: 0.8 }}>{l}</div>
            </div>
        );

        const HistoryChart = ({ history }) => {
            const chartRef = useRef(null); const chartInst = useRef(null);

            const buildChart = () => {
                if (!chartRef.current) return; if (chartInst.current) chartInst.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                const last30 = [...Array(30)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - (29 - i));
                    return d.toISOString().split('T')[0];
                });
                const data = last30.map(d => history[d] ? history[d].filter(Boolean).length : 0);
                
                const rootStyles = getComputedStyle(document.documentElement);
                const gridColor = rootStyles.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.06)';
                const textColor = rootStyles.getPropertyValue('--chart-text').trim() || '#71717A';
                const tooltipBg = rootStyles.getPropertyValue('--chart-tooltip-bg').trim() || '#18181B';
                const tooltipBorder = rootStyles.getPropertyValue('--chart-tooltip-border').trim() || 'rgba(255,255,255,0.1)';
                const pointBorder = rootStyles.getPropertyValue('--chart-point-border').trim() || '#0a0a0a';
                const primaryColor = rootStyles.getPropertyValue('--primary').trim() || '#3B82F6';

                // Main gradient fill
                const mainGradient = ctx.createLinearGradient(0, 0, 0, chartRef.current.height);
                mainGradient.addColorStop(0, primaryColor + '35');
                mainGradient.addColorStop(0.4, primaryColor + '18');
                mainGradient.addColorStop(1, primaryColor + '00');

                // Secondary accent line (average reference)
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                const avgLine = new Array(30).fill(avg);

                chartInst.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: last30.map((d, i) => {
                            const day = d.split('-')[2];
                            // Show every 3rd label to avoid clutter
                            return (i % 3 === 0) ? day : '';
                        }),
                        datasets: [
                            {
                                label: 'Study Hours',
                                data,
                                borderColor: primaryColor,
                                backgroundColor: mainGradient,
                                fill: true,
                                tension: 0.45,
                                borderWidth: 2.5,
                                pointRadius: data.map((v, i) => (i === data.length - 1) ? 6 : 3),
                                pointHoverRadius: 8,
                                pointBackgroundColor: data.map((v, i) => (i === data.length - 1) ? '#fff' : primaryColor),
                                pointBorderColor: data.map((v, i) => (i === data.length - 1) ? primaryColor : pointBorder),
                                pointBorderWidth: data.map((v, i) => (i === data.length - 1) ? 3 : 2),
                                pointHoverBorderColor: '#fff',
                                pointHoverBorderWidth: 3
                            },
                            {
                                label: 'Average',
                                data: avgLine,
                                borderColor: '#F43F5E88',
                                borderDash: [6, 4],
                                borderWidth: 1.5,
                                pointRadius: 0,
                                pointHoverRadius: 0,
                                fill: false,
                                tension: 0
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: tooltipBg,
                                titleColor: '#FFFFFF',
                                bodyColor: '#A1A1AA',
                                borderColor: tooltipBorder,
                                borderWidth: 1,
                                padding: 14,
                                cornerRadius: 12,
                                displayColors: true,
                                usePointStyle: true,
                                titleFont: { family: 'Outfit', size: 13, weight: '600' },
                                bodyFont: { family: 'Inter', size: 12 },
                                callbacks: {
                                    title: (items) => {
                                        const idx = items[0].dataIndex;
                                        const dateStr = last30[idx];
                                        const d = new Date(dateStr + 'T00:00:00');
                                        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                                    },
                                    label: (item) => {
                                        if (item.datasetIndex === 1) return 'Avg: ' + avg.toFixed(1) + 'h';
                                        return 'Study: ' + item.raw + 'h / 15h';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true, max: 15,
                                grid: { color: gridColor, drawBorder: false },
                                ticks: { color: textColor, font: { size: 11, family: 'Inter' }, stepSize: 5, padding: 10,
                                    callback: (v) => v + 'h'
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: textColor, font: { size: 10, family: 'Inter' }, maxRotation: 0 }
                            }
                        }
                    }
                });
            };

            useEffect(() => { buildChart(); }, [history]);

            // Re-render on theme change
            useEffect(() => {
                const observer = new MutationObserver(() => buildChart());
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, [history]);

            return <canvas ref={chartRef}></canvas>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
