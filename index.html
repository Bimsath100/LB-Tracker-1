                    <div style={{ position: 'relative', width: '80px', height: '80px', margin: '0 auto 15px auto' }}>
                        <svg width="80" height="80" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
                            <circle cx="50" cy="50" r={r} stroke="var(--input-bg)" strokeWidth="10" fill="none" />
                            <circle cx="50" cy="50" r={r} stroke={color} strokeWidth="10" fill="none" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)' }} />
                        </svg>
                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', fontFamily: 'Outfit', fontWeight: '800', fontSize: '1rem', color: 'var(--text-main)' }}>{percent}<span style={{ fontSize: '0.6rem' }}>%</span></div>
                    </div>
                    <div style={{ fontSize: '0.65rem', fontWeight: '700', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '4px' }}>{label}</div>
                    <div style={{ fontSize: '1.1rem', fontWeight: '800', fontFamily: 'Outfit', color: 'var(--text-main)' }}>{value} <span style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>/ {max}</span></div>
                </div>
            );
        };

        const MarkChart = ({ title, data, field, color }) => {
            const ref = useRef(null); const inst = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const sorted = [...data].sort((a, b) => new Date(a.date) - new Date(b.date)).slice(-10);
                if (inst.current) inst.current.destroy();
                inst.current = new Chart(ctx, {
                    type: 'line', data: { labels: sorted.map((_, i) => 'P' + (i + 1)), datasets: [{ data: sorted.map(m => m[field]), borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointBackgroundColor: color }] },
                    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#71717A', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#71717A', font: { size: 10 } } } } }
                });
            }, [JSON.stringify(data)]);
            return <div className="glass card" style={{ padding: '1.2rem' }}><div style={{ fontWeight: '700', fontSize: '0.8rem', color: 'var(--text-dim)', marginBottom: '1rem', textTransform: 'uppercase' }}>{title}</div><div className="chart-box"><canvas ref={ref}></canvas></div></div>;
        };

        const RadarChart = ({ data }) => {
            const ref = useRef(null);
            const chartRef = useRef(null);
            const MAX = { mcq: 50, str: 100, esy: 300 };
            const toP = (val, max) => max > 0 ? Math.min(Math.round((parseFloat(val) || 0) / max * 100), 100) : 0;
            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();
                if (!data || data.length === 0) return;
                const ctx = ref.current.getContext('2d');
                const latest = data[data.length - 1];
                const avgMCQ = data.reduce((a, b) => a + (parseFloat(b.mcq) || 0), 0) / data.length;
                const avgSTR = data.reduce((a, b) => a + (parseFloat(b.str) || 0), 0) / data.length;
                const avgESY = data.reduce((a, b) => a + (parseFloat(b.esy) || 0), 0) / data.length;
                const latestRaw = [parseFloat(latest.mcq) || 0, parseFloat(latest.str) || 0, parseFloat(latest.esy) || 0];
                const avgRaw = [avgMCQ, avgSTR, avgESY];
                // Use dynamic max: user's own peak or fallback defaults
                const peakM = Math.max(...data.map(d => parseFloat(d.mcq) || 0), 1);
                const peakS = Math.max(...data.map(d => parseFloat(d.str) || 0), 1);
                const peakE = Math.max(...data.map(d => parseFloat(d.esy) || 0), 1);
                const dynMax = { mcq: Math.max(peakM, 50), str: Math.max(peakS, 100), esy: Math.max(peakE, 150) };
                const maxArr = [dynMax.mcq, dynMax.str, dynMax.esy];
                chartRef.current = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['MCQ', 'Structured', 'Essay'],
                        datasets: [
                            {
                                label: 'Latest Paper',
                                data: [toP(latest.mcq, dynMax.mcq), toP(latest.str, dynMax.str), toP(latest.esy, dynMax.esy)],
                                borderColor: '#6366F1',
                                backgroundColor: 'rgba(99, 102, 241, 0.25)',
                                borderWidth: 3,
                                pointBackgroundColor: '#6366F1',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 6,
                                pointHoverRadius: 8
                            },
                            {
                                label: 'Average',
                                data: [toP(avgMCQ, dynMax.mcq), toP(avgSTR, dynMax.str), toP(avgESY, dynMax.esy)],
                                borderColor: '#8B5CF6',
                                backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                borderWidth: 2,
                                borderDash: [6, 4],
                                pointBackgroundColor: '#8B5CF6',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 100,
                                angleLines: { color: 'rgba(148, 163, 184, 0.15)' },
                                grid: { color: 'rgba(148, 163, 184, 0.12)' },
                                pointLabels: {
                                    color: '#94A3B8',
                                    font: { size: 12, weight: '700', family: 'Outfit' }
                                },
                                ticks: {
                                    color: '#64748B',
                                    backdropColor: 'transparent',
                                    font: { size: 9 },
                                    stepSize: 25,
                                    callback: (v) => v + '%'
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#94A3B8',
                                    font: { size: 11, weight: '600' },
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    padding: 20
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        const idx = ctx.dataIndex;
                                        const raw = ctx.datasetIndex === 0 ? latestRaw[idx] : avgRaw[idx];
                                        return `${ctx.dataset.label}: ${Math.round(raw)}/${maxArr[idx]} (${ctx.parsed.r}%)`;
                                    }
                                }
                            }
                        },
                        animation: { duration: 800, easing: 'easeOutQuart' }
                    }
                });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [JSON.stringify(data)]);
            if (!data || data.length === 0) return null;
            return <div className="chart-box" style={{ height: window.innerWidth <= 600 ? '280px' : '420px', maxWidth: '500px', margin: '0 auto' }}><canvas ref={ref}></canvas></div>;
        };

        const ProgressChart = ({ history }) => {
            const ref = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const last4Weeks = [...Array(4)].map((_, i) => {
                    let total = 0;
                    for (let j = 0; j < 7; j++) {
                        const d = new Date(); d.setDate(d.getDate() - (i * 7 + j));
                        const k = getLocalISODate(d);
                        total += (Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0);
                    }
                    return total;
                }).reverse();
                const chart = new Chart(ctx, { 
                    type: 'bar', 
                    data: { labels: ['W4', 'W3', 'W2', 'W1'], datasets: [{ data: last4Weeks, backgroundColor: ['rgba(99, 102, 241, 0.2)', 'rgba(99, 102, 241, 0.4)', 'rgba(99, 102, 241, 0.6)', '#6366F1'], borderRadius: 10 }] }, 
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 }, color: '#94A3B8' } }, x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#94A3B8' } } } } 
                });
                return () => chart.destroy();
            }, [history]);
            return <div className="chart-box" style={{ height: '180px' }}><canvas ref={ref}></canvas></div>;
        };

        const TrendChart = ({ history }) => {
            const ref = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const l30 = [...Array(30)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (29 - i)); return getLocalISODate(d); });
                const chart = new Chart(ctx, { 
                    type: 'line', 
                    data: { labels: l30.map(d => d.split('-')[2]), datasets: [{ data: l30.map(k => (Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0)), borderColor: '#6366F1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 }] }, 
                    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 24, grid: { display: false }, ticks: { color: '#94A3B8', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#94A3B8', font: { size: 8 } } } } } 
                });
                return () => chart.destroy();
            }, [history]);
            return <div className="chart-box" style={{ height: '180px' }}><canvas ref={ref}></canvas></div>;
        };

        const ActivityTicker = ({ liveUsers, markedToday, topDistrict, topPerformer }) => {
            const [dynamicStats, setDynamicStats] = useState({ online: 0, marked: 0 });
            useEffect(() => {
                setDynamicStats({ online: liveUsers, marked: markedToday });
            }, [liveUsers, markedToday]);
            const items = [
                { icon: '🚀', val: dynamicStats.online, lbl: 'Students Online Now' },
                { icon: '⚔️', val: topDistrict || '...', lbl: 'is Leading District Battle' },
                { icon: '✨', val: dynamicStats.marked, lbl: 'Students Marked Today' },
                { icon: '👑', val: topPerformer || '...', lbl: "is Today's Peak Performer" }
            ];
            return ( 
                <div className="ticker-wrap">
                    <div className="ticker">
                        <div className="ticker-content">
                            {items.map((item, i) => ( 
                                <div key={i} className="ticker-item">
                                    {item.icon} <span>{item.val}</span>
                                    {item.val === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', marginLeft: '2px', marginRight: '2px', verticalAlign: 'middle', fontWeight: '800' }}>OWNER</span>}
                                    {item.lbl}
                                </div> 
                            ))}
                        </div>
                        <div className="ticker-content">
                            {items.map((item, i) => ( 
                                <div key={'dup-' + i} className="ticker-item">
                                    {item.icon} <span>{item.val}</span>
                                    {item.val === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', marginLeft: '2px', marginRight: '2px', verticalAlign: 'middle', fontWeight: '800' }}>OWNER</span>}
                                    {item.lbl}
                                </div> 
                            ))}
                        </div>
                    </div>
                </div> 
            );
        };

        const ActivityFeed = ({ profile }) => {
            const [feeds, setFeeds] = useState([]);
            const feedRef = useRef(null);
            
            const fetchInitial = async () => {
                const today = getLocalISODate();
                const { data } = await sb.from('study_tracker_v2')
                    .select('name, district, history')
                    .not(`history->${today}`, 'is', null)
                    .order('history->last_updated', { ascending: false })
                    .limit(5);
                if (data) {
                    const mapped = data.map(u => ({
                        id: u.name + (u.history?.last_updated || Math.random()),
                        name: u.name,
                        district: u.district,
                        hrs: (u.history && Array.isArray(u.history[today])) ? u.history[today].filter(Boolean).length : 0,
                        time: u.history?.last_updated,
                    })).filter(u => u.hrs > 0);
                    setFeeds(mapped);
                }
            };

            useEffect(() => {
                fetchInitial();

                const channel = sb.channel('global-study-broadcast', {
                    config: { broadcast: { self: true } }
                })
                .on('broadcast', { event: 'study_update' }, ({ payload }) => {
                    console.log("Broadcast received:", payload);
                    setFeeds(prev => {
                        const newFeed = {
                            id: payload.name + Date.now(),
                            name: payload.name,
                            district: payload.district,
                            hrs: payload.hrs,
                            time: payload.timestamp,
                            isNew: true
                        };
                        // Keep only unique latest updates per user
                        const filtered = prev.filter(f => f.name !== payload.name);
                        return [newFeed, ...filtered].slice(0, 5);
                    });
                })
                .subscribe();

                return () => sb.removeChannel(channel);
            }, []);

            return ( 
                <div className="feed-container" ref={feedRef}>
                    {feeds.map(f => ( 
                        <div key={f.id} className={`feed-item ${f.isNew ? 'new-event' : ''}`} 
                             style={{ 
                                borderLeft: '3px solid #10B981', 
                                background: 'rgba(16, 185, 129, 0.05)', 
                                display: 'flex', 
                                justifyContent: 'space-between', 
                                alignItems: 'center', 
                                gap: '10px',
                                animation: f.isNew ? 'slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none'
                             }}>
                            <span style={{ flex: 1 }}>
                                <span style={{ fontWeight: '700', color: 'var(--text-main)' }}>{f.name}</span>
                                {f.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', marginLeft: '5px', verticalAlign: 'middle' }}>OWNER</span>}
                                <span style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}> from {f.district} marked </span>
                                <span style={{ fontWeight: '800', color: '#10B981' }}>{f.hrs}h 🎯</span>
                            </span>
                            <span style={{ fontSize: '0.6rem', color: 'var(--text-dim)', whiteSpace: 'nowrap', fontWeight: '800', opacity: 0.8 }}>{timeAgo(f.time)}</span>
                        </div> 
                    ))}
                    {feeds.length === 0 && <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem', textAlign: 'center' }}>Waiting for student activity... ⏳</div>}
                    <style>{`
                        @keyframes slideInRight {
                            from { opacity: 0; transform: translateX(30px); filter: blur(10px); }
                            to { opacity: 1; transform: translateX(0); filter: blur(0); }
                        }
                        .new-event {
                            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
                            border-color: #10B981 !important;
                        }
                    `}</style>
                </div> 
            );
        };

        const DistrictLeaderboard = () => {
            const [ranks, setRanks] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                const fetchStats = async () => {
                    const today = getLocalISODate();
                    const { data } = await sb.from('study_tracker_v2')
                        .select('district, history')
                        .not(`history->${today}`, 'is', null)
                        .order('history->last_updated', { ascending: false })
                        .limit(100);
                    const stats = (data || []).reduce((acc, row) => {
                        const hrs = (row.history && Array.isArray(row.history[today])) ? row.history[today].filter(Boolean).length : 0;
                        if (hrs > 0) acc[row.district] = (acc[row.district] || 0) + hrs;
                        return acc;
                    }, {});
                    setRanks(Object.entries(stats).map(([name, hours]) => ({ name, hours })).sort((a, b) => b.hours - a.hours).slice(0, 5));
                    setLoading(false);
                };
                fetchStats();

                const channel = sb.channel('ranks-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                        fetchStats();
                    })
                    .subscribe();

                const inv = setInterval(fetchStats, 10000);
                return () => {
                    clearInterval(inv);
                    sb.removeChannel(channel);
                };
            }, []);
            if (loading) return <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading ranks...</div>;
            return ( <div>{ranks.map((r, i) => ( <div key={r.name} className="district-rank-item"><div className="rank-num" style={{ background: i < 3 ? 'var(--primary)' : 'var(--input-bg)' }}>{i + 1}</div><div style={{ fontWeight: '700', fontSize: '0.9rem' }}>{r.name}</div><div style={{ marginLeft: 'auto', fontSize: '0.8rem', fontWeight: '800', color: 'var(--primary)' }}>{r.hours}h</div></div> ))}{ranks.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem' }}>Initializing rankings...</div>}</div> );
        };

        const FocusTimer = ({ 
            timeLeft, isActive, mode, focusTime, breakTime, 
            toggleTimer, resetTimer, switchMode, saveSettings 
        }) => {
            const [showSettings, setShowSettings] = useState(false);

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const total = (mode === 'focus' ? focusTime : breakTime) * 60;
            const progress = ((total - timeLeft) / total) * 100;
            const strokeColor = mode === 'focus' ? 'var(--primary)' : '#10B981';

            return (
                <div className="glass card" style={{ textAlign: 'center', padding: '2rem', position: 'relative' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                        <div style={{ textAlign: 'left' }}>
                            <div style={{ fontWeight: '800', fontSize: '1.1rem', fontFamily: 'Outfit' }}>Focus Timer ⏳</div>
                            <div style={{ fontSize: '0.75rem', color: 'var(--text-dim)', fontWeight: '600' }}>{mode === 'focus' ? 'STAY FOCUSED' : 'TAKE A BREAK'}</div>
                        </div>
                        <button onClick={() => setShowSettings(!showSettings)} style={{ background: 'var(--input-bg)', border: '1px solid var(--border)', borderRadius: '10px', width: '36px', height: '36px', cursor: 'pointer', color: 'var(--text-dim)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>⚙️</button>
                    </div>

                    {showSettings ? (
                        <div style={{ animation: 'fadeIn 0.3s ease-out', textAlign: 'left', background: 'var(--input-bg)', padding: '1.5rem', borderRadius: '16px', marginBottom: '1.5rem', border: '1px solid var(--border)' }}>
                            <div style={{ fontSize: '0.8rem', fontWeight: '800', color: 'var(--text-dim)', marginBottom: '1rem', letterSpacing: '1px' }}>TIMER SETTINGS</div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginBottom: '1.5rem' }}>
                                <div>
                                    <label style={{ fontSize: '0.7rem', fontWeight: '700', color: 'var(--text-dim)', display: 'block', marginBottom: '6px' }}>FOCUS (MIN)</label>
                                    <input type="number" defaultValue={focusTime} id="focus-input" style={{ width: '100%', padding: '8px', borderRadius: '8px', background: 'var(--card-bg)', border: '1px solid var(--border)', color: 'var(--text-main)', marginBottom: 0 }} />
                                </div>
                                <div>
                                    <label style={{ fontSize: '0.7rem', fontWeight: '700', color: 'var(--text-dim)', display: 'block', marginBottom: '6px' }}>BREAK (MIN)</label>
                                    <input type="number" defaultValue={breakTime} id="break-input" style={{ width: '100%', padding: '8px', borderRadius: '8px', background: 'var(--card-bg)', border: '1px solid var(--border)', color: 'var(--text-main)', marginBottom: 0 }} />
                                </div>
                            </div>
                            <button className="btn-primary" style={{ height: '40px', fontSize: '0.85rem' }} onClick={() => {
                                saveSettings(document.getElementById('focus-input').value, document.getElementById('break-input').value);
                                setShowSettings(false);
                            }}>SAVE CHANGES</button>
                        </div>
                    ) : (
                        <>
                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', marginBottom: '2rem' }}>
                                <button onClick={() => switchMode('focus')} style={{ padding: '8px 16px', borderRadius: '100px', border: 'none', background: mode === 'focus' ? 'var(--primary)' : 'var(--input-bg)', color: mode === 'focus' ? 'white' : 'var(--text-main)', fontWeight: '700', cursor: 'pointer', transition: '0.3s', fontSize: '0.8rem' }}>Focus ({focusTime}m)</button>
                                <button onClick={() => switchMode('break')} style={{ padding: '8px 16px', borderRadius: '100px', border: 'none', background: mode === 'break' ? '#10B981' : 'var(--input-bg)', color: mode === 'break' ? 'white' : 'var(--text-main)', fontWeight: '700', cursor: 'pointer', transition: '0.3s', fontSize: '0.8rem' }}>Break ({breakTime}m)</button>
                            </div>
                            
                            <div style={{ position: 'relative', width: '180px', height: '180px', margin: '0 auto 2rem auto' }}>
                                <svg width="180" height="180" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
                                    <circle cx="50" cy="50" r="46" stroke="var(--input-bg)" strokeWidth="4" fill="none" />
                                    <circle cx="50" cy="50" r="46" stroke={strokeColor} strokeWidth="4" fill="none" strokeDasharray="289" strokeDashoffset={289 - (progress / 100) * 289} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s linear', filter: `drop-shadow(0 0 8px ${strokeColor}40)` }} />
                                </svg>
                                <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', fontFamily: 'Outfit', fontWeight: '900', fontSize: '3rem', color: 'var(--text-main)', letterSpacing: '-1px' }}>
                                    {m}:{s}
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                                <button className="btn-primary" onClick={toggleTimer} style={{ flex: 1, height: '48px', background: isActive ? 'rgba(239, 68, 68, 0.1)' : 'var(--primary)', color: isActive ? '#ef4444' : 'white', border: isActive ? '1px solid #ef4444' : 'none', fontWeight: '800' }}>
                                    {isActive ? 'PAUSE' : 'START'}
                                </button>
                                <button onClick={resetTimer} style={{ width: '48px', height: '48px', borderRadius: '14px', background: 'var(--input-bg)', border: '1px solid var(--border)', color: 'var(--text-main)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.2rem' }}>🔄</button>
                            </div>
                        </>
                    )}
                </div>
            );
        };


        const TodoList = ({ viewDate, history, setHistory }) => {
            const [task, setTask] = useState('');
            const todosObj = history.todos || {};
            const todos = todosObj[viewDate] || [];
            
            const addTask = (e) => {
                e.preventDefault();
                if (!task.trim()) return;
                const newTodos = [...todos, { id: Date.now(), text: task, done: false }];
                setHistory({ ...history, todos: { ...todosObj, [viewDate]: newTodos } });
                setTask('');
            };
            const toggleTask = (id) => {
                const newTodos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
                setHistory({ ...history, todos: { ...todosObj, [viewDate]: newTodos } });
            };
            const delTask = (id) => {
                const newTodos = todos.filter(t => t.id !== id);
                setHistory({ ...history, todos: { ...todosObj, [viewDate]: newTodos } });
            };
            return (
                <div style={{ marginTop: '1rem' }}>
                    <form onSubmit={addTask} style={{ display: 'flex', gap: '8px', marginBottom: '1rem' }}>
                        <input value={task} onChange={e=>setTask(e.target.value)} placeholder="Add a task..." style={{ marginBottom: 0, padding: '10px', flex: 1 }} />
                        <button type="submit" className="btn-primary" style={{ width: 'auto', padding: '0 15px' }}>+</button>
                    </form>
                    <div style={{ maxHeight: '200px', overflowY: 'auto', paddingRight: '5px' }}>
                        {todos.map(t => (
                            <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', background: 'var(--input-bg)', padding: '10px', borderRadius: '12px', marginBottom: '8px' }}>
                                <input type="checkbox" checked={t.done} onChange={() => toggleTask(t.id)} style={{ width: '18px', height: '18px', cursor: 'pointer', accentColor: 'var(--primary)', marginBottom: 0 }} />
                                <span style={{ flex: 1, textDecoration: t.done ? 'line-through' : 'none', color: t.done ? 'var(--text-dim)' : 'var(--text-main)', fontSize: '0.9rem' }}>{t.text}</span>
                                <span onClick={() => delTask(t.id)} style={{ cursor: 'pointer', opacity: 0.5, fontSize: '0.8rem' }}>❌</span>
                            </div>
                        ))}
                        {todos.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem 0' }}>No tasks for this date.</div>}
                    </div>
                </div>
            );
        };

        const ResourceLinks = ({ history, setHistory }) => {
            const [title, setTitle] = useState('');
            const [url, setUrl] = useState('');
            const links = history.links || [];
            
            const addLink = (e) => {
                e.preventDefault();
                if (!title.trim() || !url.trim()) return;
                const finalUrl = url.startsWith('http') ? url : `https://${url}`;
                const newLinks = [...links, { id: Date.now(), title, url: finalUrl }];
                setHistory({ ...history, links: newLinks });
                setTitle(''); setUrl('');
            };
            const delLink = (id) => {
                setHistory({ ...history, links: links.filter(l => l.id !== id) });
            };
            return (
                <div style={{ marginTop: '1rem' }}>
                    <form onSubmit={addLink} style={{ display: 'flex', gap: '8px', marginBottom: '1rem', flexWrap: 'wrap' }}>
                        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Title (e.g. Note)" style={{ marginBottom: 0, padding: '10px', flex: 1, minWidth: '80px' }} />
                        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="URL link" style={{ marginBottom: 0, padding: '10px', flex: 1, minWidth: '100px' }} />
                        <button type="submit" className="btn-primary" style={{ width: 'auto', padding: '0 15px' }}>Save</button>
                    </form>
                    <div style={{ maxHeight: '200px', overflowY: 'auto', paddingRight: '5px' }}>
                        {links.map(l => (
                            <div key={l.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', background: 'var(--input-bg)', padding: '10px', borderRadius: '12px', marginBottom: '8px' }}>
                                <span style={{ fontSize: '1.2rem' }}>🔗</span>
                                <a href={l.url} target="_blank" rel="noreferrer" style={{ flex: 1, color: 'var(--primary)', fontSize: '0.9rem', textDecoration: 'none', fontWeight: '600', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{l.title}</a>
                                <span onClick={() => delLink(l.id)} style={{ cursor: 'pointer', opacity: 0.5, fontSize: '0.8rem' }}>🗑️</span>
                            </div>
                        ))}
                        {links.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem 0' }}>Save important links here.</div>}
                    </div>
                </div>
            );
        };

        const BadgesView = ({ history, marks, streak }) => {
            const totalHrs = Object.values(history).reduce((a, b) => a + (Array.isArray(b) ? b.filter(Boolean).length : 0), 0);
            const totalPapers = marks ? marks.length : 0;
            
            const badges = [
                { id: 'first_step', icon: '🐣', title: 'First Step', desc: 'Marked 1st hour', achieved: totalHrs >= 1 },
                { id: 'streak_3', icon: '🔥', title: 'On Fire', desc: '3 Day Streak', achieved: streak >= 3 },
                { id: 'streak_7', icon: '⚡', title: 'Unstoppable', desc: '7 Day Streak', achieved: streak >= 7 },
                { id: 'hours_50', icon: '🥉', title: 'Bronze Scholar', desc: '50 Hours', achieved: totalHrs >= 50 },
                { id: 'hours_100', icon: '🥈', title: 'Silver Scholar', desc: '100 Hours', achieved: totalHrs >= 100 },
                { id: 'hours_500', icon: '🏆', title: 'Elite Scholar', desc: '500 Hours', achieved: totalHrs >= 500 },
                { id: 'papers_5', icon: '📝', title: 'Paper Eater', desc: 'Did 5 Papers', achieved: totalPapers >= 5 }
            ];

            return (
                <div className="glass card" style={{ padding: '1.5rem', marginBottom: '2rem' }}>
                    <div className="card-header"><span className="card-title">Achievements 🏅</span><span style={{ color: 'var(--text-dim)', fontSize: '0.8rem', fontWeight: '800' }}>{badges.filter(b=>b.achieved).length} / {badges.length} Unlocked</span></div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '15px', marginTop: '1.5rem' }}>
                        {badges.map(b => (
                            <div key={b.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', opacity: b.achieved ? 1 : 0.4, filter: b.achieved ? 'none' : 'grayscale(100%)', background: b.achieved ? 'var(--primary-glow)' : 'var(--input-bg)', padding: '15px', width: '120px', borderRadius: '16px', border: b.achieved ? '1px solid var(--primary)' : '1px solid var(--glass-border)', transition: '0.3s' }}>
                                <div style={{ fontSize: '2rem', marginBottom: '8px' }}>{b.icon}</div>
                                <div style={{ fontWeight: '800', fontSize: '0.75rem', lineHeight: '1.1', color: b.achieved ? 'var(--text-main)' : 'var(--text-dim)' }}>{b.title}</div>
                                <div style={{ fontSize: '0.6rem', color: 'var(--text-dim)', marginTop: '4px' }}>{b.desc}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };


        const StudyRoadmap = ({ profile }) => {
            if (!profile || !profile.examYear || !profile.examMonth) return null;
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const targetDate = new Date(profile.examYear, months.indexOf(profile.examMonth), 1);
            const now = new Date();
            const monthsLeft = (targetDate.getFullYear() - now.getFullYear()) * 12 + targetDate.getMonth() - now.getMonth();
            
            let phase = { label: "Theory & Foundation" };
            let progress = 30;
            if (monthsLeft <= 6 && monthsLeft > 3) { phase = { label: "Rapid Revision & Past Papers" }; progress = 70; }
            else if (monthsLeft <= 3 && monthsLeft > 0) { phase = { label: "Final Mock Exams & Time Management" }; progress = 90; }
            else if (monthsLeft <= 0) { phase = { label: "Exam Mode Active 🚀" }; progress = 100; }
            
            return (
                <div className="glass card" style={{ padding: '1.5rem', marginBottom: '2rem', textAlign: 'left', borderLeft: '4px solid var(--primary)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.5rem', flexWrap: 'wrap', gap: '15px' }}>
                        <div>
                            <h3 style={{ margin: 0, fontFamily: 'Outfit', fontSize: '1.4rem', color: 'var(--text-main)', fontWeight: '800' }}>Study Roadmap 🗺️</h3>
                            <div style={{ fontSize: '0.85rem', color: 'var(--text-dim)', marginTop: '4px', fontWeight: '600' }}>Current Phase: <span style={{ color: 'var(--primary)' }}>{phase.label}</span></div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                            <span style={{ color: 'var(--primary)', fontWeight: '800', fontSize: '0.85rem', background: 'var(--primary-glow)', padding: '6px 14px', borderRadius: '100px', border: '1px solid var(--primary)' }}>{monthsLeft > 0 ? `${monthsLeft} Months Left` : 'Exam Time'}</span>
                            <span style={{ fontWeight: '800', color: 'var(--text-main)', fontSize: '0.9rem' }}>{progress}%</span>
                        </div>
                    </div>
                    <div style={{ width: '100%', height: '12px', background: 'var(--input-bg)', borderRadius: '100px', overflow: 'hidden', border: '1px solid var(--border)' }}>
                        <div style={{ width: `${progress}%`, height: '100%', background: 'linear-gradient(90deg, var(--primary), #a855f7)', transition: 'width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)', borderRadius: '100px', boxShadow: '0 0 15px var(--primary-glow)' }}></div>
                    </div>
                </div>
            );
        };

        const DailyProgressGauge = ({ value, max, label }) => {
            const [offset, setOffset] = useState(2 * Math.PI * 70);
            const radius = 70;
            const circumference = 2 * Math.PI * radius;
            const percent = Math.min(value / max, 1);
            
            useEffect(() => {
                const timer = setTimeout(() => {
                    setOffset(circumference - percent * circumference);
                }, 100);
                return () => clearTimeout(timer);
            }, [percent, circumference]);

            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ textAlign: 'center', marginBottom: '1.5rem' }}>
                        <h3 style={{ margin: 0, fontFamily: 'Outfit', color: 'var(--text-dim)', textTransform: 'uppercase', fontSize: '0.75rem', letterSpacing: '2.5px', fontWeight: '800' }}>{label}</h3>
                    </div>
                    <div style={{ position: 'relative', width: '180px', height: '180px' }}>
                        <svg width="180" height="180" viewBox="0 0 180 180" style={{ transform: 'rotate(-90deg)' }}>
                            <defs>
                                <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stopColor="var(--primary)" />
                                    <stop offset="100%" stopColor="var(--secondary)" />
                                </linearGradient>
                            </defs>
                            <circle cx="90" cy="90" r={radius} stroke="var(--input-bg)" strokeWidth="14" fill="transparent" />
                            <circle cx="90" cy="90" r={radius} stroke="url(#gaugeGradient)" strokeWidth="14" fill="transparent" 
                                strokeDasharray={circumference} strokeDashoffset={offset} 
                                strokeLinecap="round" 
                                style={{ 
                                    transition: 'stroke-dashoffset 2s cubic-bezier(0.34, 1.56, 0.64, 1)',
                                    filter: 'drop-shadow(0 0 8px var(--primary))',
                                    animation: 'circlePulse 4s ease-in-out infinite'
                                }} />
                        </svg>
                        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                            <div style={{ fontSize: '2.5rem', fontWeight: '900', fontFamily: 'Outfit', color: 'var(--text-main)', lineHeight: '1' }}>{Math.round(percent * 100)}%</div>
                            <div style={{ fontSize: '0.7rem', fontWeight: '800', color: 'var(--text-dim)', marginTop: '4px', textTransform: 'uppercase', letterSpacing: '1px' }}>{value} / {max} HRS</div>
                        </div>
                    </div>
                    {percent >= 1 && <div style={{ marginTop: '1.5rem', color: '#10B981', fontWeight: '800', fontSize: '0.8rem', animation: 'fadeIn 0.5s' }}>🎯 GOAL MET!</div>}
                </div>
            );
        };


        const DashboardView = ({ profile, history, marks, setHistory, viewDate, setViewDate, timeLeft, liveUsers, markedToday, announcement, showAnnounceModal, setShowAnnounceModal }) => {
            const [leaderStats, setLeaderStats] = useState({ district: '', performer: '' });

            useEffect(() => {
                const fetchLeaders = async () => {
                    const today = getLocalISODate();
                    const { data } = await sb.from('study_tracker_v2')
                        .select('name, district, history')
                        .not(`history->${today}`, 'is', null)
                        .order('history->last_updated', { ascending: false })
                        .limit(100);
                    if (data && data.length > 0) {
                        const distMap = {};
                        let bestP = { name: '', hrs: 0, time: 0 };
                        data.forEach(u => {
                            const hrs = (u.history && Array.isArray(u.history[today])) ? u.history[today].filter(Boolean).length : 0;
                            const time = u.history?.last_updated ? new Date(u.history.last_updated).getTime() : 0;
                            if (hrs > 0) {
                                distMap[u.district] = (distMap[u.district] || 0) + hrs;
                                if (hrs > bestP.hrs || (hrs === bestP.hrs && time > bestP.time)) {
                                    bestP = { name: u.name, hrs, time };
                                }
                            }
                        });
                        const topD = Object.entries(distMap).sort((a,b) => b[1] - a[1])[0];
                        setLeaderStats({ district: topD ? topD[0] : 'None', performer: bestP.name || 'None' });
                    }
                };
                fetchLeaders();

                const channel = sb.channel('leaders-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                        fetchLeaders();
                    })
                    .subscribe();

                const inv = setInterval(fetchLeaders, 10000);
                return () => {
                    clearInterval(inv);
                    sb.removeChannel(channel);
                };
            }, []);

            const todayCount = (Array.isArray(history[viewDate]) ? history[viewDate].filter(Boolean).length : 0);
            const dailyTarget = history.target || 24;
            const weekHrs = [...Array(7)].reduce((a,_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); const k=getLocalISODate(d); return a+(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0); },0);
            const monthHrs = [...Array(30)].reduce((a,_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); const k=getLocalISODate(d); return a+(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0); },0);
            const totalHrs = Object.values(history).reduce((a, b) => a + (Array.isArray(b) ? b.filter(Boolean).length : 0), 0);
            const toggleH = (i) => { 
                const h = [...(history[viewDate] || new Array(24).fill(false))]; 
                const isMarking = !h[i];
                h[i] = isMarking; 
                
                // Record activity log
                const newLog = {
                    id: Date.now(),
                    time: new Date().toISOString(),
                    action: isMarking ? `Marked Hour ${i+1}` : `Unmarked Hour ${i+1}`,
                    date: viewDate
                };
                const existingLogs = history.logs || [];
                const updatedLogs = [newLog, ...existingLogs].slice(0, 10); // Keep last 10 actions

                const newHistory = { ...history, [viewDate]: h, last_updated: new Date().toISOString(), logs: updatedLogs };
                setHistory(newHistory); 
                
                // Real-time Broadcast
                if (viewDate === getLocalISODate()) {
                    const markedCount = h.filter(Boolean).length;
                    sb.channel('global-study-broadcast').send({
                        type: 'broadcast',
                        event: 'study_update',
                        payload: { 
                            name: profile.name, 
                            district: profile.district, 
                            hrs: markedCount,
                            timestamp: new Date().toISOString()
                        }
                    });
                }
            };
            
            let streak = 0; let curD = new Date(); let curK = getLocalISODate(curD);
            let todayH = Array.isArray(history[curK]) ? history[curK].filter(Boolean).length : 0;
            if (todayH === 0) { 
                curD.setDate(curD.getDate() - 1); curK = getLocalISODate(curD); 
                let yestH = Array.isArray(history[curK]) ? history[curK].filter(Boolean).length : 0; 
                if (yestH > 0) streak = 1; 
            } else streak = 1;
            if (streak > 0) {
                while (true) {
                    curD.setDate(curD.getDate() - 1); let dateStr = getLocalISODate(curD);
                    let hrs = Array.isArray(history[dateStr]) ? history[dateStr].filter(Boolean).length : 0;
                    if (hrs > 0) streak++; else break;
                }
            }
            const isEvening = new Date().getHours() >= 17;
            const showReminder = todayCount === 0 && isEvening && viewDate === getLocalISODate();
            const dismissAnnounce = () => { localStorage.setItem('lastSeenAnnounce', announcement); setShowAnnounceModal(false); };
            return (
                <div className="dashboard-container">
                    <ActivityTicker liveUsers={liveUsers} markedToday={markedToday} topDistrict={leaderStats.district} topPerformer={leaderStats.performer} />
                    {showReminder && ( <div className="reminder-banner" style={{ background: 'rgba(245, 158, 11, 0.1)', border: '1px solid rgba(245, 158, 11, 0.2)', padding: '1rem 1.5rem', borderRadius: '20px', marginBottom: '2rem', display: 'flex', alignItems: 'center', gap: '12px' }}><div style={{ fontSize: '1.5rem' }}>⏰</div><div><div style={{ fontWeight: '800', color: '#F59E0B', fontSize: '0.9rem' }}>අද පාඩම් කරේ නැද්ද? (Daily Reminder)</div><div style={{ fontSize: '0.75rem', color: 'var(--text-dim)', lineHeight: '1.4' }}>ඔයා අද පාඩම් කරපු පැය ගාන තවම mark කරලා නැහැ නේද? ඔයාගෙ progress එක update කරන්න අමතක කරන්න එපා.</div></div></div> )}
                    <Reveal>
                        <div className="hero-section" style={{ background: 'linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%)', padding: 'clamp(1.5rem, 5vw, 2.5rem)', borderRadius: '24px', border: '1px solid var(--glass-border)', marginBottom: '2rem' }}>
                            <div style={{ textAlign: 'left' }}>
                                <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '8px', marginBottom: '15px' }}>
                                    {streak > 0 && <div style={{ background: 'rgba(245, 158, 11, 0.15)', border: '1px solid rgba(245, 158, 11, 0.3)', padding: '4px 12px', borderRadius: '100px', color: '#F59E0B', fontWeight: '800', fontSize: '0.75rem' }}>🔥 {streak} Day Streak</div>}
                                    <div style={{ background: 'var(--input-bg)', padding: '4px 12px', borderRadius: '100px', color: 'var(--text-dim)', fontSize: '0.75rem', fontWeight: '700', border: '1px solid var(--border)' }}>{profile.examYear} {profile.examMonth} {profile.examLevel}</div>
                                    <div style={{ background: 'var(--input-bg)', padding: '4px 12px', borderRadius: '100px', color: 'var(--text-dim)', fontSize: '0.75rem', fontWeight: '700', border: '1px solid var(--border)' }}>📍 {profile.district}</div>
                                </div>
                                <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(1.8rem, 6vw, 2.5rem)', fontWeight: '800', marginBottom: '0.5rem', color: 'var(--text-main)', letterSpacing: '-1px' }}>
                                    Hello, <span style={{ color: 'var(--primary)' }}>{profile.name}</span>! 
                                    {profile.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.4em', background: 'var(--primary)', color: 'white', padding: '2px 8px', borderRadius: '6px', verticalAlign: 'middle', marginLeft: '10px', fontWeight: '800', letterSpacing: '1px' }}>OWNER</span>}
                                </h1>
                                <p style={{ fontSize: 'clamp(0.85rem, 2.5vw, 1rem)', color: 'var(--text-dim)', lineHeight: '1.6', maxWidth: '500px', fontWeight: '500', margin: 0 }}>
                                    Welcome to your premium study dashboard. Plan your day, track your progress, and stay ahead of the curve.
                                </p>
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'var(--card-bg)', padding: '2rem 1.5rem', borderRadius: '24px', border: '1px solid var(--border)', boxShadow: '0 12px 40px rgba(0,0,0,0.15)', minWidth: '280px' }}>
                                <div style={{ textAlign: 'center', color: 'var(--text-main)', fontSize: '0.85rem', fontWeight: '900', letterSpacing: '3px', textTransform: 'uppercase', marginBottom: '15px', opacity: 0.8 }}>Exam Countdown</div>
                                <div className="countdown-container" style={{ justifyContent: 'center', margin: 0 }}>
                                    <CountdownBox val={timeLeft.d} lbl="Days" />
                                    <CountdownBox val={timeLeft.h} lbl="Hours" />
                                    <CountdownBox val={timeLeft.s} lbl="Sec" />
                                </div>
                            </div>
                        </div>
                    </Reveal>
                    <Reveal delay={0.1}><StudyRoadmap profile={profile} /></Reveal>
                    <div className="stats-grid"><StatBox val={todayCount} lbl="Today" sub="අද" /><StatBox val={weekHrs} lbl="Weekly" sub="සතිය" color="#8B5CF6" /><StatBox val={monthHrs} lbl="Monthly" sub="මාසය" color="#D946EF" /><StatBox val={totalHrs} lbl="Total" sub="මුළු" color="#10B981" /></div>
                    <div className="asymmetric-grid">
                        {/* Row 1: Study Grid & Notice Board */}
                        <div style={{ gridColumn: 'span 8' }}>
                            <Reveal>
                                <div className="glass card" style={{ padding: '2rem', height: '100%' }}>
                                    <div className="card-header" style={{ marginBottom: '1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '15px' }}>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                <span className="card-title" style={{ margin: 0 }}>Study Grid</span>
                                                {history.last_updated && (
                                                    <div style={{ fontSize: '0.65rem', color: 'var(--primary)', background: 'var(--primary-glow)', padding: '2px 8px', borderRadius: '6px', fontWeight: '800', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                        ☁️ Last Synced: {timeAgo(history.last_updated)}
                                                    </div>
                                                )}
                                            </div>
                                            <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem', marginTop: '4px', fontWeight: '500' }}>Focus on your daily goal</p>
                                        </div>
                                        <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                                            <input 
                                                type="date" 
                                                value={viewDate} 
                                                onChange={(e) => setViewDate(e.target.value)} 
                                                style={{ 
                                                    marginBottom: 0, 
                                                    padding: '8px 12px', 
                                                    fontSize: '0.85rem', 
                                                    width: 'auto',
                                                    background: 'var(--input-bg)',
                                                    border: '1px solid var(--border)',
                                                    borderRadius: '10px',
                                                    cursor: 'pointer'
                                                }} 
                                            />
                                            <button 
                                                className="btn-primary" 
                                                onClick={() => setViewDate(getLocalISODate())}
                                                style={{ 
                                                    width: 'auto', 
                                                    padding: '8px 15px', 
                                                    fontSize: '0.85rem',
                                                    display: viewDate === getLocalISODate() ? 'none' : 'flex'
                                                }}
                                            >
                                                Today
                                            </button>
                                        </div>
                                    </div>
                                    <div className="hour-grid">
                                        {Array.from({ length: 24 }).map((_, i) => (
                                            <div key={i} className={`hour-btn ${history[viewDate]?.[i] ? 'active' : ''}`} onClick={() => toggleH(i)}>{i + 1}</div>
                                        ))}
                                    </div>
                                </div>
                            </Reveal>
                        </div>

                        <div style={{ gridColumn: 'span 4' }}>
                            <Reveal delay={0.1}>
                                <div className="glass card" style={{ padding: '2rem', height: '100%' }}>
                                    <div style={{ fontWeight: '800', fontSize: '0.9rem', color: 'var(--primary)', marginBottom: '1.5rem', letterSpacing: '1px', textTransform: 'uppercase' }}>
                                        📜 My Activity History
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '400px', overflowY: 'auto' }}>
                                        {(history.logs || []).length > 0 ? (
                                            history.logs.map(log => (
                                                <div key={log.id} style={{ display: 'flex', flexDirection: 'column', background: 'var(--input-bg)', padding: '10px 12px', borderRadius: '12px', borderLeft: log.action.includes('Marked') ? '3px solid #10B981' : '3px solid #EF4444' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                        <div style={{ fontSize: '0.75rem', fontWeight: '700', color: 'var(--text-main)' }}>{log.action}</div>
                                                        <div style={{ fontSize: '0.6rem', fontWeight: '800', color: 'var(--text-dim)' }}>{new Date(log.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                                                    </div>
                                                    <div style={{ fontSize: '0.55rem', color: 'var(--text-dim)', marginTop: '2px' }}>{log.date}</div>
                                                </div>
                                            ))
                                        ) : (
                                            <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem' }}>No recent updates.</div>
                                        )}
                                    </div>
                                </div>
                            </Reveal>
                        </div>

                        {/* Row 2: StudyAuraSphere & Daily Progress */}
                        <div style={{ gridColumn: 'span 8' }}>
                            <Reveal delay={0.2}>
                                <div className="glass card" style={{ padding: '2.5rem', height: '100%', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                                    {/* Background Animation */}
                                    <div style={{ position: 'absolute', top: '-50%', right: '-20%', width: '300px', height: '300px', background: 'radial-gradient(circle, var(--primary-glow) 0%, transparent 70%)', opacity: 0.3, filter: 'blur(50px)', animation: 'dnaPulse 8s infinite' }}></div>
                                    
                                    <div style={{ position: 'relative', zIndex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '15px', marginBottom: '1.5rem' }}>
                                            <div style={{ width: '50px', height: '50px', background: 'var(--primary-glow)', borderRadius: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem', border: '1px solid var(--primary)', animation: 'livePulse 2s infinite' }}>📢</div>
                                            <div>
                                                <div style={{ fontSize: '0.75rem', fontWeight: '900', color: 'var(--primary)', textTransform: 'uppercase', letterSpacing: '2px' }}>Broadcast Center</div>
                                                <div style={{ fontSize: '1.2rem', fontWeight: '800', color: 'var(--text-main)', fontFamily: 'Outfit' }}>Official Notices</div>
                                            </div>
                                        </div>
                                        
                                        <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border)', borderRadius: '18px', padding: '1.5rem', minHeight: '120px', display: 'flex', alignItems: 'center' }}>
                                            {announcement ? (
                                                <p style={{ fontSize: '1.1rem', fontWeight: '600', color: 'var(--text-main)', lineHeight: '1.6', margin: 0 }}>
                                                    {announcement}
                                                </p>
                                            ) : (
                                                <div style={{ opacity: 0.5 }}>
                                                    <p style={{ fontSize: '0.9rem', fontWeight: '700', margin: 0 }}>No new announcements at the moment. Stay focused on your goals! 🚀</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </Reveal>
                        </div>

                        <div style={{ gridColumn: 'span 4' }}>
                            <Reveal delay={0.3}>
                                <div className="glass card" style={{ padding: '2rem', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    <DailyProgressGauge value={todayCount} max={dailyTarget} label="Daily Progress" />
                                </div>
                            </Reveal>
                        </div>
                    </div>
                    
                    <Reveal delay={0.4}>
                        <div className="asymmetric-grid">
                            <div style={{ gridColumn: 'span 7' }}>
                                <div className="glass card" style={{ padding: '2rem' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                        <div style={{ fontWeight: '800', fontSize: '0.9rem', color: 'var(--primary)', letterSpacing: '1px', textTransform: 'uppercase' }}>
                                            ⚡ Real-time Study Feed
                                        </div>
                                        <div className="live-indicator" style={{ margin: 0, padding: '4px 10px' }}>
                                            <div className="live-dot"></div>
                                            <span style={{ fontSize: '0.65rem' }}>LIVE</span>
                                        </div>
                                    </div>
                                    <ActivityFeed profile={profile} />
                                </div>
                            </div>
                            <div style={{ gridColumn: 'span 5' }}>
                                <div className="glass card" style={{ padding: '2rem' }}>
                                    <div style={{ fontWeight: '800', fontSize: '0.9rem', color: 'var(--primary)', marginBottom: '1.5rem', letterSpacing: '1px', textTransform: 'uppercase' }}>
                                        🏆 District Rankings
                                    </div>
                                    <DistrictLeaderboard />
                                </div>
                            </div>
                        </div>
                    </Reveal>

                    <div className="marks-grid">
                        <Reveal delay={0.2}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Weekly Overview</div><ProgressChart history={history} /></div></Reveal>
                        <Reveal delay={0.3}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Activity Trend</div><TrendChart history={history} /></div></Reveal>
                    </div>
                </div>
            );
        };

        const WorkspaceView = ({ 
            viewDate, history, setHistory, streak, profile, 
            timerProps
        }) => {
            return (
                <div style={{ animation: 'fadeIn 0.5s ease-out', maxWidth: '1000px', margin: '0 auto' }}>
                    <div style={{ textAlign: 'center', marginBottom: '2.5rem' }}>
                        <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>💻</div>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2rem, 5vw, 3rem)', fontWeight: '800' }}>Your Workspace</h1>
                        <p style={{ color: 'var(--text-dim)', fontSize: '1.1rem' }}>Manage your focus, tasks, and resources in one place.</p>
                        <div style={{ marginTop: '1.5rem', display: 'inline-flex', alignItems: 'center', background: 'var(--input-bg)', padding: '8px 16px', borderRadius: '100px', border: '1px solid var(--glass-border)' }}>
                            <label style={{ fontSize: '0.85rem', color: 'var(--text-dim)', fontWeight: '700', marginRight: '10px' }}>🎯 Daily Target:</label>
                            <input type="number" min="1" max="24" value={history.target || 24} onChange={e => setHistory({ ...history, target: parseInt(e.target.value) || 24 })} style={{ width: '50px', padding: '4px', fontSize: '0.9rem', background: 'var(--card-bg)', border: '1px solid var(--border)', borderRadius: '8px', color: 'var(--text-main)', textAlign: 'center', marginBottom: 0 }} />
                            <span style={{ fontSize: '0.8rem', color: 'var(--text-dim)', marginLeft: '8px' }}>Hours</span>
                        </div>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '1.5rem', alignItems: 'start' }}>
                        <Reveal delay={0.2}><FocusTimer {...timerProps} /></Reveal>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                            <Reveal delay={0.1}><div className="glass card"><span className="card-title">Daily To-Do List 📝</span><TodoList viewDate={viewDate} history={history} setHistory={setHistory} /></div></Reveal>
                            <Reveal delay={0.2}><div className="glass card"><span className="card-title">Resource Links 🔗</span><ResourceLinks history={history} setHistory={setHistory} /></div></Reveal>
                        </div>
                    </div>
                </div>
            );
        };

        const CommunityHub = ({ profile, liveUsers = 1 }) => {
            const [posts, setPosts] = useState([]);
            const [content, setContent] = useState('');
            const [uploading, setUploading] = useState(false);
            const [file, setFile] = useState(null);
            const [hiddenPosts, setHiddenPosts] = useState(JSON.parse(localStorage.getItem('hidden_posts') || '[]'));
            const chatEndRef = useRef(null);

            useEffect(() => {
                fetchPosts();
                const hub = sb.channel('community-hub')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'community_posts' }, (payload) => {
                        fetchPosts(); 
                    })
                    .on('broadcast', { event: 'post_deleted' }, (payload) => {
                        const ids = Array.isArray(payload.payload.id) ? payload.payload.id : [payload.payload.id];
                        setPosts(prev => prev.filter(p => !ids.includes(p.id)));
                    })
                    .on('broadcast', { event: 'post_inserted' }, (payload) => {
                        setPosts(prev => {
                            if (prev.some(p => p.id === payload.payload.id)) return prev;
                            return [payload.payload, ...prev];
                        });
                    })
                    .subscribe();

                const poll = setInterval(fetchPosts, 500);

                return () => {
                    sb.removeChannel(hub);
                    clearInterval(poll);
                };
            }, []);

            useEffect(() => {
                localStorage.setItem('hidden_posts', JSON.stringify(hiddenPosts));
            }, [hiddenPosts]);

            useEffect(() => {
                const container = chatEndRef.current?.parentNode;
                if (container) {
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                    if (isAtBottom) {
                        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            }, [posts]);

            const fetchPosts = async () => {
                const { data, error } = await sb.from('community_posts')
                    .select('*')
                    .gt('created_at', new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString())
                    .order('created_at', { ascending: false });
                if (error) console.error("Fetch Error:", error);
                if (data) setPosts(data);
            };

            const markAsViewed = async (postId, viewedBy = []) => {
                const myId = profile.id || profile.user_id;
                if (!viewedBy.includes(myId)) {
                    await sb.from('community_posts').update({ 
                        viewed_by: [...viewedBy, myId] 
                    }).eq('id', postId);
                }
            };

            const deleteForEveryone = async (postId) => {
                if (!confirm('Delete this message for everyone?')) return;
                setPosts(prev => prev.filter(p => p.id !== postId));
                
                const hub = sb.channel('community-hub');
                hub.send({ type: 'broadcast', event: 'post_deleted', payload: { id: postId } });

                const { error } = await sb.from('community_posts').delete().eq('id', postId);
                if (error) { alert("Error: " + error.message); fetchPosts(); }
            };

            const deleteForMe = (postId) => {
                setHiddenPosts(prev => [...prev, postId]);
            };

            const compressImage = async (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                        };
                    };
                });
            };

            const handlePost = async () => {
                if (!content.trim() && !file) return;
                setUploading(true);
                const tempId = 'temp-' + Date.now();
                const myId = profile.id || profile.user_id;
                
                // Optimistic UI
                const newPost = {
                    id: tempId,
                    user_id: myId,
                    user_name: profile.name,
                    content: content.trim(),
                    created_at: new Date().toISOString(),
                    viewed_by: [myId],
                    isTemp: true
                };
                setPosts(prev => [newPost, ...prev]);
                setContent('');

                try {
                    let imageUrl = null;
                    let fileUrl = null;
                    if (file) {
                        const isImg = file.type.startsWith('image/');
                        const finalFile = isImg ? await compressImage(file) : file;
                        const filePath = `${Date.now()}_${file.name}`;
                        const { data, error } = await sb.storage.from('community_assets').upload(filePath, finalFile);
                        if (error) throw error;
                        const { data: { publicUrl } } = sb.storage.from('community_assets').getPublicUrl(filePath);
                        if (isImg) imageUrl = publicUrl; else fileUrl = publicUrl;
                    }

                    const { data, error } = await sb.from('community_posts').insert({
                        user_id: myId,
                        user_name: profile.name,
                        content: newPost.content,
                        image_url: imageUrl,
                        file_url: fileUrl,
                        type: file ? (file.type.startsWith('image/') ? 'image' : 'file') : 'text',
                        viewed_by: [myId]
                    }).select().single();
                    
                    if (error) throw error;

                    // Broadcast via hub
                    sb.channel('community-hub').send({ type: 'broadcast', event: 'post_inserted', payload: data });

                    setPosts(prev => prev.map(p => p.id === tempId ? data : p));
                    setFile(null);
                } catch (err) {
                    setPosts(prev => prev.filter(p => p.id !== tempId));
                    alert("Failed to send: " + err.message);
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="glass card community-chat-container" style={{ display: 'flex', flexDirection: 'column', height: '750px', padding: '0' }}>
                    <div style={{ padding: '1.2rem 1.5rem', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'rgba(255,255,255,0.02)' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <div style={{ fontWeight: '900', color: 'var(--text-main)', fontSize: '1rem', letterSpacing: '1px' }}>GLOBAL HUB 🌍</div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <div style={{ background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.2)', borderRadius: '20px', padding: '5px 12px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                <div className="live-dot"></div>
                                <span style={{ fontSize: '0.7rem', fontWeight: '800', color: '#10B981' }}>{liveUsers} ONLINE</span>
                            </div>
                        </div>
                    </div>

                    <div style={{ flex: 1, overflowY: 'auto', padding: '1.5rem', display: 'flex', flexDirection: 'column-reverse', gap: '1.2rem', background: 'rgba(0,0,0,0.2)' }}>
                        <div ref={chatEndRef} />
                        {posts.filter(p => !hiddenPosts.includes(p.id)).map((post, i) => {
                            const isMe = post.user_name === profile.name || post.user_id === profile.id || post.user_id === profile.user_id;
                            const viewCount = (post.viewed_by || []).length;

                            return (
                                <Reveal key={post.id || i} onVisible={() => !isMe && markAsViewed(post.id, post.viewed_by)}>
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: isMe ? 'flex-end' : 'flex-start' }}>
                                        <div style={{ fontSize: '0.65rem', color: 'var(--text-dim)', marginBottom: '4px', padding: '0 8px', display: 'flex', gap: '5px' }}>
                                            {post.user_name} 
                                            {post.isTemp && <span style={{ opacity: 0.5 }}>• Sending...</span>}
                                        </div>
                                        <div className="chat-bubble-wrapper" style={{ maxWidth: '85%' }}>
                                            <div className="glass chat-bubble" style={{ 
                                                padding: '12px 16px', 
                                                borderRadius: isMe ? '20px 20px 4px 20px' : '20px 20px 20px 4px',
                                                background: isMe ? 'linear-gradient(135deg, var(--primary), var(--secondary))' : 'var(--input-bg)',
                                                color: isMe ? 'white' : 'var(--text-main)',
                                                border: isMe ? 'none' : '1px solid var(--border)',
                                                boxShadow: isMe ? '0 4px 15px var(--primary-glow)' : 'none',
                                                opacity: post.isTemp ? 0.7 : 1
                                            }}>
                                                {post.content && <div style={{ fontSize: '0.95rem', lineHeight: '1.5', whiteSpace: 'pre-wrap' }}>{post.content}</div>}
                                                {post.image_url && <img src={post.image_url} style={{ width: '100%', borderRadius: '12px', marginTop: '8px', cursor: 'pointer' }} alt="Post" onClick={() => window.open(post.image_url, '_blank')} />}
                                                {post.file_url && (
