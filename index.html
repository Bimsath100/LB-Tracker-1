        const Reveal = ({ children, delay = 0 }) => {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([entry]) => { if(entry.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
                if(ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);
            return ( <div ref={ref} style={{ width: '100%', minWidth: 0, opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(20px)', transition: `opacity 0.8s ease-out ${delay}s, transform 0.8s ease-out ${delay}s` }}>{children}</div> );

        const MarkChart = ({ title, data, field, color }) => {
            const ref = useRef(null); const inst = useRef(null);

                if (inst.current) inst.current.destroy();
                inst.current = new Chart(ctx, {
                    type: 'line', data: { labels: sorted.map((_, i) => 'P' + (i + 1)), datasets: [{ data: sorted.map(m => m[field]), borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointBackgroundColor: color }] },

        const ActivityFeed = ({ examLevel }) => {

                    <div className="dash-grid" style={{ marginBottom: '2rem' }}>
                        <Reveal><div className="glass card" style={{ height: '100%' }}><div className="card-header"><span className="card-title">Study Grid</span><span style={{ color: 'var(--primary)', fontWeight: '800', fontSize: '0.9rem' }}>{todayCount} / 15 hrs</span></div><div className="hour-grid">{Array.from({ length: 15 }).map((_, i) => <div key={i} className={`hour-btn ${history[viewDate]?.[i] ? 'active' : ''}`} onClick={() => toggleH(i)}>{i + 1}</div>)}</div></div></Reveal>
                        <Reveal delay={0.1}><div className="glass card"><span className="card-title">Calendar</span><input type="date" value={viewDate} onChange={e => setViewDate(e.target.value)} style={{ marginTop: '1rem' }} /><div style={{ marginTop: '1rem' }}>{[...Array(3)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); const k = d.toISOString().split('T')[0]; return <div key={k} style={{ display: 'flex', alignItems: 'center', padding: '12px', background: 'var(--input-bg)', borderRadius: '12px', marginBottom: '8px' }}><span>{d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' })}</span><span style={{ color: 'var(--primary)', fontWeight: '800', marginLeft: 'auto' }}>{(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0)}h</span></div>; })}</div></div></Reveal>
                    </div>
                    <div className="marks-grid">
                        <Reveal delay={0.2}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Weekly Overview</div><ProgressChart history={history} /></div></Reveal>
                        <Reveal delay={0.3}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Activity Trend</div><TrendChart history={history} /></div></Reveal>
                    </div>
                    <div className="community-hub">
                        <Reveal delay={0.4}><div className="glass card" style={{ padding: '1.5rem' }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}><h3 style={{ margin: 0, fontFamily: 'Outfit' }}>Live Activity Hub 🌍</h3><div className="live-indicator"><div className="live-dot"></div><span>LIVE UPDATES</span></div></div><ActivityFeed examLevel={profile.examLevel} /></div></Reveal>
                        <Reveal delay={0.5}><div className="glass card" style={{ padding: '1.5rem' }}><h3 style={{ marginBottom: '1.5rem', fontFamily: 'Outfit' }}>Top Districts Today 🏆</h3><DistrictLeaderboard examLevel={profile.examLevel} /></div></Reveal>
                    </div>
                </div>
            );
        };

        const SetupWizard = ({ user, onComplete }) => {
            const [step, setStep] = useState(0);
            const [f, setF] = useState({ name: '', district: 'Colombo', examYear: 2026, examMonth: 'August', examLevel: 'AL', subjects: [] });

            const finish = async () => {
                if (f.subjects.length === 0) return alert('Select at least one subject!');
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: f.name, 
                    district: f.district, 
                    exam_year: f.examYear, 
                    exam_month: f.examMonth,
                    exam_level: f.examLevel,
                    subjects: f.subjects,
                    history: {}
                });
                if (!error) onComplete(f);
                else alert(error.message);
            };

            const toggleSub = (s) => setF(prev => ({ ...prev, subjects: prev.subjects.includes(s) ? prev.subjects.filter(x => x !== s) : [...prev.subjects, s] }));
            const currentSubjects = f.examLevel === 'AL' ? AL_SUBJECTS : OL_SUBJECTS;

            return (
                <div className="setup-card glass card" style={{ maxWidth: '450px', margin: 'auto', textAlign: 'center', animation: 'modalPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                    {step === 0 && (
                        <Reveal>
                            <h2 className="card-title" style={{ marginBottom: '1.5rem' }}>Select Exam Level</h2>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '2rem' }}>
                                <button className={`glass ${f.examLevel === 'AL' ? 'active' : ''}`} onClick={() => setF({...f, examLevel: 'AL'})} style={{ padding: '2rem 1rem', border: f.examLevel === 'AL' ? '2px solid var(--primary)' : 'var(--glass-border)', borderRadius: '16px', cursor: 'pointer' }}>
                                    <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>🎓</div>
                                    <div style={{ fontWeight: '800' }}>A/L STUDENT</div>
                                </button>
                                <button className={`glass ${f.examLevel === 'OL' ? 'active' : ''}`} onClick={() => setF({...f, examLevel: 'OL'})} style={{ padding: '2rem 1rem', border: f.examLevel === 'OL' ? '2px solid var(--primary)' : 'var(--glass-border)', borderRadius: '16px', cursor: 'pointer' }}>
                                    <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>📝</div>
                                    <div style={{ fontWeight: '800' }}>O/L STUDENT</div>
                                </button>
                            </div>
                            <button className="btn-primary" onClick={() => setStep(1)}>Next Step <span style={{ marginLeft: '8px' }}>→</span></button>
                        </Reveal>
                    )}
                    {step === 1 && (
                        <Reveal>
                            <h2 className="card-title" style={{ marginBottom: '0.5rem' }}>Basic Details</h2>
                            <p style={{ color: 'var(--text-dim)', fontSize: '0.85rem', marginBottom: '1.5rem' }}>Let's get to know you better</p>
                            <div style={{ textAlign: 'left', marginBottom: '1.2rem' }}>
                                <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: '700', marginBottom: '6px', color: 'var(--text-dim)' }}>YOUR NAME</label>
                                <input className="glass" placeholder="e.g. John Doe" value={f.name} onChange={e => setF({...f, name: e.target.value})} />
                            </div>
                            <div style={{ textAlign: 'left', marginBottom: '1.2rem' }}>
                                <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: '700', marginBottom: '6px', color: 'var(--text-dim)' }}>DISTRICT</label>
                                <select className="glass" value={f.district} onChange={e => setF({...f, district: e.target.value})}>
                                    {DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}
                                </select>
                            </div>
                            <button className="btn-primary" onClick={() => setStep(2)} disabled={!f.name}>Next Step <span style={{ marginLeft: '8px' }}>→</span></button>
                        </Reveal>
                    )}
                    {step === 2 && (
                        <Reveal>
                            <h2 className="card-title" style={{ marginBottom: '0.5rem' }}>Exam Target</h2>
                            <p style={{ color: 'var(--text-dim)', fontSize: '0.85rem', marginBottom: '1.5rem' }}>When is your big day?</p>
                            <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.5rem' }}>
                                <div style={{ flex: 1, textAlign: 'left' }}>
                                    <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: '700', marginBottom: '6px', color: 'var(--text-dim)' }}>YEAR</label>
                                    <select className="glass" value={f.examYear} onChange={e => setF({...f, examYear: parseInt(e.target.value)})}>
                                        {[2024, 2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                                    </select>
                                </div>
                                <div style={{ flex: 1, textAlign: 'left' }}>
                                    <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: '700', marginBottom: '6px', color: 'var(--text-dim)' }}>MONTH</label>
                                    <select className="glass" value={f.examMonth} onChange={e => setF({...f, examMonth: e.target.value})}>
                                        {MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                            </div>
                            <button className="btn-primary" onClick={() => setStep(3)}>Next Step <span style={{ marginLeft: '8px' }}>→</span></button>
                        </Reveal>
                    )}
                    {step === 3 && (
                        <Reveal>
                            <h2 className="card-title" style={{ marginBottom: '0.5rem' }}>Your Subjects</h2>
                            <p style={{ color: 'var(--text-dim)', fontSize: '0.85rem', marginBottom: '1.5rem' }}>Select the subjects you are studying</p>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', justifyContent: 'center', marginBottom: '2rem' }}>
                                {currentSubjects.map(s => (
                                    <div key={s} onClick={() => toggleSub(s)} className={`glass ${f.subjects.includes(s) ? 'active' : ''}`} style={{ padding: '8px 16px', borderRadius: '100px', fontSize: '0.85rem', fontWeight: '700', cursor: 'pointer', border: f.subjects.includes(s) ? '1px solid var(--primary)' : '1px solid var(--border)', background: f.subjects.includes(s) ? 'var(--primary-glow)' : 'transparent', color: f.subjects.includes(s) ? 'var(--primary)' : 'var(--text-dim)', transition: '0.3s' }}>
                                        {s}
                                    </div>
                                ))}
                            </div>
                            <button className="btn-primary" onClick={finish} disabled={f.subjects.length === 0}>Complete Setup <span style={{ marginLeft: '8px' }}>🎉</span></button>
                        </Reveal>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [setupDone, setSetupDone] = useState(false);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);
            const [history, setHistory] = useState({});
            const [marks, setMarks] = useState([]);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [isLightMode, setIsLightMode] = useState(() => localStorage.getItem('theme') === 'light');
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [liveUsers, setLiveUsers] = useState(1);
            const [markedToday, setMarkedToday] = useState(0);
            const [announcement, setAnnouncement] = useState('');
            const [announcementInput, setAnnouncementInput] = useState('');
            const [showAnnounceModal, setShowAnnounceModal] = useState(false);
            const [adminView, setAdminView] = useState(null);
            const [liveDetails, setLiveDetails] = useState([]);
            const [markedDetails, setMarkedDetails] = useState([]);

            useEffect(() => {
                const handleBeforeInstall = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);
                if (window.deferredPrompt) setDeferredPrompt(window.deferredPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            useEffect(() => {
                document.body.classList.toggle('light-mode', isLightMode);
                localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
            }, [isLightMode]);

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) { 
                        setUser(session.user); 
                        fetchUserData(session.user.id); 
                    } else { 
                        setLoading(false); 
                    }
                }).catch(err => {
                    console.error("Auth Error:", err);
                    setLoading(false);
                });

                const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
                    if (session) { 
                        setUser(session.user); 
                        fetchUserData(session.user.id); 
                    } else { 
                        setUser(null); 
                        setProfile(null); 
                        setLoading(false); 
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            const fetchUserData = async (uid) => {
                try {
                    const { data, error } = await sb.from('study_tracker_v2').select('*').eq('user_id', uid).maybeSingle();
                    if (data) {
                        setProfile({ 
                            name: data.name, 
                            district: data.district, 
                            subjects: data.subjects, 
                            examYear: data.exam_year, 
                            examMonth: data.exam_month,
                            examLevel: data.exam_level || 'AL'
                        });
                        setHistory(data.history || {});
                        setSetupDone(true);
                    } else {
                        setSetupDone(false);
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => {
                const channel = sb.channel('online-users', {
                    config: { presence: { key: user?.id || Math.random().toString(36).substring(7) } }
                });

                channel
                    .on('presence', { event: 'sync' }, () => {
                        const newState = channel.presenceState();
                        const allProfiles = Object.values(newState).flat();
                        const uniqueMap = new Map();
                        allProfiles.forEach(p => {
                            const key = p.email || p.name;
                            if (!uniqueMap.has(key) || (p.name !== 'Guest' && uniqueMap.get(key).name === 'Guest')) {
                                uniqueMap.set(key, { name: p.name || 'Guest Visitor', email: p.email });
                            }
                        });
                        const details = Array.from(uniqueMap.values());
                        setLiveDetails(details);
                        setLiveUsers(details.length > 0 ? details.length : 1);
                    })
                    .subscribe(async (status) => {
                        if (status === 'SUBSCRIBED') {
                            await channel.track({ 
                                name: profile?.name || 'Guest', 
                                email: user?.email,
                                online_at: new Date().toISOString() 
                            });
                        }
                    });

                return () => { channel.unsubscribe(); };
            }, [user, profile?.name]);

            useEffect(() => {
                const isAdmin = user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                if (!isAdmin) {
                    const handleContextMenu = (e) => e.preventDefault();
                    const handleKeyDown = (e) => {
                        if (
                            e.keyCode === 123 ||
                            (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) ||
                            (e.ctrlKey && e.keyCode === 85)
                        ) {
                            e.preventDefault();
                            return false;
                        }
                    };
                    document.addEventListener('contextmenu', handleContextMenu);
                    document.addEventListener('keydown', handleKeyDown);
                    return () => {
                        document.removeEventListener('contextmenu', handleContextMenu);
                        document.removeEventListener('keydown', handleKeyDown);
                    };
                }
            }, [user]);

            useEffect(() => {
                if (user && profile) {
                    const fetchMarked = async () => {
                        try {
                            const today = new Date().toISOString().split('T')[0];
                            const { data, error } = await sb.from('study_tracker_v2')
                                .select('name, district, history')
                                .eq('exam_level', profile.examLevel)
                                .not(`history->${today}`, 'is', null);
                            
                            if (!error && data) {
                                setMarkedToday(data.length);
                                if (user.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                                    const details = data.map(d => ({ 
                                        name: d.name || 'Unknown', 
                                        district: d.district || 'N/A', 
                                        hours: (d.history && Array.isArray(d.history[today])) ? d.history[today].filter(Boolean).length : 0 
                                    })).sort((a, b) => b.hours - a.hours);
                                    setMarkedDetails(details);
                                }
                            }
                        } catch (e) {
                            console.error("Fetch Marked Error:", e);
                        }
                    };
                    fetchMarked();

                    const channel = sb.channel('global-realtime')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                            fetchMarked();
                        })
                        .subscribe();

                    const inv = setInterval(fetchMarked, 30000);
                    return () => {
                        clearInterval(inv);
                        sb.removeChannel(channel);
                    };
                }
            }, [user, profile]);

            useEffect(() => {
                const fetchAnnouncement = async () => {
                    const { data } = await sb.from('study_tracker_v2').select('history').eq('name', 'LB_ADMIN_OFFICIAL').maybeSingle();
                    if (data && data.history?.msg) {
                        const msg = data.history.msg;
                        setAnnouncement(msg);
                        setAnnouncementInput(msg);
                        const lastSeen = localStorage.getItem('lastSeenAnnounce');
                        if (msg && msg !== lastSeen) {
                            setShowAnnounceModal(true);
                        }
                    }
                };
                fetchAnnouncement();
                const inv = setInterval(fetchAnnouncement, 60000);
                return () => clearInterval(inv);
            }, []);

            const updateAnnouncement = async () => {
                if (!user) return;
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: 'LB_ADMIN_OFFICIAL', 
                    district: profile?.district || 'Colombo', 
                    history: { ...history, msg: announcementInput },
                    subjects: profile?.subjects || [],
                    exam_year: profile?.examYear || 2026,
                    exam_month: profile?.examMonth || 'August'
                });
                if (!error) {
                    setAnnouncement(announcementInput);
                    alert('Broadcast updated successfully! ✅');
                } else {
                    alert('Error updating broadcast: ' + error.message);
                }
            };

            const fetchUserData = async (uid) => {
                try {
                    const { data, error } = await sb.from('study_tracker_v2').select('*').eq('user_id', uid).single();
                    if (data) {
                        setProfile({ 
                            name: data.name, 
                            district: data.district, 
                            subjects: data.subjects, 
                            examYear: data.exam_year, 
                            examMonth: data.exam_month,
                            examLevel: data.exam_level || 'A/L'
                        });
                        setHistory(data.history || {});
                        setMarks(data.marks || []);
                    }
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handleLogin = async () => { await sb.auth.signInWithOAuth({ provider: 'google' }); };
            const handleLogout = async () => { await sb.auth.signOut(); window.location.reload(); };

            const saveProfile = async (p) => {
                setLoading(true);
                const payload = {
                    user_id: user.id,
                    name: p.name,
                    district: p.district,
                    subjects: p.subjects,
                    exam_year: p.examYear,
                    exam_month: p.examMonth,
                    exam_level: p.examLevel,
                    history: history,
                    marks: marks
                };
                const { error } = await sb.from('study_tracker_v2').upsert(payload);
                if (error) { console.error("Save Error:", error); alert("Error saving profile: " + error.message); }
                else { setProfile(p); setIsEditMode(false); setCurrentPage('dashboard'); }
                setLoading(false);
            };

            const pushData = async (h, m) => {
                if (!user || !profile) return;
                await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile.name, district: profile.district, subjects: profile.subjects,
                    exam_year: profile.examYear, exam_month: profile.examMonth, exam_level: profile.examLevel, 
                    history: h, marks: m 
                });
            };

            useEffect(() => {
                if (!profile) return;
                const monthIdx = MONTHS.indexOf(profile.examMonth);
                const target = new Date(profile.examYear, monthIdx, 1);
                const timer = setInterval(() => {
                    const diff = target - new Date();
                    if (diff > 0) setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                    else setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                }, 1000);
                return () => clearInterval(timer);
            }, [profile]);

            if (loading) return <LoadingScreen />;
            if (!user) return <LandingPage onLogin={handleLogin} deferredPrompt={deferredPrompt} onInstall={handleInstallApp} />;
            if (!profile || isEditMode) return <SetupWizard onComplete={saveProfile} initialData={profile} onCancel={() => setIsEditMode(false)} />;

            return (
                <div>
                    <div className="live-bg"><div className="blob blob-1"></div><div className="blob blob-2"></div></div>
                    <SubjectBackground subject={currentPage} />

                    <nav className="navbar">
                        <div className="nav-container">
                            <div className="nav-brand" onClick={() => setCurrentPage('dashboard')} style={{ cursor: 'pointer' }}>
                                <div className="nav-logo">LB</div>
                                <span className="nav-tracker">Tracker</span>
                                {user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase() && (
                                    <div style={{ display: 'flex', gap: '5px' }}>
                                        <div className="live-indicator" onClick={() => setAdminView('live')} style={{ cursor: 'pointer' }}>
                                            <div className="live-dot"></div>
                                            <span>{liveUsers} LIVE</span>
                                        </div>
                                        <div className="live-indicator" onClick={() => setAdminView('marked')} style={{ cursor: 'pointer', background: 'rgba(99, 102, 241, 0.1)', border: '1px solid rgba(99, 102, 241, 0.2)', color: 'var(--primary)' }}>
                                            <div className="live-dot" style={{ background: 'var(--primary)', boxShadow: '0 0 8px var(--primary)' }}></div>
                                            <span>{markedToday} MARKED</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="nav-links">
                                <div className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</div>
                                <div className={`nav-link ${currentPage === 'subjects' || profile.subjects.includes(currentPage) ? 'active' : ''}`} onClick={() => setCurrentPage('subjects')}>Subjects</div>
                                <div className={`nav-link ${currentPage === 'tutorial' ? 'active' : ''}`} onClick={() => setCurrentPage('tutorial')}>How to Use</div>
                                <div className={`nav-link ${currentPage === 'feedback' ? 'active' : ''}`} onClick={() => setCurrentPage('feedback')}>Feedback</div>
                                <a href="https://t.me/+iC6s-QtB3gI5N2U1" target="_blank" rel="noopener noreferrer" className="nav-join">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
                                    Join us
                                </a>
                            </div>
                        </div>
                    </nav>

                    <div className="floating-settings" onClick={() => setIsSettingsOpen(!isSettingsOpen)}>{isSettingsOpen ? '✕' : '⚙️'}</div>
                    {isSettingsOpen && (
                        <div className="glass settings-menu">
                            <div style={{ fontSize: '0.75rem', marginBottom: '15px', color: 'var(--text-dim)', textAlign: 'center' }}>{user.email}</div>
                            {deferredPrompt && (
                                <button className="btn-primary" style={{ marginBottom: '10px', background: '#10B981', color: 'white', border: 'none', boxShadow: '0 8px 20px rgba(16, 185, 129, 0.3)' }} onClick={handleInstallApp}>
                                    📱 Install App
                                </button>
                            )}
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--primary-glow)', color: 'var(--text-main)', border: '1px solid var(--primary)' }} onClick={() => { setCurrentPage('tutorial'); setIsSettingsOpen(false); }}>
                                📖 How to Use
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--input-bg)', color: 'var(--text-main)', border: '1px solid var(--border)' }} onClick={async () => {
                                const permission = await Notification.requestPermission();
                                if (permission === 'granted') {
                                    new Notification("LB Tracker 🚀", { body: "Reminders enabled! We'll remind you to log your hours.", icon: "lb-icon-192.png" });
                                } else {
                                    alert("Please enable notifications in your browser settings.");
                                }
                            }}>
                                🔔 Enable Reminders
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--input-bg)', color: 'var(--text-main)', border: '1px solid var(--border)' }} onClick={() => setIsLightMode(!isLightMode)}>
                                {isLightMode ? '🌙 Dark Mode' : '☀️ Light Mode'}
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px' }} onClick={() => { setIsEditMode(true); setIsSettingsOpen(false); }}>👤 Edit Profile</button>
                            <button className="btn-primary" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', border: '1px solid rgba(239, 68, 68, 0.2)' }} onClick={handleLogout}>🚪 Logout</button>
                        </div>
                    )}


                    <nav className="mobile-nav">
                        <MobileItem active={currentPage === 'dashboard'} icon="🏠" label="Home" onClick={() => setCurrentPage('dashboard')} />
                        <MobileItem active={currentPage === 'subjects' || profile.subjects.includes(currentPage)} icon="📚" label="Subjects" onClick={() => setCurrentPage('subjects')} />
                        <MobileItem active={currentPage === 'tutorial'} icon="📖" label="Guide" onClick={() => setCurrentPage('tutorial')} />
                        <MobileItem active={currentPage === 'feedback'} icon="⭐" label="Rate" onClick={() => setCurrentPage('feedback')} />
                        <div className="mobile-item tg-item" onClick={() => window.open('https://t.me/+iC6s-QtB3gI5N2U1', '_blank')}>
                            <span className="m-icon">✈️</span>
                            <span className="m-label">Join</span>
                        </div>
                    </nav>

                    {adminView && (
                        <div className="admin-modal-overlay" onClick={() => setAdminView(null)}>
                            <div className="admin-modal glass" onClick={e => e.stopPropagation()}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem' }}>
                                    <h2 style={{ fontFamily: 'Outfit', margin: 0 }}>Admin Controls</h2>
                                    <button onClick={() => setAdminView(null)} style={{ background: 'none', border: 'none', color: 'white', fontSize: '1.5rem', cursor: 'pointer' }}>✕</button>
                                </div>

                                <div className="glass" style={{ padding: '1.2rem', marginBottom: '1.5rem', background: 'rgba(99, 102, 241, 0.05)', border: '1px solid var(--primary-glow)', borderRadius: '18px' }}>
                                    <div style={{ fontWeight: '800', fontSize: '0.8rem', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <span>📢</span> BROADCAST MESSAGE
                                    </div>
                                    <textarea 
                                        value={announcementInput}
                                        onChange={e => setAnnouncementInput(e.target.value)}
                                        placeholder="Type a message to all students..."
                                        style={{ width: '100%', minHeight: '80px', background: 'var(--input-bg)', border: '1px solid var(--border)', borderRadius: '12px', padding: '10px', color: 'white', fontSize: '0.85rem', marginBottom: '10px', outline: 'none' }}
                                    />
                                    <button className="btn-primary" onClick={updateAnnouncement} style={{ height: '40px', fontSize: '0.8rem' }}>Update Broadcast</button>
                                </div>
                                
                                <h4 style={{ fontSize: '0.9rem', marginBottom: '1rem', opacity: 0.8 }}>{adminView === 'live' ? 'Online Students' : 'Today\'s Progress'}</h4>
                                
                                {adminView === 'live' ? (
                                    <div>
                                        {liveDetails.length === 0 ? <p>No one online</p> : 
                                            liveDetails.map((u, i) => (
                                                <div key={i} className="admin-list-item">
                                                    <div>
                                                        <div style={{ fontWeight: '700' }}>{u.name}</div>
                                                        <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{u.email}</div>
                                                    </div>
                                                    <div className="live-dot"></div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                ) : (
                                    <div>
                                        {markedDetails.length === 0 ? <p>No one marked today</p> : 
                                            markedDetails.map((u, i) => (
                                                <div key={i} className="admin-list-item">
                                                    <div>
                                                        <div style={{ fontWeight: '700' }}>{u.name}</div>
                                                        <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{u.district}</div>
                                                    </div>
                                                    <div style={{ fontWeight: '800', color: 'var(--primary)' }}>{u.hours} hrs</div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <main className="main-content">
                        <div className="container">
                            {currentPage === 'dashboard' ? (
                                <DashboardView profile={profile} history={history} setHistory={h => { setHistory(h); pushData(h, marks); }} viewDate={viewDate} setViewDate={setViewDate} timeLeft={timeLeft} liveUsers={liveUsers} markedToday={markedToday} announcement={announcement} showAnnounceModal={showAnnounceModal} setShowAnnounceModal={setShowAnnounceModal} />
                            ) : currentPage === 'subjects' ? (
                                <SubjectsGridView subjects={profile.subjects} onSelect={s => setCurrentPage(s)} marks={marks} />
                            ) : currentPage === 'feedback' ? (
                                <FeedbackView profile={profile} />
                            ) : currentPage === 'tutorial' ? (
                                <TutorialView />
                            ) : (
                                <SubjectView subject={currentPage} marks={marks} setMarks={m => { setMarks(m); pushData(history, m); }} />
                            )}
                        </div>
                        <footer style={{ textAlign: 'center', padding: '4rem 1rem 3rem', color: 'var(--text-dim)', fontSize: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase', opacity: 0.5, fontWeight: '800' }}>
                            © 2026 LB Tracker • Developed by BIMSATH WALPOLA
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    </script>
</body>
</html>
