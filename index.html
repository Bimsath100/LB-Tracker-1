<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Study Tracker | Pro Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS Variables / Themes */
        :root {
            --primary: #3B82F6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #050505;
            --navbar-bg: rgba(5, 5, 5, 0.65);
            --card-bg: rgba(20, 20, 20, 0.7);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --input-bg: rgba(0,0,0,0.2);
            --btn-text: #050505;
            --btn-bg: #FFFFFF;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --primary: #006FEE;
            --primary-glow: rgba(0, 111, 238, 0.3);
            --bg-dark: #F4F7FF;
            --navbar-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #FFFFFF;
            --text-main: #001C39;
            --text-dim: #64748B;
            --border: rgba(0, 28, 57, 0.08);
            --glass-border: 1px solid rgba(0, 28, 57, 0.08);
            --input-bg: #F1F5F9;
            --btn-text: #FFFFFF;
            --btn-bg: #001C39;
            --gradient: linear-gradient(135deg, #006FEE 0%, #7828C8 100%);
            --card-shadow: 0 12px 40px rgba(0, 30, 80, 0.06);
        }

        [data-theme="glass"] {
            --primary: #F43F5E;
            --primary-glow: rgba(244, 63, 94, 0.5);
            --bg-dark: #0f172a;
            --navbar-bg: rgba(255, 255, 255, 0.05);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #e2e8f0;
            --border: rgba(255, 255, 255, 0.2);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --input-bg: rgba(255, 255, 255, 0.05);
            --btn-text: #FFFFFF;
            --btn-bg: rgba(255, 255, 255, 0.2);
            --gradient: linear-gradient(135deg, #F43F5E 0%, #8B5CF6 100%);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none; opacity: 0.05;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            mix-blend-mode: overlay;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; display: block; position: relative; transition: background-color 0.5s ease; }

        /* Dynamic Background */
        .live-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #050505, #120917, #0d0b14, #08111e); background-size: 400% 400%; animation: gradientBG 20s ease infinite; transition: background 0.5s; }
        [data-theme="glass"] .live-bg { background: linear-gradient(135deg, #1e3a8a, #831843, #581c87); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        [data-theme="light"] .live-bg { background: linear-gradient(135deg, #F8FAFC, #E0E7FF, #F3E8FF, #F8FAFC); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .blob { position: absolute; width: 800px; height: 800px; filter: blur(120px); border-radius: 50%; animation: move 30s infinite alternate cubic-bezier(0.45, 0, 0.55, 1); opacity: 0.6; }
        .blob-1 { top: -200px; right: -200px; background: rgba(59, 130, 246, 0.15); }
        .blob-2 { bottom: -300px; left: -300px; background: rgba(139, 92, 246, 0.15); }
        .blob-3 { top: 40%; left: 30%; width: 400px; height: 400px; background: rgba(0, 212, 255, 0.1); animation-duration: 20s; }
        @keyframes move { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(150px, -50px) scale(1.1) rotate(180deg); } 100% { transform: translate(-50px, 150px) scale(1) rotate(360deg); } }

        /* Subject Floating Backgrounds */
        .floating-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; opacity: 0.35; }
        .float-icon { position: absolute; font-size: 7rem; animation: floatUp linear infinite; color: var(--text-main); text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); filter: drop-shadow(0 0 8px var(--primary)); }
        .float-icon-0 { left: 5%; bottom: -20%; animation-duration: 25s; animation-delay: 0s; }
        .float-icon-1 { left: 15%; bottom: -20%; animation-duration: 32s; animation-delay: 12s; }
        .float-icon-2 { left: 25%; bottom: -20%; animation-duration: 20s; animation-delay: 3s; }
        .float-icon-3 { left: 35%; bottom: -20%; animation-duration: 38s; animation-delay: 8s; }
        .float-icon-4 { left: 45%; bottom: -20%; animation-duration: 28s; animation-delay: 1s; }
        .float-icon-5 { left: 55%; bottom: -20%; animation-duration: 24s; animation-delay: 15s; }
        .float-icon-6 { left: 65%; bottom: -20%; animation-duration: 30s; animation-delay: 5s; }
        .float-icon-7 { left: 75%; bottom: -20%; animation-duration: 22s; animation-delay: 2s; }
        .float-icon-8 { left: 85%; bottom: -20%; animation-duration: 35s; animation-delay: 10s; }
        .float-icon-9 { left: 95%; bottom: -20%; animation-duration: 26s; animation-delay: 6s; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Navbar - Top Ribbon Style */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: var(--navbar-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            display: flex; align-items: center; justify-content: center;
            padding: 0 2rem; z-index: 2000; border-bottom: var(--glass-border); transition: background 0.5s;
        }

        .nav-container { width: 100%; max-width: 1400px; display: flex; align-items: center; justify-content: space-between; }

        .nav-brand { display: flex; align-items: center; gap: 15px; color: var(--text-main); text-decoration: none; }
        .nav-logo { 
            width: 44px; height: 44px; background: var(--gradient); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            font-size: 1.2rem; box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
        }
        .nav-title { font-family: 'Outfit'; font-weight: 700; letter-spacing: 1px; font-size: 1.4rem; color: var(--text-main); }

        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; padding: 8px 16px; 
            border-radius: 8px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; cursor: pointer;
        }
        .nav-link.active { color: var(--text-main); background: var(--input-bg); border: var(--glass-border); }
        .nav-link:hover { color: var(--text-main); background: var(--border); }

        .nav-btn-danger { color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-weight: 600; margin-left: 10px; transition: 0.3s; background: rgba(239, 68, 68, 0.05); }
        .nav-btn-danger:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); }

        .main-content { width: 100%; padding: 120px 0 5rem 0; display: flex; flex-direction: column; align-items: center; }

        .dashboard-wrapper {
            width: 95%; max-width: 1400px; margin: 0 auto;
            position: relative; border-radius: 24px; padding: 3rem 0;
        }

        .greeting { margin-bottom: 3rem; margin-top: 0; text-align: center; }
        .greeting h1 { 
            font-family: 'Outfit'; font-size: 3.5rem; font-weight: 700; 
            color: var(--text-main);
            line-height: 1.2; letter-spacing: -1px;
        }
        .greeting p { color: var(--text-dim); font-size: 1.2rem; font-weight: 400; margin-top: 10px; }

        .countdown-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; padding: 2rem; border: var(--glass-border);
            display: flex; justify-content: space-around; margin-bottom: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); color: var(--text-main);
            transition: all 0.5s;
        }

        .cd-val { font-family: 'Outfit'; font-size: 3.5rem; font-weight: 700; line-height: 1; letter-spacing: -1px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cd-lbl { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; color: var(--text-dim); }

        .hero-card {
            background: var(--card-bg); border-radius: 24px; padding: 3rem;
            border: var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow); margin-bottom: 2.5rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 2rem;
            position: relative; overflow: hidden; z-index: 10;
        }
        .hero-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 50%);
            animation: heroGlow 8s infinite alternate; z-index: -1; opacity: 0.2; pointer-events: none;
        }
        @keyframes heroGlow { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }
        .hero-title { font-family: 'Outfit'; font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 10px; color: var(--text-main); letter-spacing: -1px; }
        .hero-subtitle { color: var(--text-dim); font-size: 1.2rem; font-weight: 500; }
        .hero-cd-wrapper { background: var(--input-bg); padding: 1.5rem 2.5rem; border-radius: 20px; border: var(--glass-border); display: flex; gap: 2rem; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .dash-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 2.2rem;
            border: var(--glass-border); height: 100%; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--card-shadow); transition: transform 0.3s, border-color 0.3s, background 0.5s, box-shadow 0.5s;
            position: relative; z-index: 10;
        }
        .card:hover { 
            border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); 
            transform: translateY(-8px) scale(1.01); z-index: 20;
        }
        [data-theme="light"] .card:hover { box-shadow: 0 20px 40px rgba(0, 30, 80, 0.15); }
        [data-theme="glass"] .card:hover { box-shadow: 0 20px 40px rgba(31, 38, 135, 0.4); }
        .card-title { font-family: 'Outfit'; font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        .tracker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 25px; }
        .hour-btn {
            aspect-ratio: 1; background: var(--input-bg); border: var(--glass-border);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--text-dim); font-size: 1.8rem; font-family: 'Outfit';
        }
        .hour-btn:hover { background: var(--border); border-color: var(--text-dim); }
        .hour-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); animation: pulseActive 2s infinite; }
        @keyframes pulseActive { 0% { box-shadow: 0 0 10px var(--primary-glow); transform: scale(1); } 50% { box-shadow: 0 0 25px var(--primary-glow); transform: scale(1.05); } 100% { box-shadow: 0 0 10px var(--primary-glow); transform: scale(1); } }

        .stat-card { background: var(--input-bg); padding: 1.5rem; border-radius: 16px; border: var(--glass-border); margin-bottom: 1.2rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stat-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); border-color: var(--primary); }
        [data-theme="light"] .stat-card:hover { box-shadow: 0 15px 30px rgba(0, 30, 80, 0.1); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--text-main); font-family: 'Outfit'; }
        .stat-lbl { font-size: 0.9rem; color: var(--text-dim); margin-top: 5px; }

        input, select { background: var(--input-bg); border: var(--glass-border); color: var(--text-main); padding: 14px 16px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); background: var(--border); box-shadow: 0 0 0 3px var(--primary-glow); }
        button.btn-primary { background: var(--btn-bg); border: var(--glass-border); color: var(--btn-text); padding: 14px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem; width: 100%; transition: 0.3s; }
        button.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); opacity: 0.9; }

        .marks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; position: relative; z-index: 10; }
        .subject-section { margin-bottom: 3rem; }
        .subject-title { font-family: 'Outfit'; font-size: 1.8rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .chart-box { height: 200px; margin-top: 10px; }

        .theme-select { width: auto; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; margin-left: 10px; }

        @media (max-width: 768px) {
            .navbar { height: auto; padding: 1rem; flex-direction: column; gap: 1rem; }
            .nav-container { flex-direction: column; gap: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .nav-link { padding: 6px 10px; font-size: 0.85rem; }
            .theme-select { margin-left: 0; }
            .main-content { padding-top: 140px; }
            .hero-card { padding: 2rem; justify-content: center; text-align: center; }
            .hero-title { font-size: 2.5rem; }
            .hero-cd-wrapper { width: 100%; justify-content: center; flex-wrap: wrap; gap: 1rem; padding: 1.5rem; }
            .cd-val { font-size: 2.2rem; }
            .dash-grid { grid-template-columns: 1fr !important; gap: 1rem; }
            .card { padding: 1.5rem; border-radius: 16px; min-width: auto !important; width: 100%; }
            .tracker-grid { gap: 12px; margin-top: 15px; grid-template-columns: repeat(5, 1fr); }
            .hour-btn { border-radius: 12px; font-size: 1.2rem; }
            .stat-val { font-size: 1.6rem; }
        }

        @media (max-width: 480px) {
            .tracker-grid { grid-template-columns: repeat(4, 1fr); }
            .hero-title { font-size: 2rem; }
            .cd-val { font-size: 1.8rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CLOUD SYNC CONFIG (Supabase) ---
        const SB_URL = "https://gemcglmmjbicgbvdhdee.supabase.co"; 
        const SB_KEY = "sb_publishable_XhYi9wPvuOOLjRdpjaqUWg_xKXL2Dg6";
        const sb = (SB_URL && SB_KEY) ? supabase.createClient(SB_URL, SB_KEY) : null;

        const Reveal = ({ children, delay = 0, y = 40 }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.disconnect();
                    }
                }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div ref={ref} style={{
                    opacity: isVisible ? 1 : 0,
                    transform: isVisible ? 'translateY(0)' : `translateY(${y}px)`,
                    transition: `all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${delay}s`,
                    willChange: 'opacity, transform',
                    height: '100%'
                }}>
                    {children}
                </div>
            );
        };

        const SubjectBackground = ({ subject }) => {
            const baseIcons = {
                'ICT': ['💻', '💾', '⚡', '☁️', '🌐', '⌨️', '🖱️'],
                'ET': ['⚙️', '🏎️', '🏗️', '🔧', '🏭', '🔨', '🚜'],
                'SFT': ['🧬', '🔬', '⚛️', '🌡️', '🔭', '🧪', '🌿'],
                'dashboard': ['🎓', '📚', '🏆', '⏳', '💡', '📈', '🎯', '🏅']
            }[subject] || [];

            // Repeat to make dense background array of 20 icons
            const icons = Array.from({ length: 20 }, (_, i) => baseIcons[i % baseIcons.length]);

            return (
                <div className="floating-bg">
                    {icons.map((icon, i) => (
                        <div key={i} className={`float-icon float-icon-${i % 10}`}>
                            {icon}
                        </div>
                    ))}
                </div>
            );
        };

        const LoadingScreen = ({ onComplete }) => {
            useEffect(() => {
                const tl = gsap.timeline({ onComplete });
                tl.to('.loader-logo', { scale: 1.1, opacity: 1, duration: 0.8, ease: "power2.out" })
                  .to('.loader-bar-fill', { width: '100%', duration: 1.2, ease: "power3.inOut" }, "-=0.3")
                  .to('.loader-container', { opacity: 0, y: -40, duration: 0.6, ease: "power2.in" });
            }, [onComplete]);

            return (
                <div className="loader-container" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'var(--bg-dark)', zIndex: 9999, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', transition: 'background 0.5s' }}>
                    <div className="loader-logo" style={{ fontSize: '4rem', fontWeight: '900', fontFamily: 'Outfit', opacity: 0, transform: 'scale(0.8)', background: 'var(--gradient)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', letterSpacing: '2px', marginBottom: '2.5rem' }}>
                        LB TRACKER
                    </div>
                    <div className="loader-bar" style={{ width: '260px', height: '4px', background: 'var(--input-bg)', borderRadius: '4px', overflow: 'hidden' }}>
                        <div className="loader-bar-fill" style={{ width: '0%', height: '100%', background: 'var(--gradient)' }}></div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard'); // 'dashboard', 'ICT', 'ET', 'SFT'
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);
            const [modal, setModal] = useState({ open: false, title: '', msg: '', onConfirm: null });
            const [syncing, setSyncing] = useState(false);
            const [theme, setTheme] = useState(() => localStorage.getItem('appTheme') || 'dark');
            
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('apStudyHistoryV2');
                return saved ? JSON.parse(saved) : {};
            });
            const [todayHours, setTodayHours] = useState(new Array(15).fill(false));
            
            const [marksData, setMarksData] = useState(() => {
                const saved = localStorage.getItem('apStudyMarksV1');
                return saved ? JSON.parse(saved) : [];
            });

            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [lastError, setLastError] = useState(null);

            // Theme Effect
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('appTheme', theme);
            }, [theme]);

            const pushToCloud = async (h, m) => {
                if (!sb) { setLastError("SB Client not initialized"); return; }
                setSyncing(true); setLastError(null);
                try {
                    const { error } = await sb.from('study_tracker').upsert({ id: 'user_data', history: h, marks: m });
                    if (error) {
                        console.error("Cloud Push Error:", error);
                        setLastError("Push Error: " + error.message);
                    }
                } catch (e) { 
                    console.error("Sync Exception:", e); 
                    setLastError("Push Exception: " + e.message);
                }
                setSyncing(false);
            };

            const pullFromCloud = async () => {
                if (!sb) { setLastError("SB Client not initialized"); return; }
                setSyncing(true); setLastError(null);
                try {
                    const { data, error } = await sb.from('study_tracker').select('*').eq('id', 'user_data').single();
                    if (error && error.code !== 'PGRST116') {
                        console.error("Cloud Pull Error:", error);
                        setLastError("Pull Error: " + error.message);
                    }
                    if (data) {
                        setHistory(data.history || {});
                        setMarksData(data.marks || []);
                        localStorage.setItem('apStudyHistoryV2', JSON.stringify(data.history || {}));
                        localStorage.setItem('apStudyMarksV1', JSON.stringify(data.marks || []));
                    }
                } catch (e) { 
                    console.error("Sync Exception:", e); 
                    setLastError("Pull Exception: " + e.message);
                }
                setSyncing(false);
            };

            useEffect(() => { 
                pullFromCloud(); 
                const interval = setInterval(pullFromCloud, 20000); 
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const data = history[viewDate] || new Array(15).fill(false);
                setTodayHours(data);
            }, [viewDate, history]);

            useEffect(() => {
                const target = new Date('2026-08-01T00:00:00');
                const timer = setInterval(() => {
                    const diff = target - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24),
                            m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const toggleHour = (index) => {
                const updated = [...todayHours];
                updated[index] = !updated[index];
                setTodayHours(updated);
                const newHistory = { ...history, [viewDate]: updated };
                setHistory(newHistory);
                localStorage.setItem('apStudyHistoryV2', JSON.stringify(newHistory));
                pushToCloud(newHistory, marksData);
            };

            const addMark = (mark) => {
                let updated;
                if (mark.id && marksData.find(m => m.id === mark.id)) {
                    updated = marksData.map(m => m.id === mark.id ? mark : m);
                } else {
                    updated = [...marksData, { ...mark, id: Date.now() }];
                }
                setMarksData(updated);
                localStorage.setItem('apStudyMarksV1', JSON.stringify(updated));
                pushToCloud(history, updated);
            };

            const deleteMark = (id) => {
                setModal({
                    open: true,
                    title: 'ලකුණු මකන්නද?',
                    msg: 'ඔබට මෙම පේපර් එකේ ලකුණු ඉවත් කිරීමට අවශ්‍ය බව විශ්වාසද?',
                    onConfirm: () => {
                        const updated = marksData.filter(m => m.id !== id);
                        setMarksData(updated);
                        localStorage.setItem('apStudyMarksV1', JSON.stringify(updated));
                        setModal({ ...modal, open: false });
                        pushToCloud(history, updated);
                    }
                });
            };

            const clearAllData = () => {
                setModal({
                    open: true,
                    title: 'සියල්ල මකන්නද?',
                    msg: 'ඔබේ සියලුම ඉගෙනීමේ දත්ත සහ ලකුණු ස්ථිරවම මකන්නද?',
                    onConfirm: () => {
                        localStorage.removeItem('apStudyHistoryV2');
                        localStorage.removeItem('apStudyMarksV1');
                        setHistory({}); setMarksData([]);
                        setTodayHours(new Array(15).fill(false));
                        setModal({ ...modal, open: false });
                        pushToCloud({}, []);
                    }
                });
            };

            return (
                <div>
                    <div className="noise"></div>
                    {modal.open && (
                        <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(10px)', zIndex: 5000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <div className="card" style={{ maxWidth: '420px', width: '90%', height: 'auto', textAlign: 'center', padding: '2rem', transform: 'scale(1)', animation: 'modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}>
                                <div style={{ fontSize: '2.5rem', marginBottom: '0.8rem' }}>⚠️</div>
                                <h2 style={{ fontFamily: 'Outfit', fontSize: '1.4rem', marginBottom: '10px' }}>{modal.title}</h2>
                                <p style={{ color: 'var(--text-dim)', marginBottom: '1.5rem', fontSize: '0.95rem' }}>{modal.msg}</p>
                                <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                                    <button className="btn-primary" style={{ padding: '10px 24px', background: '#ef4444', color: '#fff', border: 'none' }} onClick={modal.onConfirm}>ඔව්, මකන්න</button>
                                    <button className="btn-primary" style={{ padding: '10px 24px' }} onClick={() => setModal({ ...modal, open: false })}>එපා</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <style>{`
                        @keyframes modalIn {
                            from { opacity: 0; transform: scale(0.9) translateY(20px); }
                            to { opacity: 1; transform: scale(1) translateY(0); }
                        }
                    `}</style>
                    
                    {loading && <LoadingScreen onComplete={() => setLoading(false)} />}
                    
                    <div style={{ visibility: loading ? 'hidden' : 'visible', opacity: loading ? 0 : 1, transition: 'opacity 0.8s ease' }}>
                        <div className="live-bg">
                            <div className="blob blob-1"></div><div className="blob blob-2"></div>
                        </div>
                    
                    <header className="navbar">
                        <div className="nav-container">
                            <div className="nav-brand" onClick={() => setCurrentPage('dashboard')} style={{ cursor: 'pointer' }}>
                                <div className="nav-logo">LB</div>
                                <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <span className="nav-title">TRACKER</span>
                                        {syncing && <span style={{ width: '8px', height: '8px', background: '#fbbf24', borderRadius: '50%', animation: 'pulseActive 1s infinite', marginTop: '2px' }} title="Syncing data..."></span>}
                                    </div>
                                </div>
                            </div>
                            <div className="nav-links">
                                <div className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</div>
                                <div className={`nav-link ${currentPage === 'ICT' ? 'active' : ''}`} onClick={() => setCurrentPage('ICT')}>ICT</div>
                                <div className={`nav-link ${currentPage === 'ET' ? 'active' : ''}`} onClick={() => setCurrentPage('ET')}>ET</div>
                                <div className={`nav-link ${currentPage === 'SFT' ? 'active' : ''}`} onClick={() => setCurrentPage('SFT')}>SFT</div>
                                
                                <select className="theme-select" value={theme} onChange={e => setTheme(e.target.value)}>
                                    <option value="dark">Dark Theme</option>
                                    <option value="light">Light Theme</option>
                                    <option value="glass">Glass Theme</option>
                                </select>

                                <div className="nav-btn-danger" onClick={clearAllData}>Clear Data</div>
                            </div>
                        </div>
                    </header>

                    <main className="main-content">
                        {currentPage === 'dashboard' && !loading && (
                            <DashboardView history={history} todayHours={todayHours} toggleHour={toggleHour} timeLeft={timeLeft} viewDate={viewDate} setViewDate={setViewDate} />
                        )}
                        {['ICT', 'ET', 'SFT'].includes(currentPage) && !loading && (
                            <SubjectView subject={currentPage} marksData={marksData} addMark={addMark} deleteMark={deleteMark} />
                        )}
                    </main>
                </div>
                </div>
            );
        };

        const DashboardView = ({ history, todayHours, toggleHour, timeLeft, viewDate, setViewDate }) => {
            useEffect(() => {
                gsap.from(".anim-stagger", { y: 30, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power3.out" });
            }, []);

            const todayCount = todayHours.filter(Boolean).length;
            const getSum = (period) => {
                let s = 0; const now = new Date();
                for(let i=0; i<period; i++) {
                    const d = new Date(); d.setDate(now.getDate() - i);
                    const k = d.toISOString().split('T')[0];
                    if(history[k]) s += history[k].filter(Boolean).length;
                }
                return s;
            };

            return (
                <div className="dashboard-wrapper">
                    <SubjectBackground subject="dashboard" />
                    <div className="hero-card anim-stagger">
                        <div>
                            <div className="hero-title">
                                2026 A/L <span style={{ background: 'var(--gradient)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Polonnaruwa</span>
                            </div>
                            <div className="hero-subtitle">දිස්ත්‍රික් ප්‍රථමයා වීමේ සිහිනය කරා... ✨</div>
                        </div>
                        <div className="hero-cd-wrapper">
                            <CDUnit v={timeLeft.d} l="Days" /><CDUnit v={timeLeft.h} l="Hours" /><CDUnit v={timeLeft.m} l="Minutes" /><CDUnit v={timeLeft.s} l="Seconds" />
                        </div>
                    </div>

                    <div className="anim-stagger" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1.5rem', marginBottom: '2.5rem' }}>
                        <StatBox val={todayCount} lbl="Today's Hours" sub="අද වැඩ කරපු පැය" />
                        <StatBox val={15 - todayCount} lbl="Missed Hours" sub="අතපසු වූ පැය" color="#ef4444" />
                        <StatBox val={getSum(7)} lbl="Weekly Hours" sub="මේ සතියේ පැය" />
                        <StatBox val={getSum(30)} lbl="Monthly Hours" sub="මේ මාසයේ පැය" />
                        <StatBox val={Object.values(history).reduce((a, c) => a + c.filter(Boolean).length, 0)} lbl="Total Hours" sub="මුළු පැය ගණන" />
                    </div>

                    <div className="dash-grid" style={{ marginBottom: '1.2rem' }}>
                        <Reveal>
                            <div className="card">
                                <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span className="card-title">Study Grid</span>
                                    <span style={{ color: 'var(--primary)', fontWeight: '800' }}>{todayCount} / 15 hrs</span>
                                </div>
                                <div className="tracker-grid">
                                    {todayHours.map((isActive, i) => (
                                        <div key={i} className={`hour-btn hour-btn-${i} ${isActive ? 'active' : ''}`} onClick={() => toggleHour(i)}>
                                            {i + 1}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </Reveal>
                        <Reveal delay={0.1}>
                            <div className="card">
                                <span className="card-title">Daily Progress</span>
                                <div style={{ marginTop: '1rem' }}>
                                    <input type="date" value={viewDate} onChange={e => setViewDate(e.target.value)} />
                                    <div className="stat-card" style={{ marginTop: '1.2rem', marginBottom: '1.2rem' }}>
                                        <div className="stat-val">{Math.round((todayCount / 15) * 100)}%</div>
                                        <div className="stat-lbl">Progress Achieved</div>
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                        {[...Array(5)].map((_, i) => {
                                            const d = new Date(); d.setDate(d.getDate() - i);
                                            const k = d.toISOString().split('T')[0];
                                            const hrs = history[k] ? history[k].filter(Boolean).length : 0;
                                            return (
                                                <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 14px', background: 'var(--input-bg)', borderRadius: '12px', fontSize: '0.9rem', border: 'var(--glass-border)' }}>
                                                    <span style={{ fontWeight: '500', color: 'var(--text-dim)' }}>{d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                                                    <span style={{ fontWeight: '700', color: 'var(--primary)' }}>{hrs}h</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </Reveal>
                    </div>

                    <Reveal delay={0.2}>
                        <div className="card" style={{ height: '350px', padding: '2rem' }}>
                            <span className="card-title">Study Trends</span>
                            <div className="chart-container" style={{ height: '240px', marginTop: '1.5rem' }}>
                                <HistoryChart history={history} />
                            </div>
                        </div>
                    </Reveal>
                </div>
            );
        };

        const SubjectView = ({ subject, marksData, addMark, deleteMark }) => {
            const [form, setForm] = useState({ id: null, mcq: '', str: '', esy: '', date: new Date().toISOString().split('T')[0] });
            
            useEffect(() => {
                gsap.from(".anim-stagger", { y: 30, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power3.out" });
            }, [subject]);

            const handleSubmit = (e) => {
                e.preventDefault();
                
                const mcqVal = parseFloat(form.mcq) || 0;
                const strVal = parseFloat(form.str) || 0;
                const esyVal = parseFloat(form.esy) || 0;
                
                if(mcqVal === 0 && strVal === 0 && esyVal === 0) return; // Don't submit if all empty/zero
                
                const total = mcqVal + strVal + esyVal;
                
                addMark({ 
                    ...form, 
                    mcq: mcqVal, 
                    str: strVal, 
                    esy: esyVal, 
                    subject: subject, 
                    total: total 
                });
                
                setForm({ id: null, mcq: '', str: '', esy: '', date: new Date().toISOString().split('T')[0] });
            };

            const subjectData = marksData.filter(m => m.subject === subject);

            return (
                <div className="dashboard-wrapper">
                    <SubjectBackground subject={subject} />
                    
                    <div className="top-bar anim-stagger" style={{ position: 'relative', zIndex: 10 }}>
                        <div className="greeting">
                            <h1>{subject} Analysis</h1>
                            <p>{subject} විෂයේ ඔබේ ප්‍රගතිය සහ ලකුණු වාර්තා.</p>
                        </div>
                    </div>

                    <div className="dash-grid" style={{ position: 'relative', zIndex: 10 }}>
                        <Reveal>
                            <div className="card">
                                <span className="card-title">{form.id ? 'Edit Marks' : 'Add Paper Marks'}</span>
                                <form onSubmit={handleSubmit}>
                                    <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    <input type="number" placeholder="MCQ" value={form.mcq} onChange={e => setForm({...form, mcq: e.target.value})} />
                                    <input type="number" placeholder="Structured" value={form.str} onChange={e => setForm({...form, str: e.target.value})} />
                                    <input type="number" placeholder="Essay" value={form.esy} onChange={e => setForm({...form, esy: e.target.value})} />
                                    <button type="submit" className="btn-primary">{form.id ? 'Update' : 'Add'}</button>
                                </form>
                            </div>
                        </Reveal>
                        <Reveal delay={0.1}>
                            <div className="card" style={{ maxHeight: '400px', overflowY: 'auto' }}>
                                <span className="card-title">Paper History</span>
                                {[...subjectData].sort((a,b) => new Date(b.date) - new Date(a.date)).map(m => (
                                    <div key={m.id} className="stat-card" style={{ display: 'flex', justifyContent: 'space-between', padding: '1rem' }}>
                                        <div><div style={{ fontWeight: '700' }}>{m.total} Marks</div><div style={{ fontSize: '0.7rem' }}>{m.date}</div></div>
                                        <div style={{ display: 'flex', gap: '5px' }}>
                                            <button onClick={() => setForm({...m})} style={{ background: 'var(--primary)', color: 'white', border: 'none', padding: '4px 8px', borderRadius: '5px', cursor: 'pointer' }}>Edit</button>
                                            <button onClick={() => deleteMark(m.id)} style={{ background: '#ef4444', color: 'white', border: 'none', padding: '4px 8px', borderRadius: '5px', cursor: 'pointer' }}>Del</button>
                                        </div>
                                    </div>
                                ))}
                                {subjectData.length === 0 && <div style={{ color: 'var(--text-dim)', textAlign: 'center', marginTop: '20px' }}>No records yet</div>}
                            </div>
                        </Reveal>
                    </div>

                    <div style={{ marginTop: '3rem', position: 'relative', zIndex: 10 }}>
                        <Reveal delay={0.2}>
                            <div className="subject-section">
                                <div className="marks-grid">
                                    <MarkChart title="MCQ" data={subjectData} field="mcq" color="#3B82F6" />
                                    <MarkChart title="STR" data={subjectData} field="str" color="#8B5CF6" />
                                    <MarkChart title="ESY" data={subjectData} field="esy" color="#F43F5E" />
                                    <MarkChart title="Total" data={subjectData} field="total" color="#10B981" />
                                </div>
                            </div>
                        </Reveal>
                    </div>
                </div>
            );
        };

        const MarkChart = ({ title, data, field, color }) => {
            const chartRef = useRef(null); const chartInst = useRef(null);
            useEffect(() => {
                if (!chartRef.current) return; if (chartInst.current) chartInst.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-10);
                
                // Get computed styling to match theme
                const rootStyles = getComputedStyle(document.documentElement);
                const gridColor = rootStyles.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.1)';
                const textColor = rootStyles.getPropertyValue('--text-dim').trim() || '#94A3B8';

                chartInst.current = new Chart(ctx, {
                    type: 'line', data: {
                        labels: sorted.map(m => m.date.split('-')[2]),
                        datasets: [{ data: sorted.map(m => m[field]), borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4 }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor } },
                            x: { grid: { color: gridColor }, ticks: { color: textColor } }
                        } 
                    }
                });
            }, [data]);
            return <div className="card" style={{ padding: '1.2rem' }}><div style={{ fontWeight: '700', fontSize: '0.8rem', color: 'var(--text-dim)' }}>{title}</div><div className="chart-box"><canvas ref={chartRef}></canvas></div></div>;
        };

        const StatBox = ({ val, lbl, sub, color }) => (
            <div className="card" style={{ padding: '1.5rem', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', borderColor: color ? color + '44' : 'var(--glass-border)' }}>
                <div style={{ fontSize: '2.2rem', fontWeight: '800', color: color || 'var(--text-main)', fontFamily: 'Outfit' }}>{val}</div>
                <div style={{ fontSize: '0.9rem', fontWeight: '600', marginTop: '5px' }}>{lbl}</div>
                <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{sub}</div>
            </div>
        );

        const CDUnit = ({ v, l }) => (
            <div style={{ textAlign: 'center' }}>
                <div className="cd-val">{String(v).padStart(2, '0')}</div>
                <div className="cd-lbl" style={{ fontSize: '0.7rem', opacity: 0.8 }}>{l}</div>
            </div>
        );

        const HistoryChart = ({ history }) => {
            const chartRef = useRef(null); const chartInst = useRef(null);
            useEffect(() => {
                if (!chartRef.current) return; if (chartInst.current) chartInst.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                const last7 = [...Array(7)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - (6 - i));
                    return d.toISOString().split('T')[0];
                });
                const data = last7.map(d => history[d] ? history[d].filter(Boolean).length : 0);
                
                const rootStyles = getComputedStyle(document.documentElement);
                const gridColor = rootStyles.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.1)';
                const textColor = rootStyles.getPropertyValue('--text-dim').trim() || '#94A3B8';

                chartInst.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: last7.map(d => d.split('-')[2]),
                        datasets: [{ 
                            data, 
                            borderColor: '#3B82F6', 
                            backgroundColor: 'rgba(59, 130, 246, 0.1)', 
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#3B82F6',
                            pointBorderColor: '#050505',
                            pointBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { beginAtZero: true, max: 15, display: false, grid: { color: gridColor } }, 
                            x: { grid: { display: false }, ticks: { color: textColor } } 
                        }
                    }
                });
            }, [history]);
            return <canvas ref={chartRef}></canvas>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
