    <style>
        :root {
            --primary: #8B5CF6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --bg-dark: #050505;
            --navbar-bg: rgba(5, 5, 5, 0.7);
            --card-bg: rgba(20, 20, 20, 0.7);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #8B5CF6 0%, #D946EF 100%);
            --input-bg: rgba(255, 255, 255, 0.04);
            --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; color-scheme: dark; line-height: 1.5; }

        .live-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #050505; }
        .blob { position: absolute; width: min(60vw, 600px); height: min(60vw, 600px); filter: blur(min(10vw, 100px)); border-radius: 50%; opacity: 0.35; animation: move 20s infinite alternate; }
        .blob-1 { top: -10%; right: -10%; background: var(--primary); }
        .blob-2 { bottom: -10%; left: -10%; background: #D946EF; }
        @keyframes move { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: var(--glass-border); border-radius: 24px; box-shadow: var(--card-shadow); }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 75px; background: var(--navbar-bg); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 2000; border-bottom: var(--glass-border); }
        .nav-container { width: 92%; max-width: 1400px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { display: flex; align-items: center; gap: 12px; font-family: 'Outfit'; font-weight: 800; font-size: clamp(1.2rem, 4vw, 1.5rem); letter-spacing: -0.5px; }
        .nav-logo { width: 42px; height: 42px; background: var(--gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 10px; align-items: center; }
        .nav-link { padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--text-dim); text-decoration: none; font-size: 0.95rem; }
        .nav-link.active { background: var(--input-bg); color: var(--text-main); border: var(--glass-border); }
        .nav-link:hover { color: var(--text-main); background: var(--border); }

        .main-content { width: 100%; padding: 110px 0 120px 0; min-height: 100vh; }
        .container { width: min(94%, 1400px); margin: 0 auto; }

        .setup-card { max-width: 500px; width: min(92%, 500px); margin: 2rem auto; padding: clamp(1.5rem, 5vw, 2.5rem); position: relative; z-index: 100; }
        .setup-title { font-family: 'Outfit'; font-size: clamp(1.5rem, 6vw, 2rem); margin-bottom: 0.5rem; text-align: center; }
        .setup-subtitle { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.95rem; text-align: center; }
        
        input, select { background: var(--input-bg); border: var(--glass-border); color: var(--text-main); padding: 16px; border-radius: 14px; width: 100%; margin-bottom: 12px; outline: none; transition: 0.3s; font-size: 1rem; color-scheme: dark; }
        option { background: #18181b; color: white; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .btn-primary { background: var(--gradient); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: 0.3s; margin-top: 10px; position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }

        .btn-google { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px 28px; border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(10px); width: fit-content; margin: 0 auto; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .btn-google:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 30px rgba(139, 92, 246, 0.25); }
        .btn-google svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        .dash-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: clamp(1rem, 3vw, 2rem); }
        .card { padding: clamp(1.2rem, 4vw, 2.2rem); margin-bottom: 2rem; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .card-title { font-family: 'Outfit'; font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 700; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(0.8rem, 2vw, 1.5rem); margin-bottom: 2.5rem; }
        .stat-card { padding: 1.5rem 0.5rem; text-align: center; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .stat-val { font-family: 'Outfit'; font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; word-break: break-all; }
        .stat-lbl { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .hour-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: clamp(8px, 2vw, 12px); }
        .hour-btn { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: clamp(10px, 2vw, 16px); font-weight: 800; font-size: clamp(1rem, 4vw, 1.5rem); font-family: 'Outfit'; color: var(--text-dim); background: var(--input-bg); border: var(--glass-border); transition: 0.3s; }
        .hour-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 25px var(--primary-glow); }

        .floating-settings { position: fixed; bottom: 100px; right: 25px; width: clamp(50px, 12vw, 60px); height: clamp(50px, 12vw, 60px); background: var(--card-bg); backdrop-filter: blur(20px); border: var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1500; font-size: 1.5rem; transition: 0.4s; }
        .settings-menu { position: fixed; bottom: 175px; right: 25px; width: min(90vw, 300px); padding: 1.5rem; z-index: 1501; animation: menuIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: bottom right; }
        @keyframes menuIn { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: var(--navbar-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-top: var(--glass-border); display: none; align-items: center; justify-content: space-around; z-index: 2000; padding: 0 10px 15px 10px; }
        .mobile-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 10px 5px; border-radius: 16px; min-width: 65px; flex: 1; }
        .mobile-item.active { color: var(--primary); background: var(--input-bg); }
        .mobile-item span:first-child { font-size: 1.4rem; }

        .countdown-container { display: flex; gap: 8px; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .countdown-box { background: var(--input-bg); padding: 10px 5px; border-radius: 12px; border: var(--glass-border); min-width: 60px; text-align: center; flex: 1; max-width: 80px; }
        .countdown-num { font-family: 'Outfit'; font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 800; color: var(--primary); display: block; }
        .countdown-label { font-size: 0.5rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
        .subject-chip { background: var(--primary-glow); border: 1px solid var(--primary); color: white; padding: 8px 14px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; animation: chipIn 0.3s ease-out; }
        .chip-remove { cursor: pointer; opacity: 0.7; transition: 0.2s; font-size: 1.1rem; }
        .chip-remove:hover { opacity: 1; transform: scale(1.1); }

        .floating-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; opacity: 0.15; overflow: hidden; }
        .float-icon { position: absolute; font-size: clamp(2rem, 10vw, 5rem); bottom: -100px; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 1024px) { .dash-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .nav-links { display: none; } }
        @media (max-width: 600px) { .stats-grid { gap: 0.6rem; margin-bottom: 1.5rem; } .stat-card { padding: 1rem 0.3rem; border-radius: 18px; } .stat-val { font-size: 1.8rem; } .nav-brand span { display: none; } .mobile-nav { display: flex; } .marks-grid { grid-template-columns: 1fr; } .main-content { padding-top: 85px; padding-bottom: 100px; } .countdown-box { min-width: 50px; } }
        @media (max-width: 350px) { .stats-grid { grid-template-columns: 1fr; } .stat-val { font-size: 2.2rem; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SB_URL = "https://gemcglmmjbicgbvdhdee.supabase.co"; 
        const SB_KEY = "sb_publishable_XhYi9wPvuOOLjRdpjaqUWg_xKXL2Dg6";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const SUBJECT_ICONS = {
            'ICT': '💻', 'Physics': '⚛️', 'Chemistry': '🧪', 'Biology': '🧬', 'Combined Maths': '📐',
            'ET': '⚙️', 'SFT': '🔬', 'Accounting': '📊', 'Economics': '📈', 'Business Studies': '💼',
            'Logic': '🧠', 'Political Science': '⚖️', 'Sinhala': '✍️', 'English': '🔤', 'History': '📜'
        };

        const DISTRICTS = ["Colombo", "Gampaha", "Kalutara", "Kandy", "Matale", "Nuwara Eliya", "Galle", "Matara", "Hambantota", "Jaffna", "Kilinochchi", "Mannar", "Vavuniya", "Mullaitivu", "Batticaloa", "Ampara", "Trincomalee", "Kurunegala", "Puttalam", "Anuradhapura", "Polonnaruwa", "Badulla", "Moneragala", "Ratnapura", "Kegalle"];
        const SUBJECT_LIST = [...Object.keys(SUBJECT_ICONS)];
        const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        // Global variable to catch the prompt
        window.deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('Capture: beforeinstallprompt');
            e.preventDefault();
            window.deferredPrompt = e;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered');
                }).catch(err => console.log('SW registration failed:', err));
            });
        }

        const Reveal = ({ children, delay = 0 }) => {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([entry]) => { if(entry.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.1 });
                if(ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);
            return ( <div ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(20px)', transition: `opacity 0.8s ease-out ${delay}s, transform 0.8s ease-out ${delay}s` }}>{children}</div> );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);
            const [history, setHistory] = useState({});
            const [marks, setMarks] = useState([]);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [installReady, setInstallReady] = useState(false);

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); fetchUserData(session.user.id); } else { setLoading(false); }
                });
                const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
                    if (session) { setUser(session.user); fetchUserData(session.user.id); } else { setUser(null); setProfile(null); setLoading(false); }
                });
                return () => subscription.unsubscribe();
            }, []);

            const fetchUserData = async (uid) => {
                try {
                    const { data, error } = await sb.from('study_tracker_v2').select('*').eq('user_id', uid).single();
                    if (data) {
                        setProfile({ 
                            name: data.name, 
                            district: data.district, 
                            subjects: data.subjects, 
                            examYear: data.exam_year, 
                            examMonth: data.exam_month 
                        });
                        setHistory(data.history || {});
                        setMarks(data.marks || []);
                    }
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handleLogin = async () => { await sb.auth.signInWithOAuth({ provider: 'google' }); };
            const handleLogout = async () => { await sb.auth.signOut(); window.location.reload(); };

            const saveProfile = async (p) => {
                setLoading(true);
                const payload = {
                    user_id: user.id,
                    name: p.name,
                    district: p.district,
                    subjects: p.subjects,
                    exam_year: p.examYear,
                    exam_month: p.examMonth,
                    history: history,
                    marks: marks
                };
                const { error } = await sb.from('study_tracker_v2').upsert(payload);
                if (error) { console.error("Save Error:", error); alert("Error saving profile: " + error.message); }
                else { setProfile(p); setIsEditMode(false); setCurrentPage('dashboard'); }
                setLoading(false);
            };

            const pushData = async (h, m) => {
                if (!user || !profile) return;
                await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile.name, district: profile.district, subjects: profile.subjects,
                    exam_year: profile.examYear, exam_month: profile.examMonth, history: h, marks: m 
                });
            };

            useEffect(() => {
                if (!profile) return;
                const monthIdx = MONTHS.indexOf(profile.examMonth);
                const target = new Date(profile.examYear, monthIdx, 1);
                const timer = setInterval(() => {
                    const diff = target - new Date();
                    if (diff > 0) setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                    else setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                }, 1000);
                return () => clearInterval(timer);
            }, [profile]);

            if (loading) return <LoadingScreen />;
            if (!user) return <LandingPage onLogin={handleLogin} />;
            if (!profile || isEditMode) return <SetupWizard onComplete={saveProfile} initialData={profile} onCancel={() => setIsEditMode(false)} />;

            return (
                <div>
                    <div className="live-bg"><div className="blob blob-1"></div><div className="blob blob-2"></div></div>
                    <SubjectBackground subject={currentPage} />

                    <header className="navbar">
                        <div className="nav-container">
                            <div className="nav-brand" onClick={() => setCurrentPage('dashboard')} style={{ cursor: 'pointer' }}>
                                <div className="nav-logo">LB</div>
                                <span>TRACKER</span>
                            </div>
                            <div className="nav-links">
                                <div className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</div>
                                {profile.subjects.map(s => <div key={s} className={`nav-link ${currentPage === s ? 'active' : ''}`} onClick={() => setCurrentPage(s)}>{s}</div>)}
                            </div>
                        </div>
                    </header>

                    <div className="floating-settings" onClick={() => setIsSettingsOpen(!isSettingsOpen)}>{isSettingsOpen ? '✕' : '⚙️'}</div>
                    {isSettingsOpen && (
                        <div className="glass settings-menu">
                            <div style={{ fontSize: '0.75rem', marginBottom: '15px', color: 'var(--text-dim)', textAlign: 'center' }}>{user.email}</div>
                            <button className="btn-primary" style={{ marginBottom: '10px' }} onClick={() => { setIsEditMode(true); setIsSettingsOpen(false); }}>👤 Edit Profile</button>
                            <button className="btn-primary" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', border: '1px solid rgba(239, 68, 68, 0.2)' }} onClick={handleLogout}>🚪 Logout</button>
                        </div>
                    )}


                    <nav className="mobile-nav">
                        <MobileItem active={currentPage === 'dashboard'} icon="🏠" label="Home" onClick={() => setCurrentPage('dashboard')} />
                        {profile.subjects.map(s => <MobileItem key={s} active={currentPage === s} icon={SUBJECT_ICONS[s] || '📚'} label={s} onClick={() => setCurrentPage(s)} />)}
                    </nav>

                    <main className="main-content">
                        <div className="container">
                            {currentPage === 'dashboard' ? (
                                <DashboardView profile={profile} history={history} setHistory={h => { setHistory(h); pushData(h, marks); }} viewDate={viewDate} setViewDate={setViewDate} timeLeft={timeLeft} />
                            ) : (
                                <SubjectView subject={currentPage} marks={marks} setMarks={m => { setMarks(m); pushData(history, m); }} />
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const LoadingScreen = () => (
            <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: '#050505', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
                <div style={{ fontSize: '2rem', fontFamily: 'Outfit', fontWeight: '800', color: 'white', animation: 'pulse 1.5s infinite' }}>LB TRACKER</div>
            </div>
        );

        const LandingPage = ({ onLogin }) => (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '1.5rem' }}>
                <div className="live-bg"><div className="blob blob-1"></div><div className="blob blob-2"></div></div>
                <div className="nav-logo" style={{ width: 'clamp(60px, 15vw, 80px)', height: 'clamp(60px, 15vw, 80px)', fontSize: '2rem', marginBottom: '2rem' }}>LB</div>
                <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2.5rem, 8vw, 4rem)', fontWeight: '800', lineHeight: 1.1, marginBottom: '1.5rem' }}>Empowering <span style={{ color: 'var(--primary)' }}>Sri Lankan</span><br />A/L Students</h1>
                <p style={{ fontSize: 'clamp(1rem, 3vw, 1.2rem)', color: 'var(--text-dim)', maxWidth: '600px', marginBottom: '3rem' }}>The elite cloud-synced tracker for serious students.</p>
                <button className="btn-google" onClick={onLogin}>
                    <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
                    Sign in with Google
                </button>
            </div>
        );

        const SetupWizard = ({ onComplete, initialData, onCancel }) => {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState(initialData ? { ...initialData } : { name: '', district: 'Colombo', subjects: [], examYear: 2026, examMonth: 'August' });
            const [customSub, setCustomSub] = useState('');
            const toggleS = (s) => setForm(f => ({ ...f, subjects: f.subjects.includes(s) ? f.subjects.filter(x => x !== s) : (f.subjects.length < 3 ? [...f.subjects, s] : f.subjects) }));
            const addCustom = () => { if(customSub && form.subjects.length < 3 && !form.subjects.includes(customSub)) { toggleS(customSub); setCustomSub(''); } };
            const removeS = (s) => setForm(f => ({ ...f, subjects: f.subjects.filter(x => x !== s) }));
            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', padding: '1rem' }}>
                    <div className="glass setup-card">
                        {step === 1 ? (
                            <div>
                                <h2 className="setup-title">{initialData ? 'Edit Profile' : 'Welcome! 👋'}</h2>
                                <p className="setup-subtitle">Let's set up your profile.</p>
                                <input type="text" placeholder="Your Name" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                                <select value={form.district} onChange={e => setForm({ ...form, district: e.target.value })}>{DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}</select>
                                <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: '10px' }}>
                                    <select value={form.examMonth} onChange={e => setForm({ ...form, examMonth: e.target.value })}>{MONTHS.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                    <input type="number" placeholder="Year" value={form.examYear} onChange={e => setForm({ ...form, examYear: parseInt(e.target.value) || 2026 })} />
                                </div>
                                <button className="btn-primary" onClick={() => form.name && setStep(2)}>Next Step ➡️</button>
                                {initialData && <button className="btn-primary" style={{ background: 'transparent', border: '1px solid var(--border)', marginTop: '10px' }} onClick={onCancel}>Cancel</button>}
                            </div>
                        ) : (
                            <div>
                                <h2 className="setup-title">Subjects 📚</h2>
                                <p className="setup-subtitle">Choose exactly 3 subjects.</p>
                                <div className="chip-container">
                                    {form.subjects.map(s => (
                                        <div key={s} className="subject-chip">{s} <span className="chip-remove" onClick={() => removeS(s)}>✕</span></div>
                                    ))}
                                    {form.subjects.length === 0 && <div style={{ fontSize: '0.8rem', color: 'var(--text-dim)' }}>No subjects selected yet.</div>}
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', maxHeight: '150px', overflowY: 'auto', marginBottom: '1rem', padding: '5px' }}>
                                    {SUBJECT_LIST.map(s => <div key={s} onClick={() => toggleS(s)} style={{ padding: '10px', borderRadius: '12px', border: form.subjects.includes(s) ? '2px solid var(--primary)' : '1px solid var(--border)', background: form.subjects.includes(s) ? 'var(--primary-glow)' : 'var(--input-bg)', cursor: 'pointer', textAlign: 'center', opacity: !form.subjects.includes(s) && form.subjects.length >= 3 ? 0.5 : 1 }}><div style={{ fontSize: '0.8rem', fontWeight: '700' }}>{s}</div></div>)}
                                </div>
                                <div style={{ display: 'flex', gap: '8px', marginBottom: '1rem' }}>
                                    <input type="text" placeholder="Add Other..." value={customSub} onChange={e => setCustomSub(e.target.value)} style={{ marginBottom: 0 }} onKeyPress={e => e.key === 'Enter' && addCustom()} />
                                    <button className="btn-primary" style={{ width: 'auto', marginTop: 0, padding: '0 15px' }} onClick={addCustom} disabled={form.subjects.length >= 3}>+</button>
                                </div>
                                <button className="btn-primary" disabled={form.subjects.length !== 3} onClick={() => onComplete(form)}>{initialData ? 'Save Changes ✅' : 'Start Tracking 🚀'}</button>
                                <button className="btn-primary" style={{ background: 'transparent', border: '1px solid var(--border)', marginTop: '10px' }} onClick={() => setStep(1)}>⬅️ Back</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DashboardView = ({ profile, history, setHistory, viewDate, setViewDate, timeLeft }) => {
            const todayCount = (history[viewDate] || []).filter(Boolean).length;
            const calcHours = (days) => {
                let total = 0;
                for(let i=0; i<days; i++) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const k = d.toISOString().split('T')[0];
                    total += (history[k] || []).filter(Boolean).length;
                }
                return total;
            };
            const weekHrs = calcHours(7);
            const monthHrs = calcHours(30);
            const totalHrs = Object.values(history).reduce((a, b) => a + (b || []).filter(Boolean).length, 0);
            const toggleH = (i) => { const h = [...(history[viewDate] || new Array(15).fill(false))]; h[i] = !h[i]; setHistory({ ...history, [viewDate]: h }); };
            return (
                <div>
                    <div style={{ textAlign: 'center', marginBottom: '2.5rem' }}>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2rem, 6vw, 3.5rem)' }}>Hello, {profile.name}! ✨</h1>
                        <p style={{ color: 'var(--text-dim)', fontSize: 'clamp(0.9rem, 2.5vw, 1.1rem)', marginBottom: '1.5rem' }}>{profile.examYear} {profile.examMonth} A/L - {profile.district}</p>
                        <div className="countdown-container">
                            <CountdownBox val={timeLeft.d} lbl="Days" />
                            <CountdownBox val={timeLeft.h} lbl="Hours" />
                            <CountdownBox val={timeLeft.m} lbl="Min" />
                            <CountdownBox val={timeLeft.s} lbl="Sec" />
                        </div>
                    </div>
                    <div className="stats-grid">
                        <StatBox val={todayCount} lbl="Today" sub="අද" />
                        <StatBox val={weekHrs} lbl="Weekly" sub="සතිය" color="#8B5CF6" />
                        <StatBox val={monthHrs} lbl="Monthly" sub="මාසය" color="#D946EF" />
                        <StatBox val={totalHrs} lbl="Total" sub="මුළු" color="#10B981" />
                    </div>
                    <div className="dash-grid">
                        <Reveal><div className="glass card"><div className="card-header"><span className="card-title">Study Grid</span><span style={{ color: 'var(--primary)', fontWeight: '800', fontSize: '0.9rem' }}>{todayCount} / 15 hrs</span></div><div className="hour-grid">{Array.from({ length: 15 }).map((_, i) => <div key={i} className={`hour-btn ${history[viewDate]?.[i] ? 'active' : ''}`} onClick={() => toggleH(i)}>{i + 1}</div>)}</div></div></Reveal>
                        <Reveal delay={0.1}><div className="glass card"><span className="card-title">Calendar</span><input type="date" value={viewDate} onChange={e => setViewDate(e.target.value)} style={{ marginTop: '1rem' }} /><div style={{ marginTop: '1rem' }}>{[...Array(5)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); const k = d.toISOString().split('T')[0]; return <div key={k} style={{ display: 'flex', alignItems: 'center', padding: '12px', background: 'var(--input-bg)', borderRadius: '12px', marginBottom: '8px' }}><span>{d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' })}</span><span style={{ color: 'var(--primary)', fontWeight: '800', marginLeft: 'auto' }}>{history[k]?.filter(Boolean).length || 0}h</span></div>; })}</div></div></Reveal>
                    </div>
                    <Reveal delay={0.2}><div className="glass card" style={{ minHeight: '350px', marginTop: '1rem' }}><span className="card-title">Monthly Progress Breakdown</span><div className="chart-box"><ProgressChart history={history} /></div></div></Reveal>
                    <Reveal delay={0.3}><div className="glass card" style={{ minHeight: '350px', marginTop: '1rem' }}><span className="card-title">Activity Trend (Last 30 Days)</span><div className="chart-box"><TrendChart history={history} /></div></div></Reveal>
                </div>
            );
        };

        const SubjectView = ({ subject, marks, setMarks }) => {
            const [form, setForm] = useState({ mcq: '', str: '', esy: '', date: new Date().toISOString().split('T')[0] });
            const data = marks.filter(m => m.subject === subject);
            const handleSubmit = (e) => { e.preventDefault(); const total = (parseFloat(form.mcq) || 0) + (parseFloat(form.str) || 0) + (parseFloat(form.esy) || 0); if (total > 0) setMarks([...marks, { ...form, id: Date.now(), subject, total }]); setForm({ mcq: '', str: '', esy: '', date: new Date().toISOString().split('T')[0] }); };
            const delMark = (id) => setMarks(marks.filter(m => m.id !== id));
            return (
                <div>
                    <div style={{ textAlign: 'center', marginBottom: '3rem' }}>
                        <div style={{ fontSize: 'clamp(3.5rem, 12vw, 4.5rem)', marginBottom: '0.5rem', filter: 'drop-shadow(0 10px 20px var(--primary-glow))' }}>{SUBJECT_ICONS[subject] || '📚'}</div>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2.8rem, 10vw, 4rem)', fontWeight: '900', letterSpacing: '-1px', background: 'linear-gradient(to bottom, #fff 30%, rgba(255,255,255,0.6) 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', textTransform: 'uppercase', lineHeight: 1 }}>{subject}</h1>
                        <div style={{ display: 'inline-block', marginTop: '12px', padding: '6px 16px', background: 'var(--primary-glow)', border: '1px solid var(--primary)', borderRadius: '100px', fontSize: '0.7rem', fontWeight: '800', letterSpacing: '2px', color: 'white', textTransform: 'uppercase' }}>Core Study Module</div>
                    </div>
                    <div className="dash-grid">
                        <Reveal><div className="glass card"><span className="card-title">Add Paper Marks</span><form onSubmit={handleSubmit} style={{ marginTop: '1rem' }}><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px' }}><input type="number" placeholder="MCQ" value={form.mcq} onChange={e => setForm({ ...form, mcq: e.target.value })} /><input type="number" placeholder="STR" value={form.str} onChange={e => setForm({ ...form, str: e.target.value })} /><input type="number" placeholder="ESY" value={form.esy} onChange={e => setForm({ ...form, esy: e.target.value })} /></div><button type="submit" className="btn-primary">Add Paper ✍️</button></form></div></Reveal>
                        <Reveal delay={0.1}>
                            <div className="glass card" style={{ maxHeight: '400px', overflowY: 'auto' }}>
                                <span className="card-title">Paper History</span>
                                <div style={{ marginTop: '1rem' }}>
                                    {data.sort((a, b) => new Date(b.date) - new Date(a.date)).map(m => (
                                        <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: 'var(--input-bg)', borderRadius: '14px', marginBottom: '8px', alignItems: 'center' }}>
                                            <div><div style={{ fontWeight: '800', fontSize: '0.9rem' }}>{m.total} Marks</div><div style={{ fontSize: '0.65rem', color: 'var(--text-dim)' }}>{m.date}</div></div>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><div style={{ fontSize: '0.65rem', color: 'var(--text-dim)', textAlign: 'right' }}>M:{m.mcq} S:{m.str} E:{m.esy}</div><div className="delete-btn" onClick={() => delMark(m.id)}>🗑️</div></div>
                                        </div>
                                    ))}
                                    {data.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.9rem', padding: '2rem' }}>No papers added yet.</div>}
                                </div>
                            </div>
                        </Reveal>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1rem', marginBottom: '2rem' }}>
                        <Reveal delay={0.1}><StatCardCircle label="MCQ Avg" value={Math.round(data.reduce((a,b)=>a+(parseFloat(b.mcq)||0),0)/data.length || 0)} max={50} color="#3B82F6" /></Reveal>
                        <Reveal delay={0.2}><StatCardCircle label="STR Avg" value={Math.round(data.reduce((a,b)=>a+(parseFloat(b.str)||0),0)/data.length || 0)} max={100} color="#8B5CF6" /></Reveal>
                        <Reveal delay={0.3}><StatCardCircle label="ESY Avg" value={Math.round(data.reduce((a,b)=>a+(parseFloat(b.esy)||0),0)/data.length || 0)} max={300} color="#F43F5E" /></Reveal>
                    </div>
                    <div className="marks-grid">
                        <Reveal delay={0.2}><MarkChart title="MCQ Score" data={data} field="mcq" color="#3B82F6" /></Reveal>
                        <Reveal delay={0.3}><MarkChart title="Structured Score" data={data} field3B82F6="str" color="#8B5CF6" /></Reveal>
                        <Reveal delay={0.4}><MarkChart title="Essay Score" data={data} field="esy" color="#F43F5E" /></Reveal>
                        <Reveal delay={0.5}><MarkChart title="Total Score" data={data} field="total" color="#10B981" /></Reveal>
                    </div>
                </div>
            );
        };

        const MarkChart = ({ title, data, field, color }) => {
            const ref = useRef(null); const inst = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const sorted = [...data].sort((a, b) => new Date(a.date) - new Date(b.date)).slice(-10);
                if (inst.current) inst.current.destroy();
                inst.current = new Chart(ctx, {
                    type: 'line', data: { labels: sorted.map((_, i) => 'P' + (i + 1)), datasets: [{ data: sorted.map(m => m[field]), borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointBackgroundColor: color }] },
                    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717A', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#71717A', font: { size: 10 } } } } }
                });
            }, [JSON.stringify(data)]);
            return <div className="glass card" style={{ padding: '1.2rem' }}><div style={{ fontWeight: '700', fontSize: '0.8rem', color: 'var(--text-dim)', marginBottom: '1rem', textTransform: 'uppercase' }}>{title}</div><div className="chart-box"><canvas ref={ref}></canvas></div></div>;
        };

        const ProgressChart = ({ history }) => {
            const ref = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const last4Weeks = [...Array(4)].map((_, i) => {
                    let total = 0;
                    for (let j = 0; j < 7; j++) {
                        const d = new Date(); d.setDate(d.getDate() - (i * 7 + j));
                        const k = d.toISOString().split('T')[0];
                        total += (history[k] || []).filter(Boolean).length;
                    }
                    return total;
                }).reverse();
                const chart = new Chart(ctx, { type: 'bar', data: { labels: ['W4', 'W3', 'W2', 'W1'], datasets: [{ data: last4Weeks, backgroundColor: ['rgba(139, 92, 246, 0.2)', 'rgba(139, 92, 246, 0.4)', 'rgba(139, 92, 246, 0.6)', '#8B5CF6'], borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font: { size: 10 } } }, x: { grid: { display: false }, ticks: { font: { size: 10 } } } } } });
                return () => chart.destroy();
            }, [history]);
            return <canvas ref={ref}></canvas>;
        };

        const TrendChart = ({ history }) => {
            const ref = useRef(null);
            useEffect(() => {
                const ctx = ref.current.getContext('2d');
                const l30 = [...Array(30)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (29 - i)); return d.toISOString().split('T')[0]; });
                const chart = new Chart(ctx, { type: 'line', data: { labels: l30.map(d => d.split('-')[2]), datasets: [{ data: l30.map(k => history[k]?.filter(Boolean).length || 0), borderColor: '#8B5CF6', backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 }] }, options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 15, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717A', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#71717A', font: { size: 8 } } } } } });
                return () => chart.destroy();
            }, [history]);
            return <canvas ref={ref}></canvas>;
        };

        const StatCardCircle = ({ label, value, max, color }) => {
            const percent = Math.min(100, Math.round((value / max) * 100)) || 0;
            const r = 38; const c = 2 * Math.PI * r; const offset = c - (percent / 100) * c;
            return (
                <div className="glass card" style={{ padding: '1.5rem', textAlign: 'center', position: 'relative', overflow: 'hidden', background: `linear-gradient(135deg, ${color}10 0%, rgba(20,20,20,0.8) 100%)` }}>
                    <div style={{ position: 'absolute', top: '-20%', right: '-20%', width: '100px', height: '100px', background: color, filter: 'blur(60px)', opacity: 0.15 }}></div>
                    <div style={{ position: 'relative', width: '90px', height: '90px', margin: '0 auto 15px auto' }}>
                        <svg width="90" height="90" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
                            <circle cx="50" cy="50" r={r} stroke="rgba(255,255,255,0.03)" strokeWidth="10" fill="none" />
                            <circle cx="50" cy="50" r={r} stroke={color} strokeWidth="10" fill="none" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)', filter: `drop-shadow(0 0 8px ${color})` }} />
                        </svg>
                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', fontFamily: 'Outfit', fontWeight: '900', fontSize: '1.1rem', background: 'linear-gradient(to bottom, #fff, #ccc)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{percent}<span style={{ fontSize: '0.6rem' }}>%</span></div>
                    </div>
                    <div style={{ fontSize: '0.7rem', fontWeight: '800', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '4px' }}>{label}</div>
                    <div style={{ fontSize: '1.2rem', fontWeight: '900', fontFamily: 'Outfit', color: 'white' }}>{value} <span style={{ fontSize: '0.7rem', color: 'var(--text-dim)', fontWeight: '600' }}>/ {max}</span></div>
                </div>
            );
        };

        const CountdownBox = ({ val, lbl }) => ( <div className="countdown-box"><span className="countdown-num">{String(val).padStart(2, '0')}</span><span className="countdown-label">{lbl}</span></div> );
        const StatBox = ({ val, lbl, sub, color }) => ( <div className="glass stat-card" style={{ borderColor: color ? color + '33' : 'var(--border)' }}><div className="stat-val" style={{ color: color || 'inherit' }}>{val}</div><div className="stat-lbl">{lbl}</div><div style={{ fontSize: '0.65rem', color: 'var(--text-dim)', marginTop: '4px' }}>{sub}</div></div> );
        const MobileItem = ({ active, icon, label, onClick }) => ( <div className={`mobile-item ${active ? 'active' : ''}`} onClick={onClick}><span>{icon}</span><span>{label}</span></div> );
        
        const SubjectBackground = ({ subject }) => { 
            const icon = SUBJECT_ICONS[subject] || '🎓'; 
            const icons = useMemo(() => Array.from({ length: 15 }).map((_, i) => ({ id: i, left: `${Math.random() * 100}%`, duration: `${15 + Math.random() * 20}s`, delay: `${-Math.random() * 20}s` })), [subject]);
            return ( <div className="floating-bg">{icons.map(ic => ( <div key={ic.id} className="float-icon" style={{ left: ic.left, animationDuration: ic.duration, animationDelay: ic.delay }}>{icon}</div> ))}</div> );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
