            }, []);

            return ( <div>{ranks.map((r, i) => ( <div key={r.name} className="district-rank-item"><div className="rank-num" style={{ background: i < 3 ? 'var(--primary)' : 'var(--input-bg)' }}>{i + 1}</div><div style={{ fontWeight: '700', fontSize: '0.9rem' }}>{r.name}</div><div style={{ marginLeft: 'auto', fontSize: '0.8rem', fontWeight: '800', color: 'var(--primary)' }}>{r.hours}h</div></div> ))}{ranks.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.8rem', padding: '1rem' }}>Initializing rankings...</div>}</div> );
        };

        const FocusTimer = () => {
            const [mode, setMode] = useState('focus');
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (isActive && timeLeft === 0) {
                    if (mode === 'focus') {
                        setMode('break');
                        setTimeLeft(5 * 60);
                    } else {
                        setMode('focus');
                        setTimeLeft(25 * 60);
                    }
                    setIsActive(false);
                    if (Notification.permission === 'granted') {
                        new Notification("Time's up! ⏰", { body: mode === 'focus' ? "Take a 5-minute break!" : "Back to focus mode!" });
                    }
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, mode]);

            const toggleTimer = () => setIsActive(!isActive);
            const resetTimer = () => {
                setIsActive(false);
                setTimeLeft(mode === 'focus' ? 25 * 60 : 5 * 60);
            };
            const switchMode = (newMode) => {
                setIsActive(false);
                setMode(newMode);
                setTimeLeft(newMode === 'focus' ? 25 * 60 : 5 * 60);
            };

            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const progress = mode === 'focus' ? ((25 * 60 - timeLeft) / (25 * 60)) * 100 : ((5 * 60 - timeLeft) / (5 * 60)) * 100;
            const strokeColor = mode === 'focus' ? '#6366F1' : '#10B981';

            return (
                <div className="glass card" style={{ textAlign: 'center', padding: '2rem' }}>
                    <div style={{ fontWeight: '800', fontSize: '1.2rem', fontFamily: 'Outfit', marginBottom: '4px' }}>Focus Timer ⏳</div>
                    <p style={{ fontSize: '0.8rem', color: 'var(--text-dim)', marginBottom: '1.5rem' }}>
                        {mode === 'focus' ? 'වෙනත් වැඩ නැතුව එක දිගට පාඩම් කරන්න.' : 'විනාඩි 5ක විවේකයක් ගන්න.'}
                    </p>
                    <div style={{ display: 'flex', gap: '10px', justifyContent: 'center', marginBottom: '1.5rem' }}>
                        <button onClick={() => switchMode('focus')} style={{ padding: '6px 16px', borderRadius: '12px', border: 'none', background: mode === 'focus' ? 'var(--primary)' : 'var(--input-bg)', color: mode === 'focus' ? 'white' : 'var(--text-main)', fontWeight: '700', cursor: 'pointer', transition: '0.3s' }}>Focus (25m)</button>
                        <button onClick={() => switchMode('break')} style={{ padding: '6px 16px', borderRadius: '12px', border: 'none', background: mode === 'break' ? '#10B981' : 'var(--input-bg)', color: mode === 'break' ? 'white' : 'var(--text-main)', fontWeight: '700', cursor: 'pointer', transition: '0.3s' }}>Break (5m)</button>
                    </div>
                    
                    <div style={{ position: 'relative', width: '160px', height: '160px', margin: '0 auto 1.5rem auto' }}>
                        <svg width="160" height="160" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
                            <circle cx="50" cy="50" r="45" stroke="var(--input-bg)" strokeWidth="6" fill="none" />
                            <circle cx="50" cy="50" r="45" stroke={strokeColor} strokeWidth="6" fill="none" strokeDasharray="282.7" strokeDashoffset={282.7 - (progress / 100) * 282.7} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s linear' }} />
                        </svg>
                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', fontFamily: 'Outfit', fontWeight: '800', fontSize: '2.5rem', color: 'var(--text-main)' }}>
                            {m}:{s}
                        </div>
                    </div>

                    <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                        <button className="btn-primary" onClick={toggleTimer} style={{ width: '120px', padding: '12px', background: isActive ? 'rgba(239, 68, 68, 0.2)' : 'var(--primary)', color: isActive ? '#ef4444' : 'white', border: isActive ? '1px solid rgba(239, 68, 68, 0.5)' : 'none' }}>
                            {isActive ? 'Pause' : 'Start'}
                        </button>
                        <button className="btn-primary" onClick={resetTimer} style={{ width: '120px', padding: '12px', background: 'var(--input-bg)', border: '1px solid var(--border)', color: 'var(--text-main)' }}>
                            Reset
                        </button>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ profile, history, setHistory, viewDate, setViewDate, timeLeft, liveUsers, markedToday, announcement, showAnnounceModal, setShowAnnounceModal }) => {
            const [leaderStats, setLeaderStats] = useState({ district: '', performer: '' });

            useEffect(() => {
                const fetchLeaders = async () => {
                    const today = getLocalISODate();
                    const { data } = await sb.from('study_tracker_v2')
                        .select('name, district, history')
                        .not(`history->${today}`, 'is', null)
                        .order('history->last_updated', { ascending: false })
                        .limit(100);
                    if (data && data.length > 0) {
                        const distMap = {};
                        let bestP = { name: '', hrs: 0, time: 0 };
                        data.forEach(u => {
                            const hrs = (u.history && Array.isArray(u.history[today])) ? u.history[today].filter(Boolean).length : 0;
                            const time = u.history?.last_updated ? new Date(u.history.last_updated).getTime() : 0;
                            if (hrs > 0) {
                                distMap[u.district] = (distMap[u.district] || 0) + hrs;
                                if (hrs > bestP.hrs || (hrs === bestP.hrs && time > bestP.time)) {
                                    bestP = { name: u.name, hrs, time };
                                }
                            }
                        });
                        const topD = Object.entries(distMap).sort((a,b) => b[1] - a[1])[0];
                        setLeaderStats({ district: topD ? topD[0] : 'None', performer: bestP.name || 'None' });
                    }
                };
                fetchLeaders();

                const channel = sb.channel('leaders-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                        fetchLeaders();
                    })
                    .subscribe();

                const inv = setInterval(fetchLeaders, 10000);
                return () => {
                    clearInterval(inv);
                    sb.removeChannel(channel);
                };
            }, []);

            const todayCount = (Array.isArray(history[viewDate]) ? history[viewDate].filter(Boolean).length : 0);
            const weekHrs = [...Array(7)].reduce((a,_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); const k=getLocalISODate(d); return a+(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0); },0);
            const monthHrs = [...Array(30)].reduce((a,_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); const k=getLocalISODate(d); return a+(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0); },0);
            const totalHrs = Object.values(history).reduce((a, b) => a + (Array.isArray(b) ? b.filter(Boolean).length : 0), 0);
            const toggleH = (i) => { const h = [...(history[viewDate] || new Array(24).fill(false))]; h[i] = !h[i]; setHistory({ ...history, [viewDate]: h }); };
            const isEvening = new Date().getHours() >= 17;
            const showReminder = todayCount === 0 && isEvening && viewDate === getLocalISODate();
            const dismissAnnounce = () => { localStorage.setItem('lastSeenAnnounce', announcement); setShowAnnounceModal(false); };
            return (
                <div className="dashboard-container">
                    <ActivityTicker liveUsers={liveUsers} markedToday={markedToday} topDistrict={leaderStats.district} topPerformer={leaderStats.performer} />
                    {showAnnounceModal && announcement && (
                        <div className="admin-modal-overlay" style={{ zIndex: 10000 }}>
                            <div className="glass card" style={{ maxWidth: '400px', width: '92%', padding: '2.5rem', textAlign: 'center', animation: 'modalPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)', position: 'relative' }}>
                                <button onClick={dismissAnnounce} style={{ position: 'absolute', top: '15px', right: '15px', background: 'none', border: 'none', color: 'var(--text-dim)', fontSize: '1.2rem', cursor: 'pointer' }}>✕</button>
                                <div style={{ fontSize: '3.5rem', marginBottom: '1rem' }}>📢</div>
                                <h2 style={{ fontFamily: 'Outfit', fontSize: '1.5rem', marginBottom: '1rem' }}>Announcement</h2>
                                <p style={{ fontSize: '0.95rem', color: 'var(--text-main)', lineHeight: '1.6', marginBottom: '2rem', fontWeight: '500' }}>{announcement}</p>
                                <button className="btn-primary" onClick={dismissAnnounce}>Got it! 🚀</button>
                            </div>
                        </div>
                    )}
                    {showReminder && ( <div className="reminder-banner"><div style={{ fontSize: '1.5rem' }}>⏰</div><div><div style={{ fontWeight: '800', color: '#F59E0B', fontSize: '0.9rem' }}>අද පාඩම් කරේ නැද්ද? (Daily Reminder)</div><div style={{ fontSize: '0.75rem', color: 'var(--text-dim)', lineHeight: '1.4' }}>ඔයා අද පාඩම් කරපු පැය ගාන තවම mark කරලා නැහැ නේද? ඔයාගෙ progress එක update කරන්න අමතක කරන්න එපා.</div></div></div> )}
                    <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(1.5rem, 5vw, 3rem)', lineHeight: '1.2' }}>Hello, {profile.name}{profile.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.4em', background: 'var(--primary)', color: 'white', padding: '4px 8px', borderRadius: '8px', marginLeft: '10px', verticalAlign: 'middle', fontWeight: '800', letterSpacing: '1px', boxShadow: '0 4px 12px var(--primary-glow)' }}>OWNER</span>}! ✨</h1>
                        <p style={{ color: 'var(--text-dim)', fontSize: '0.9rem', marginTop: '10px' }}>{profile.examYear} {profile.examMonth} A/L - {profile.district}</p>
                        <div className="countdown-container"><CountdownBox val={timeLeft.d} lbl="Days" /><CountdownBox val={timeLeft.h} lbl="Hours" /><CountdownBox val={timeLeft.m} lbl="Min" /><CountdownBox val={timeLeft.s} lbl="Sec" /></div>
                    </div>
                    <div className="stats-grid"><StatBox val={todayCount} lbl="Today" sub="අද" /><StatBox val={weekHrs} lbl="Weekly" sub="සතිය" color="#8B5CF6" /><StatBox val={monthHrs} lbl="Monthly" sub="මාසය" color="#D946EF" /><StatBox val={totalHrs} lbl="Total" sub="මුළු" color="#10B981" /></div>
                    <div className="dash-grid" style={{ marginBottom: '2rem' }}>
                        <Reveal><div className="glass card" style={{ height: '100%' }}><div className="card-header"><span className="card-title">Study Grid</span><span style={{ color: 'var(--primary)', fontWeight: '800', fontSize: '0.9rem' }}>{todayCount} / 24 hrs</span></div><div className="hour-grid">{Array.from({ length: 24 }).map((_, i) => <div key={i} className={`hour-btn ${history[viewDate]?.[i] ? 'active' : ''}`} onClick={() => toggleH(i)}>{i + 1}</div>)}</div></div></Reveal>
                        <Reveal delay={0.1}><div className="glass card"><span className="card-title">Calendar</span><input type="date" value={viewDate} onChange={e => setViewDate(e.target.value)} style={{ marginTop: '1rem' }} /><div style={{ marginTop: '1rem' }}>{[...Array(3)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); const k = getLocalISODate(d); return <div key={k} style={{ display: 'flex', alignItems: 'center', padding: '12px', background: 'var(--input-bg)', borderRadius: '12px', marginBottom: '8px' }}><span>{d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' })}</span><span style={{ color: 'var(--primary)', fontWeight: '800', marginLeft: 'auto' }}>{(Array.isArray(history[k]) ? history[k].filter(Boolean).length : 0)}h</span></div>; })}</div></div></Reveal>
                    </div>
                    <div className="marks-grid">
                        <Reveal delay={0.2}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Weekly Overview</div><ProgressChart history={history} /></div></Reveal>
                        <Reveal delay={0.3}><div className="glass card" style={{ padding: '1.5rem' }}><div className="chart-title">Activity Trend</div><TrendChart history={history} /></div></Reveal>
                    </div>
                    <div className="community-hub">
                        <Reveal delay={0.4}><div className="glass card" style={{ padding: '1.5rem' }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}><h3 style={{ margin: 0, fontFamily: 'Outfit' }}>Live Activity Hub 🌍</h3><div className="live-indicator"><div className="live-dot"></div><span>LIVE UPDATES</span></div></div><ActivityFeed /></div></Reveal>
                        <Reveal delay={0.5}><div className="glass card" style={{ padding: '1.5rem' }}><h3 style={{ marginBottom: '1.5rem', fontFamily: 'Outfit' }}>Top Districts Today 🏆</h3><DistrictLeaderboard /></div></Reveal>
                    </div>
                </div>
            );
        };

        const SubjectView = ({ subject, marks, setMarks }) => {
            const [form, setForm] = useState({ mcq: '', str: '', esy: '', date: getLocalISODate() });
            const data = marks.filter(m => m.subject === subject);
            const handleSubmit = (e) => { e.preventDefault(); const total = (parseFloat(form.mcq) || 0) + (parseFloat(form.str) || 0) + (parseFloat(form.esy) || 0); if (total > 0) setMarks([...marks, { ...form, id: Date.now(), subject, total }]); setForm({ mcq: '', str: '', esy: '', date: getLocalISODate() }); };
            const delMark = (id) => setMarks(marks.filter(m => m.id !== id));
            const peakTotal = Math.max(...data.map(m => parseFloat(m.total) || 0), 0);
            const avgTotal = data.length > 0 ? Math.round(data.reduce((a,b) => a + (parseFloat(b.total) || 0), 0) / data.length) : 0;
            const hasBreakdown = data.some(m => (parseFloat(m.mcq) || 0) > 0 || (parseFloat(m.str) || 0) > 0 || (parseFloat(m.esy) || 0) > 0);
            const avgMastery = Math.round(data.reduce((a,b)=>a+(parseFloat(b.total)||0),0)/data.length / 450 * 100 || 0);
            return (
                <div>
                    <div style={{ textAlign: 'center', marginBottom: '2.5rem' }}>
                        <div style={{ fontSize: 'clamp(3rem, 10vw, 4rem)', marginBottom: '0.5rem' }}>{SUBJECT_ICONS[subject] || '📚'}</div>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2.2rem, 8vw, 3.5rem)', fontWeight: '800', letterSpacing: '-1px' }}>{subject}</h1>
                        <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '15px' }}>
                            <div className="glass" style={{ padding: '6px 16px', borderRadius: '100px', fontSize: '0.7rem', fontWeight: '700', color: 'var(--primary)', border: '1px solid var(--primary-glow)' }}>STUDY MODULE</div>
                            <div className="glass" style={{ padding: '6px 16px', borderRadius: '100px', fontSize: '0.7rem', fontWeight: '700', color: 'var(--success)', border: '1px solid rgba(16, 185, 129, 0.2)' }}>{avgMastery}% MASTERY</div>
                        </div>
                    </div>
                    <div className="dash-grid">
                        <Reveal><div className="glass card"><span className="card-title">Add Paper Marks</span><form onSubmit={handleSubmit} style={{ marginTop: '1rem' }}><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px' }}><input type="number" placeholder="MCQ" value={form.mcq} onChange={e => setForm({ ...form, mcq: e.target.value })} /><input type="number" placeholder="STR" value={form.str} onChange={e => setForm({ ...form, str: e.target.value })} /><input type="number" placeholder="ESY" value={form.esy} onChange={e => setForm({ ...form, esy: e.target.value })} /></div><button type="submit" className="btn-primary">Add Paper ✍️</button></form></div></Reveal>
                        <Reveal delay={0.1}><div className="glass card" style={{ maxHeight: '400px', overflowY: 'auto' }}><span className="card-title">Paper History</span><div style={{ marginTop: '1rem' }}>{data.sort((a, b) => new Date(b.date) - new Date(a.date)).map(m => ( <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: 'var(--input-bg)', borderRadius: '14px', marginBottom: '8px', alignItems: 'center' }}><div><div style={{ fontWeight: '800', fontSize: '0.9rem' }}>{m.total} Marks</div><div style={{ fontSize: '0.65rem', color: 'var(--text-dim)' }}>{m.date}</div></div><div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><div style={{ fontSize: '0.65rem', color: 'var(--text-dim)', textAlign: 'right' }}>M:{m.mcq || 0} S:{m.str || 0} E:{m.esy || 0}</div><div className="delete-btn" onClick={() => delMark(m.id)}>🗑️</div></div></div> ))}{data.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-dim)', fontSize: '0.9rem', padding: '2rem' }}>No papers added yet.</div>}</div></div></Reveal>
                    </div>
                    <div className="stats-grid-3">
                        <Reveal delay={0.1}><div className="glass card" style={{ padding: '1.5rem', textAlign: 'center' }}><div style={{ fontSize: '0.65rem', fontWeight: '700', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>🏆 Peak Mark</div><div style={{ fontSize: '2rem', fontWeight: '800', fontFamily: 'Outfit', color: '#10B981' }}>{peakTotal}</div></div></Reveal>
                        <Reveal delay={0.2}><div className="glass card" style={{ padding: '1.5rem', textAlign: 'center' }}><div style={{ fontSize: '0.65rem', fontWeight: '700', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>📊 Average</div><div style={{ fontSize: '2rem', fontWeight: '800', fontFamily: 'Outfit', color: '#6366F1' }}>{avgTotal}</div></div></Reveal>
                        <Reveal delay={0.3}><div className="glass card" style={{ padding: '1.5rem', textAlign: 'center' }}><div style={{ fontSize: '0.65rem', fontWeight: '700', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>📝 Papers</div><div style={{ fontSize: '2rem', fontWeight: '800', fontFamily: 'Outfit', color: '#F59E0B' }}>{data.length}</div></div></Reveal>
                    </div>
                    {data.length > 0 && hasBreakdown && (
                        <Reveal delay={0.35}>
                            <div className="glass card" style={{ padding: '1.5rem', marginBottom: '2rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <div>
                                        <div style={{ fontWeight: '800', fontSize: '1rem', fontFamily: 'Outfit', color: 'var(--text-main)' }}>Skill Radar 🕷️</div>
                                        <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)', marginTop: '4px' }}>Latest Paper vs All-Time Average</div>
                                    </div>
                                    <div className="glass" style={{ padding: '4px 12px', borderRadius: '100px', fontSize: '0.65rem', fontWeight: '700', color: '#8B5CF6', border: '1px solid rgba(139, 92, 246, 0.2)' }}>{data.length} PAPERS</div>
                                </div>
                                <RadarChart data={data} />
                            </div>
                        </Reveal>
                    )}
                    <div className="marks-grid">
                        <Reveal delay={0.4}><MarkChart title="MCQ Score" data={data} field="mcq" color="#3B82F6" /></Reveal>
                        <Reveal delay={0.5}><MarkChart title="Structured Score" data={data} field="str" color="#8B5CF6" /></Reveal>
                        <Reveal delay={0.6}><MarkChart title="Essay Score" data={data} field="esy" color="#F43F5E" /></Reveal>
                        <Reveal delay={0.7}><MarkChart title="Total Score" data={data} field="total" color="#10B981" /></Reveal>
                    </div>
                </div>
            );
        };

        const FeedbackSlider = ({ feedbacks }) => {
            const [idx, setIdx] = useState(0);
            const [visible, setVisible] = useState(true);
            useEffect(() => {
                if (feedbacks.length === 0) return;
                const timer = setInterval(() => { setVisible(false); setTimeout(() => { setIdx(prev => (prev + 1) % feedbacks.length); setVisible(true); }, 500); }, 3500);
                return () => clearInterval(timer);
            }, [feedbacks.length]);
            if (feedbacks.length === 0) return null;
            const fb = feedbacks[idx];
            return ( <div className="fb-slider-wrapper"><div className={`fb-slide-card glass ${visible ? 'visible' : 'hidden'}`}><div style={{ color: '#F59E0B', fontSize: '1.6rem', letterSpacing: '4px', marginBottom: '0.8rem' }}>{'★'.repeat(fb.rating)}{'☆'.repeat(5 - fb.rating)}</div><p style={{ fontSize: '1.05rem', fontWeight: '600', color: 'var(--text-main)', marginBottom: '0.5rem', lineHeight: '1.5' }}>"{fb.text}"</p><p style={{ fontSize: '0.8rem', color: 'var(--text-dim)', fontWeight: '700', letterSpacing: '1px', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px' }}>— {fb.name} {fb.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', textTransform: 'uppercase' }}>OWNER</span>}</p></div><div className="fb-dots">{feedbacks.map((_, i) => ( <div key={i} className={`fb-dot ${i === idx ? 'active' : ''}`} onClick={() => { setVisible(false); setTimeout(() => { setIdx(i); setVisible(true); }, 400); }} /> ))}</div></div> );
        };

        const FeedbackView = ({ profile }) => {
            const [rating, setRating] = useState(0);
            const [hover, setHover] = useState(0);
            const [msg, setMsg] = useState('');
            const [status, setStatus] = useState('');

xt-main)', marginTop: '10px' }} onClick={() => setStep(2)}>⬅️ Back</button></div> )}

                    const fetchTotalUsers = async () => {
                        try {
                            const { count, error } = await sb.from('study_tracker_v2').select('*', { count: 'exact', head: true });
                            if (!error && count !== null) setTotalRegistered(count);
                        } catch (e) { console.error("Fetch Total Error:", e); }
                    };
                    fetchTotalUsers();

                    const channel = sb.channel('global-realtime')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                            fetchMarked();
                            fetchTotalUsers();
                        })
                        .subscribe();

                    const inv = setInterval(() => { fetchMarked(); fetchTotalUsers(); }, 10000);
                    return () => {
                        clearInterval(inv);
                        sb.removeChannel(channel);
                    };
                }
            }, [user]);

            useEffect(() => {
                const fetchAnnouncement = async () => {
                    const { data } = await sb.from('study_tracker_v2').select('history').eq('name', 'Bimsath Walpola').maybeSingle();
                    if (data && data.history?.msg) {
                        const msg = data.history.msg;
                        setAnnouncement(msg);
                        setAnnouncementInput(msg);
                        const lastSeen = localStorage.getItem('lastSeenAnnounce');
                        if (msg && msg !== lastSeen) {
                            setShowAnnounceModal(true);
                        }
                    }
                };
                fetchAnnouncement();
                const inv = setInterval(fetchAnnouncement, 60000);
                return () => clearInterval(inv);
            }, []);

            const updateAnnouncement = async () => {
                if (!user) return;
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile?.name || 'Bimsath Walpola', 
                    district: profile?.district || 'Colombo', 
                    history: { ...history, msg: announcementInput },
                    subjects: profile?.subjects || [],
                    exam_year: profile?.examYear || 2026,
                    exam_month: profile?.examMonth || 'August'
                });
                if (!error) {
                    setAnnouncement(announcementInput);
                    alert('Broadcast updated successfully! ✅');
                } else {
                    alert('Error updating broadcast: ' + error.message);
                }
            };

            const fetchUserData = async (uid) => {
                try {
                    const { data, error } = await sb.from('study_tracker_v2').select('*').eq('user_id', uid).single();
                    if (data) {
                        setProfile({ 
                            name: data.name, 
                            district: data.district, 
                            subjects: data.subjects, 
                            examYear: data.exam_year, 
                            examMonth: data.exam_month,
                            examLevel: data.exam_level || 'A/L'
                        });
                        setHistory(data.history || {});
                        setMarks(data.marks || []);
                    }
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handleLogin = async () => { await sb.auth.signInWithOAuth({ provider: 'google' }); };
            const handleLogout = async () => { await sb.auth.signOut(); window.location.reload(); };

            const saveProfile = async (p) => {
                setLoading(true);
                const payload = {
                    user_id: user.id,
                    name: p.name,
                    district: p.district,
                    subjects: p.subjects,
                    exam_year: p.examYear,
                    exam_month: p.examMonth,
                    exam_level: p.examLevel,
                    history: { ...history, last_updated: new Date().toISOString() },
                    marks: marks
                };
                const { error } = await sb.from('study_tracker_v2').upsert(payload);
                if (error) { console.error("Save Error:", error); alert("Error saving profile: " + error.message); }
                else { setProfile(p); setIsEditMode(false); setCurrentPage('dashboard'); }
                setLoading(false);
            };

            const pushData = async (h, m) => {
                if (!user || !profile) return;
                const historyWithTimestamp = { ...h, last_updated: new Date().toISOString() };
                console.log("Pushing data to Supabase...", historyWithTimestamp);
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile.name, district: profile.district, subjects: profile.subjects,
                    exam_year: profile.examYear, exam_month: profile.examMonth, exam_level: profile.examLevel, 
                    history: historyWithTimestamp, marks: m 
                });
                if (error) console.error("Push Error:", error);
                else console.log("Data pushed successfully! ✅");
            };

            useEffect(() => {
                if (!profile) return;
                const monthIdx = MONTHS.indexOf(profile.examMonth);
                const target = new Date(profile.examYear, monthIdx, 1);
                const timer = setInterval(() => {
                    const diff = target - new Date();
                    if (diff > 0) setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                    else setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                }, 1000);
                return () => clearInterval(timer);
            }, [profile]);

            if (loading) return <LoadingScreen />;
            if (!user) return <LandingPage onLogin={handleLogin} deferredPrompt={deferredPrompt} onInstall={handleInstallApp} />;
            if (!profile || isEditMode) return <SetupWizard onComplete={saveProfile} initialData={profile} onCancel={() => setIsEditMode(false)} />;

            return (
                <div>
                    <div className="live-bg"><div className="blob blob-1"></div><div className="blob blob-2"></div></div>
                    <SubjectBackground subject={currentPage} />

                    <nav className="navbar">
                        <div className="nav-container">
                            <div className="nav-brand" onClick={() => setCurrentPage('dashboard')} style={{ cursor: 'pointer' }}>
                                <div className="nav-logo">LB</div>
                                <span className="nav-tracker">Tracker</span>
                                <div className="live-indicator registered-badge" style={{ cursor: 'default', background: 'rgba(245, 158, 11, 0.1)', border: '1px solid rgba(245, 158, 11, 0.2)', color: '#F59E0B', marginLeft: '10px' }}>
                                    <div className="live-dot" style={{ background: '#F59E0B', boxShadow: '0 0 8px #F59E0B' }}></div>
                                    <span>{totalRegistered} <span className="reg-label">REGISTERED</span></span>
                                </div>
                                {user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase() && (
                                    <div style={{ display: 'flex', gap: '5px' }}>
                                        <div className="live-indicator" onClick={() => setAdminView('live')} style={{ cursor: 'pointer' }}>
                                            <div className="live-dot"></div>
                                            <span>{liveUsers} LIVE</span>
                                        </div>
                                        <div className="live-indicator" onClick={() => setAdminView('marked')} style={{ cursor: 'pointer', background: 'rgba(99, 102, 241, 0.1)', border: '1px solid rgba(99, 102, 241, 0.2)', color: 'var(--primary)' }}>
                                            <div className="live-dot" style={{ background: 'var(--primary)', boxShadow: '0 0 8px var(--primary)' }}></div>
                                            <span>{markedToday} MARKED</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="nav-links">
                                <div className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</div>
                                <div className={`nav-link ${currentPage === 'subjects' || profile.subjects.includes(currentPage) ? 'active' : ''}`} onClick={() => setCurrentPage('subjects')}>Subjects</div>
                                <div className={`nav-link ${currentPage === 'timer' ? 'active' : ''}`} onClick={() => setCurrentPage('timer')}>Timer</div>
                                <div className={`nav-link ${currentPage === 'feedback' ? 'active' : ''}`} onClick={() => setCurrentPage('feedback')}>Feedback</div>
                                <a href="https://t.me/+iC6s-QtB3gI5N2U1" target="_blank" rel="noopener noreferrer" className="nav-join">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
                                    Join us
                                </a>
                            </div>
                        </div>
                    </nav>

                    <div className="floating-settings" onClick={() => setIsSettingsOpen(!isSettingsOpen)}>{isSettingsOpen ? '✕' : '⚙️'}</div>
                    {isSettingsOpen && (
                        <div className="glass settings-menu">
                            <div style={{ fontSize: '0.75rem', marginBottom: '15px', color: 'var(--text-dim)', textAlign: 'center' }}>{user.email}</div>
                            {deferredPrompt && (
                                <button className="btn-primary" style={{ marginBottom: '10px', background: '#10B981', color: 'white', border: 'none', boxShadow: '0 8px 20px rgba(16, 185, 129, 0.3)' }} onClick={handleInstallApp}>
                                    📱 Install App
                                </button>
                            )}
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--primary-glow)', color: 'var(--text-main)', border: '1px solid var(--primary)' }} onClick={() => { setCurrentPage('tutorial'); setIsSettingsOpen(false); }}>
                                📖 How to Use
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--input-bg)', color: 'var(--text-main)', border: '1px solid var(--border)' }} onClick={async () => {
                                const permission = await Notification.requestPermission();
                                if (permission === 'granted') {
                                    new Notification("LB Tracker 🚀", { body: "Reminders enabled! We'll remind you to log your hours.", icon: "lb-icon-192.png" });
                                } else {
                                    alert("Please enable notifications in your browser settings.");
                                }
                            }}>
                                🔔 Enable Reminders
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--input-bg)', color: 'var(--text-main)', border: '1px solid var(--border)' }} onClick={() => setIsLightMode(!isLightMode)}>
                                {isLightMode ? '🌙 Dark Mode' : '☀️ Light Mode'}
                            </button>
                            <button className="btn-primary" style={{ marginBottom: '10px' }} onClick={() => { setIsEditMode(true); setIsSettingsOpen(false); }}>👤 Edit Profile</button>
                            <button className="btn-primary" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', border: '1px solid rgba(239, 68, 68, 0.2)' }} onClick={handleLogout}>🚪 Logout</button>
                        </div>
                    )}


                    <nav className="mobile-nav">
                        <MobileItem active={currentPage === 'dashboard'} icon="🏠" label="Home" onClick={() => setCurrentPage('dashboard')} />
                        <MobileItem active={currentPage === 'subjects' || profile.subjects.includes(currentPage)} icon="📚" label="Subjects" onClick={() => setCurrentPage('subjects')} />
                        <MobileItem active={currentPage === 'timer'} icon="⏳" label="Timer" onClick={() => setCurrentPage('timer')} />
                        <MobileItem active={currentPage === 'feedback'} icon="⭐" label="Rate" onClick={() => setCurrentPage('feedback')} />
                        <div className="mobile-item tg-item" onClick={() => window.open('https://t.me/+iC6s-QtB3gI5N2U1', '_blank')}>
                            <span className="m-icon">✈️</span>
                            <span className="m-label">Join</span>
                        </div>
                    </nav>

                    {adminView && (
                        <div className="admin-modal-overlay" onClick={() => setAdminView(null)}>
                            <div className="admin-modal glass" onClick={e => e.stopPropagation()}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem' }}>
                                    <h2 style={{ fontFamily: 'Outfit', margin: 0 }}>Admin Controls</h2>
                                    <button onClick={() => setAdminView(null)} style={{ background: 'none', border: 'none', color: 'white', fontSize: '1.5rem', cursor: 'pointer' }}>✕</button>
                                </div>

                                <div className="glass" style={{ padding: '1.2rem', marginBottom: '1.5rem', background: 'rgba(99, 102, 241, 0.05)', border: '1px solid var(--primary-glow)', borderRadius: '18px' }}>
                                    <div style={{ fontWeight: '800', fontSize: '0.8rem', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <span>📢</span> BROADCAST MESSAGE
                                    </div>
                                    <textarea 
                                        value={announcementInput}
                                        onChange={e => setAnnouncementInput(e.target.value)}
                                        placeholder="Type a message to all students..."
                                        style={{ width: '100%', minHeight: '80px', background: 'var(--input-bg)', border: '1px solid var(--border)', borderRadius: '12px', padding: '10px', color: 'white', fontSize: '0.85rem', marginBottom: '10px', outline: 'none' }}
                                    />
                                    <button className="btn-primary" onClick={updateAnnouncement} style={{ height: '40px', fontSize: '0.8rem' }}>Update Broadcast</button>
                                </div>
                                
                                <h4 style={{ fontSize: '0.9rem', marginBottom: '1rem', opacity: 0.8 }}>{adminView === 'live' ? 'Online Students' : 'Today\'s Progress'}</h4>
                                
                                {adminView === 'live' ? (
                                    <div>
                                        {liveDetails.length === 0 ? <p>No one online</p> : 
                                            liveDetails.map((u, i) => (
                                                <div key={i} className="admin-list-item">
                                                    <div>
                                                        <div style={{ fontWeight: '700' }}>
                                                            {u.name}
                                                            {u.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', marginLeft: '5px', verticalAlign: 'middle' }}>OWNER</span>}
                                                        </div>
                                                        <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{u.email}</div>
                                                    </div>
                                                    <div className="live-dot"></div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                ) : (
                                    <div>
                                        {markedDetails.length === 0 ? <p>No one marked today</p> : 
                                            markedDetails.map((u, i) => (
                                                <div key={i} className="admin-list-item">
                                                    <div>
                                                        <div style={{ fontWeight: '700' }}>
                                                            {u.name}
                                                            {u.name === 'Bimsath Walpola' && <span style={{ fontSize: '0.5rem', background: 'var(--primary)', color: 'white', padding: '2px 4px', borderRadius: '4px', marginLeft: '5px', verticalAlign: 'middle' }}>OWNER</span>}
                                                        </div>
                                                        <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{u.district}</div>
                                                    </div>
                                                    <div style={{ fontWeight: '800', color: 'var(--primary)' }}>{u.hours} hrs</div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <main className="main-content">
                        <div className="container">
                            {currentPage === 'dashboard' ? (
                                <DashboardView profile={profile} history={history} setHistory={h => { setHistory(h); pushData(h, marks); }} viewDate={viewDate} setViewDate={setViewDate} timeLeft={timeLeft} liveUsers={liveUsers} markedToday={markedToday} announcement={announcement} showAnnounceModal={showAnnounceModal} setShowAnnounceModal={setShowAnnounceModal} />
                            ) : currentPage === 'subjects' ? (
                                <SubjectsGridView subjects={profile.subjects} onSelect={s => setCurrentPage(s)} marks={marks} />
                            ) : currentPage === 'timer' ? (
                                <div style={{ maxWidth: '600px', margin: '0 auto', display: 'flex', alignItems: 'center', minHeight: '65vh' }}>
                                    <Reveal><FocusTimer /></Reveal>
                                </div>
                            ) : currentPage === 'feedback' ? (
                                <FeedbackView profile={profile} />
                            ) : currentPage === 'tutorial' ? (
                                <TutorialView />
                            ) : (
                                <SubjectView subject={currentPage} marks={marks} setMarks={m => { setMarks(m); pushData(history, m); }} />
                            )}
                        </div>
                        <footer style={{ textAlign: 'center', padding: '4rem 1rem 3rem', color: 'var(--text-dim)', fontSize: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase', opacity: 0.5, fontWeight: '800' }}>
                            © 2026 LB Tracker • Developed by BIMSATH WALPOLA
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    </script>
</body>
</html>
