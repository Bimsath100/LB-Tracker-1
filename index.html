                                                    <a href={post.file_url} download style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px', color: isMe ? 'white' : 'var(--primary)', textDecoration: 'none', fontWeight: '800', fontSize: '0.8rem', background: 'rgba(255,255,255,0.1)', padding: '8px 12px', borderRadius: '10px' }}>
                                                        📄 DOCUMENT
                                                    </a>
                                                )}
                                                
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '6px', gap: '10px' }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '3px', opacity: 0.6, fontSize: '0.55rem' }}>
                                                        👁️ {viewCount}
                                                    </div>
                                                    <div style={{ fontSize: '0.55rem', opacity: 0.6 }}>{new Date(post.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                                                </div>
                                            </div>
                                            
                                            {!post.isTemp && (
                                                <div className="chat-bubble-actions">
                                                    <button onClick={() => deleteForMe(post.id)} title="Delete for me">🙈</button>
                                                    {isMe && <button onClick={() => deleteForEveryone(post.id)} title="Delete for everyone">🗑️</button>}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </Reveal>
                            );
                        })}
                    </div>

                    <div style={{ padding: '1rem', borderTop: '1px solid var(--border)', background: 'var(--card-bg)' }}>
                        <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                            <label style={{ cursor: 'pointer', fontSize: '1.2rem', padding: '10px', background: 'var(--input-bg)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                                📎
                                <input type="file" hidden onChange={e => { setFile(e.target.files[0]); if(e.target.files[0]) alert('File attached: ' + e.target.files[0].name); }} />
                            </label>
                            <input 
                                className="glass-input" 
                                placeholder="Type a message..." 
                                value={content} 
                                onChange={e => setContent(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && handlePost()}
                                style={{ flex: 1, marginBottom: 0, height: '45px' }}
                            />
                            <button className="hour-btn active" onClick={handlePost} disabled={uploading} style={{ width: '45px', height: '45px', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                {uploading ? '...' : '✈️'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CommunityView = ({ history, marks, streak, globalLeaders, profile, liveUsers }) => {
            return (
                <div style={{ animation: 'fadeIn 0.5s ease-out', maxWidth: '1200px', margin: '0 auto' }}>
                    <div style={{ textAlign: 'center', marginBottom: '3rem' }}>
                        <div style={{ fontSize: '3.5rem', marginBottom: '1rem' }}>🌍</div>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2.5rem, 8vw, 3.5rem)', fontWeight: '800' }}>Global Community</h1>
                        <p style={{ color: 'var(--text-dim)', fontSize: '1.1rem' }}>Connect, share resources, and excel together.</p>
                    </div>

                    <div className="asymmetric-grid">
                        <div style={{ gridColumn: 'span 8' }}>
                            <CommunityHub profile={profile} liveUsers={liveUsers} />
                        </div>
                        <div style={{ gridColumn: 'span 4' }}>
                            <Reveal delay={0.1}>
                                <div className="glass card" style={{ padding: '1.5rem', marginBottom: '1.5rem' }}>
                                    <h3 style={{ margin: 0, fontFamily: 'Outfit', marginBottom: '1.5rem' }}>Top Scholars 🏆</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                        {globalLeaders.slice(0, 10).map((l, i) => (
                                            <div key={i} style={{ display: 'flex', alignItems: 'center', background: 'var(--input-bg)', padding: '10px 15px', borderRadius: '12px' }}>
                                                <div style={{ fontSize: '1.2rem', marginRight: '15px', width: '25px', textAlign: 'center' }}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</div>
                                                <div>
                                                    <div style={{ fontWeight: '800', color: 'var(--text-main)', fontSize: '0.9rem' }}>{l.name}</div>
                                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{l.district}</div>
                                                </div>
                                                <div style={{ marginLeft: 'auto', fontWeight: '800', color: 'var(--primary)', fontSize: '1rem' }}>{l.hrs}h</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Reveal>
                            <Reveal delay={0.2}><BadgesView history={history} marks={marks} streak={streak} /></Reveal>
                        </div>
                    </div>
                </div>
            );
        };

        const SubjectView = ({ subject, marks, setMarks }) => {
            const [form, setForm] = useState({ mcq: '', str: '', esy: '', date: getLocalISODate() });
            const data = marks.filter(m => m.subject === subject);
            const handleSubmit = (e) => { e.preventDefault(); const total = (parseFloat(form.mcq) || 0) + (parseFloat(form.str) || 0) + (parseFloat(form.esy) || 0); if (total > 0) setMarks([...marks, { ...form, id: Date.now(), subject, total }]); setForm({ mcq: '', str: '', esy: '', date: getLocalISODate() }); };
            const delMark = (id) => setMarks(marks.filter(m => m.id !== id));
            const peakTotal = Math.max(...data.map(m => parseFloat(m.total) || 0), 0);
            const avgTotal = data.length > 0 ? Math.round(data.reduce((a,b) => a + (parseFloat(b.total) || 0), 0) / data.length) : 0;
            const hasBreakdown = data.some(m => (parseFloat(m.mcq) || 0) > 0 || (parseFloat(m.str) || 0) > 0 || (parseFloat(m.esy) || 0) > 0);
            const avgMastery = Math.round(data.reduce((a,b)=>a+(parseFloat(b.total)||0),0)/data.length / 450 * 100 || 0);
            return (
                <div>
                    <div style={{ textAlign: 'center', marginBottom: '2.5rem' }}>
                        <div style={{ fontSize: 'clamp(3rem, 10vw, 4rem)', marginBottom: '0.5rem' }}>{SUBJECT_ICONS[subject] || '📚'}</div>
                        <h1 style={{ fontFamily: 'Outfit', fontSize: 'clamp(2.2rem, 8vw, 3.5rem)', fontWeight: '800', letterSpacing: '-1px' }}>{subject}</h1>
                        <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '15px' }}>
                            <div className="glass" style={{ padding: '6px 16px', borderRadius: '100px', fontSize: '0.7rem', fontWeight: '700', color: 'var(--primary)', border: '1px solid var(--primary-glow)' }}>STUDY MODULE</div>
                            <div className="glass" style={{ padding: '6px 16px', borderRadius: '100px', fontSize: '0.7rem', fontWeight: '700', color: 'var(--success)', border: '1px solid rgba(16, 185, 129, 0.2)' }}>{avgMastery}% MASTERY</div>
                        </div>
                    </div>

        const LandingPage = ({ onLogin, deferredPrompt, onInstall }) => (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '2rem', background: 'var(--bg)', position: 'relative', overflow: 'hidden' }}>
                <div className="live-bg">
                    <div className="blob blob-1"></div>
                    <div className="blob blob-2" style={{ animationDelay: '-10s' }}></div>
                </div>
                
                <Reveal>
                    <div className="sidebar-logo" style={{ width: '80px', height: '80px', fontSize: '1.8rem', margin: '0 auto 2.5rem', borderRadius: '20px', boxShadow: '0 10px 40px var(--primary-glow)' }}>LB</div>

xt-main)', marginTop: '10px' }} onClick={() => setStep(2)}>⬅️ Back</button></div> )}

                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ fontSize: '1rem' }}>{mode === 'focus' ? '⚡' : '☕'}</span>
                        <div style={{ fontFamily: 'Outfit', fontWeight: '900', fontSize: '1.2rem', color: 'var(--text-main)', width: '60px' }}>
                            {m}:{s}
                        </div>
                    </div>
                    <div style={{ width: '1px', height: '20px', background: 'var(--border)' }}></div>
                    <div style={{ display: 'flex', gap: '8px' }}>
                        <button onClick={toggleTimer} className="timer-mini-btn" style={{ background: themeColor }}>
                            {isActive ? '⏸' : '▶'}
                        </button>
                        <button onClick={resetTimer} className="timer-mini-btn" style={{ background: 'var(--input-bg)', color: 'var(--text-dim)', border: '1px solid var(--border)' }}>
                            🔄
                        </button>
                    </div>
                </div>
            );
        };


        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [viewDate, setViewDate] = useState(getLocalISODate());
            const [history, setHistory] = useState({});
            const [marks, setMarks] = useState([]);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [isLightMode, setIsLightMode] = useState(() => localStorage.getItem('theme') === 'light');
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [liveUsers, setLiveUsers] = useState(1);
            const [markedToday, setMarkedToday] = useState(0);
            const [announcement, setAnnouncement] = useState('');
            const [announcementInput, setAnnouncementInput] = useState('');
            const [showAnnounceModal, setShowAnnounceModal] = useState(false);
            const [adminView, setAdminView] = useState(null); // 'live' or 'marked'
            const [liveDetails, setLiveDetails] = useState([]);
            const [markedDetails, setMarkedDetails] = useState([]);
            const [totalRegistered, setTotalRegistered] = useState(0);
            const [globalLeaders, setGlobalLeaders] = useState([]);
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [unreadPosts, setUnreadPosts] = useState(0);

            // Global Timer State
            const [timerFocus, setTimerFocus] = useState(() => parseInt(localStorage.getItem('timer_focus')) || 25);
            const [timerBreak, setTimerBreak] = useState(() => parseInt(localStorage.getItem('timer_break')) || 5);
            const [timerMode, setTimerMode] = useState('focus');
            const [timerTimeLeft, setTimerTimeLeft] = useState(timerFocus * 60);
            const [timerIsActive, setTimerIsActive] = useState(false);

            useEffect(() => {
                let interval = null;
                if (timerIsActive && timerTimeLeft > 0) {
                    interval = setInterval(() => setTimerTimeLeft(t => t - 1), 1000);
                } else if (timerIsActive && timerTimeLeft === 0) {
                    const nextMode = timerMode === 'focus' ? 'break' : 'focus';
                    const nextTime = nextMode === 'focus' ? timerFocus : timerBreak;
                    setTimerMode(nextMode);
                    setTimerTimeLeft(nextTime * 60);
                    setTimerIsActive(false);
                    if (Notification.permission === 'granted') {
                        new Notification("Time's up! ⏰", { body: timerMode === 'focus' ? `Take a ${timerBreak}-minute break!` : "Back to focus mode!" });
                    }
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                    audio.play().catch(e => console.log("Audio play failed"));
                }
                return () => clearInterval(interval);
            }, [timerIsActive, timerTimeLeft, timerMode, timerFocus, timerBreak]);

            const timerProps = {
                timeLeft: timerTimeLeft,
                isActive: timerIsActive,
                mode: timerMode,
                focusTime: timerFocus,
                breakTime: timerBreak,
                toggleTimer: () => setTimerIsActive(!timerIsActive),
                resetTimer: () => {
                    setTimerIsActive(false);
                    setTimerTimeLeft((timerMode === 'focus' ? timerFocus : timerBreak) * 60);
                },
                switchMode: (m) => {
                    setTimerIsActive(false);
                    setTimerMode(m);
                    setTimerTimeLeft((m === 'focus' ? timerFocus : timerBreak) * 60);
                },
                saveSettings: (f, b) => {
                    const newF = Math.max(1, Math.min(120, parseInt(f) || 25));
                    const newB = Math.max(1, Math.min(60, parseInt(b) || 5));
                    setTimerFocus(newF);
                    setTimerBreak(newB);
                    localStorage.setItem('timer_focus', newF);
                    localStorage.setItem('timer_break', newB);
                    if (!timerIsActive) setTimerTimeLeft((timerMode === 'focus' ? newF : newB) * 60);
                }
            };


            const isAL = profile?.examLevel === 'A/L' || !profile?.examLevel;

            useEffect(() => {
                const handleBeforeInstall = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);
                if (window.deferredPrompt) setDeferredPrompt(window.deferredPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            useEffect(() => {
                document.body.classList.toggle('light-mode', isLightMode);
                localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
            }, [isLightMode]);

            // Live Data Synchronization
            useEffect(() => {
                if (!user) return;
                console.log("Setting up real-time subscription for user:", user.id);
                const sub = sb.channel(`user-sync-${user.id}`)
                    .on('postgres_changes', { 
                        event: 'UPDATE', 
                        schema: 'public', 
                        table: 'study_tracker_v2', 
                        filter: `user_id=eq.${user.id}` 
                    }, (payload) => {
                        console.log("Live Sync: Update received!", payload.new);
                        if (payload.new.history) setHistory(payload.new.history);
                        if (payload.new.marks) setMarks(payload.new.marks);
                        
                        // Show a subtle toast if the change wasn't from this tab
                        // (We can't easily detect tab ID here without extra work, 
                        // but Supabase usually sends updates back to the sender too)
                    })
                    .subscribe();
                return () => sb.removeChannel(sub);
            }, [user]);

            useEffect(() => {
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) { 
                        setUser(session.user); 
                        fetchUserData(session.user.id); 
                    } else { 
                        setLoading(false); 
                    }
                }).catch(err => {
                    console.error("Auth Error:", err);
                    setLoading(false);
                });

                const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
                    if (session) { 
                        setUser(session.user); 
                        fetchUserData(session.user.id); 
                    } else { 
                        setUser(null); 
                        setProfile(null); 
                        setLoading(false); 
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                const channel = sb.channel('online-users', {
                    config: { presence: { key: user?.id || Math.random().toString(36).substring(7) } }
                });

                channel
                    .on('presence', { event: 'sync' }, () => {
                        const newState = channel.presenceState();
                        const allProfiles = Object.values(newState).flat();
                        const uniqueMap = new Map();
                        allProfiles.forEach(p => {
                            const key = p.email || p.name;
                            if (!uniqueMap.has(key) || (p.name !== 'Guest' && uniqueMap.get(key).name === 'Guest')) {
                                uniqueMap.set(key, { name: p.name || 'Guest Visitor', email: p.email });
                            }
                        });
                        const details = Array.from(uniqueMap.values());
                        setLiveDetails(details);
                        setLiveUsers(details.length > 0 ? details.length : 1);
                    })
                    .subscribe(async (status) => {
                        if (status === 'SUBSCRIBED') {
                            await channel.track({ 
                                name: profile?.name || 'Guest', 
                                email: user?.email,
                                online_at: new Date().toISOString() 
                            });
                        }
                    });

                return () => { channel.unsubscribe(); };
            }, [user, profile?.name]);

            useEffect(() => {
                const isAdmin = user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                if (!isAdmin) {
                    const handleContextMenu = (e) => e.preventDefault();
                    const handleKeyDown = (e) => {
                        if (
                            e.keyCode === 123 || // F12
                            (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
                            (e.ctrlKey && e.keyCode === 85) // Ctrl+U
                        ) {
                            e.preventDefault();
                            return false;
                        }
                    };
                    document.addEventListener('contextmenu', handleContextMenu);
                    document.addEventListener('keydown', handleKeyDown);
                    return () => {
                        document.removeEventListener('contextmenu', handleContextMenu);
                        document.removeEventListener('keydown', handleKeyDown);
                    };
                }
            }, [user]);

            useEffect(() => {
                if (user) {
                    const fetchMarked = async () => {
                        try {
                            const today = getLocalISODate();
                            const { data, error } = await sb.from('study_tracker_v2')
                                .select('name, district, history')
                                .not(`history->${today}`, 'is', null)
                                .order('history->last_updated', { ascending: false })
                                .limit(100);
                            if (!error && data) {
                                // Only count users who have actually marked at least one hour
                                const actualMarked = data.filter(d => (d.history && Array.isArray(d.history[today]) && d.history[today].some(h => h === true)));
                                setMarkedToday(actualMarked.length);
                                
                                if (user.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                                    const details = actualMarked.map(d => ({ 
                                        name: d.name || 'Unknown', 
                                        district: d.district || 'N/A', 
                                        hours: d.history[today].filter(Boolean).length 
                                    })).sort((a, b) => b.hours - a.hours);
                                    setMarkedDetails(details);
                                }
                            }
                        } catch (e) {
                            console.error("Fetch Marked Error:", e);
                        }
                    };
                    fetchMarked();

                    const fetchTotalUsers = async () => {
                        try {
                            const { count, error } = await sb.from('study_tracker_v2').select('*', { count: 'exact', head: true });
                            if (!error && count !== null) setTotalRegistered(count);

                            // Fetch global leaders (all time top 10)
                            const { data: leadData } = await sb.from('study_tracker_v2').select('name, district, history').limit(1000);
                            if (leadData) {
                                const scored = leadData.map(u => {
                                    let hrs = 0;
                                    if(u.history) {
                                        Object.keys(u.history).forEach(k => {
                                            if (k.includes('-') && Array.isArray(u.history[k])) {
                                                hrs += u.history[k].filter(Boolean).length;
                                            }
                                        });
                                    }
                                    return { name: u.name, district: u.district, hrs };
                                }).filter(u => u.hrs > 0).sort((a,b) => b.hrs - a.hrs).slice(0, 10);
                                setGlobalLeaders(scored);
                            }
                        } catch (e) { console.error("Fetch Total Error:", e); }
                    };
                    fetchTotalUsers();

                    const channel = sb.channel('global-realtime')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'study_tracker_v2' }, () => {
                            fetchMarked();
                            fetchTotalUsers();
                        })
                        .subscribe();

                    const inv = setInterval(() => { fetchMarked(); fetchTotalUsers(); }, 10000);
                    return () => {
                        clearInterval(inv);
                        sb.removeChannel(channel);
                    };
                }
            }, [user]);
            useEffect(() => {
                if (!user) return;
                const channel = sb.channel('posts-notifier')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'community_posts' }, (payload) => {
                        if (currentPage !== 'community') {
                            setUnreadPosts(prev => prev + 1);
                            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play(); } catch(e) {}
                            document.title = `(New) Community Hub | LB Tracker`;
                        }
                    })
                    .subscribe();
                return () => sb.removeChannel(channel);
            }, [user, currentPage]);

            useEffect(() => {
                if (currentPage === 'community') {
                    setUnreadPosts(0);
                    document.title = 'Elite Onyx | LB Tracker';
                }
            }, [currentPage]);

            useEffect(() => {
                const fetchAnnouncement = async () => {
                    const { data } = await sb.from('study_tracker_v2').select('history').eq('name', 'Bimsath Walpola').maybeSingle();
                    if (data && data.history?.msg) {
                        const msg = data.history.msg;
                        setAnnouncement(msg);
                        setAnnouncementInput(msg);
                        const lastSeen = localStorage.getItem('lastSeenAnnounce');
                        if (msg && msg !== lastSeen) {
                            setShowAnnounceModal(true);
                        }
                    }
                };
                fetchAnnouncement();
                const inv = setInterval(fetchAnnouncement, 60000);
                return () => clearInterval(inv);
            }, []);

            const updateAnnouncement = async () => {
                if (!user) return;
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile?.name || 'Bimsath Walpola', 
                    district: profile?.district || 'Colombo', 
                    history: { ...history, msg: announcementInput },
                    subjects: profile?.subjects || [],
                    exam_year: profile?.examYear || 2026,
                    exam_month: profile?.examMonth || 'August'
                });
                if (!error) {
                    setAnnouncement(announcementInput);
                    alert('Broadcast updated successfully! ✅');
                } else {
                    alert('Error updating broadcast: ' + error.message);
                }
            };

            const fetchUserData = async (uid) => {
                try {
                    const { data, error } = await sb.from('study_tracker_v2').select('*').eq('user_id', uid).single();
                    if (data) {
                        setProfile({ 
                            id: uid, // Include the ID here
                            name: data.name, 
                            district: data.district, 
                            subjects: data.subjects, 
                            examYear: data.exam_year, 
                            examMonth: data.exam_month,
                            examLevel: data.exam_level || 'A/L'
                        });
                        setHistory(data.history || {});
                        setMarks(data.marks || []);
                    }
                } catch (e) { console.error("Fetch Error:", e); }
                setLoading(false);
            };

            const handleLogin = async () => { await sb.auth.signInWithOAuth({ provider: 'google' }); };
            const handleLogout = async () => { await sb.auth.signOut(); window.location.reload(); };

            const saveProfile = async (p) => {
                setLoading(true);
                const payload = {
                    user_id: user.id,
                    name: p.name,
                    district: p.district,
                    subjects: p.subjects,
                    exam_year: p.examYear,
                    exam_month: p.examMonth,
                    exam_level: p.examLevel,
                    history: { ...history, last_updated: new Date().toISOString() },
                    marks: marks
                };
                const { error } = await sb.from('study_tracker_v2').upsert(payload);
                if (error) { console.error("Save Error:", error); alert("Error saving profile: " + error.message); }
                else { setProfile({ ...p, id: user.id }); setIsEditMode(false); setCurrentPage('dashboard'); }
                setLoading(false);
            };

            const pushData = async (h, m) => {
                if (!user || !profile) return;
                const historyWithTimestamp = { ...h, last_updated: new Date().toISOString() };
                console.log("Pushing data to Supabase...", historyWithTimestamp);
                const { error } = await sb.from('study_tracker_v2').upsert({ 
                    user_id: user.id, 
                    name: profile.name, district: profile.district, subjects: profile.subjects,
                    exam_year: profile.examYear, exam_month: profile.examMonth, exam_level: profile.examLevel, 
                    history: historyWithTimestamp, marks: m 
                });
                if (error) console.error("Push Error:", error);
                else console.log("Data pushed successfully! ✅");
            };

            useEffect(() => {
                if (!profile) return;
                const monthIdx = MONTHS.indexOf(profile.examMonth);
                const target = new Date(profile.examYear, monthIdx, 1);
                const timer = setInterval(() => {
                    const diff = target - new Date();
                    if (diff > 0) setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                    else setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                }, 1000);
                return () => clearInterval(timer);
            }, [profile]);

            if (loading) return <LoadingScreen />;
            if (!user) return <LandingPage onLogin={handleLogin} deferredPrompt={deferredPrompt} onInstall={handleInstallApp} />;
            if (!profile || isEditMode) return <SetupWizard onComplete={saveProfile} initialData={profile} onCancel={() => setIsEditMode(false)} />;

            return (
                <div className="app-layout">
                    <div className="live-bg"><div className="blob blob-1"></div><div className="blob blob-2"></div></div>
                    <SubjectBackground subject={currentPage} />

                    <aside className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''}`}>
                        <div className="sidebar-brand" onClick={() => setCurrentPage('dashboard')}>
                            <div className="sidebar-logo">LB</div>
                            <span style={{ color: 'var(--text-main)', textTransform: 'uppercase', letterSpacing: '1px' }}>Tracker</span>
                        </div>
                        <button className="sidebar-toggle" onClick={() => setSidebarCollapsed(c => !c)} title={sidebarCollapsed ? 'Expand' : 'Collapse'}>
                            {sidebarCollapsed ? '▶' : '◀'}
                        </button>

                        <div className="sidebar-label"><span>Main Menu</span></div>
                        <div className="nav-links">
                            <div className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>🏠 <span>Dashboard</span></div>
                            <div className={`nav-link ${currentPage === 'workspace' ? 'active' : ''}`} onClick={() => setCurrentPage('workspace')}>💻 <span>Workspace</span></div>
                            {user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase() && <div className={`nav-link ${currentPage === 'admin' ? 'active' : ''}`} onClick={() => setCurrentPage('admin')}>👑 <span>Admin Center</span></div>}
                        </div>

                        <div className="sidebar-label"><span>Tools</span></div>
                        <div className="nav-links">
                            <div className={`nav-link ${currentPage === 'subjects' || profile?.subjects?.includes(currentPage) ? 'active' : ''}`} onClick={() => setCurrentPage('subjects')}>📚 <span>Subjects</span></div>
                            <div className={`nav-link ${currentPage === 'feedback' ? 'active' : ''}`} onClick={() => setCurrentPage('feedback')}>⭐ <span>Feedback</span></div>
                        </div>

                        <a href="https://t.me/+iC6s-QtB3gI5N2U1" target="_blank" rel="noopener noreferrer" className="nav-join">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style={{minWidth:'20px'}}><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
                            <span className="nav-join-text">Join Community</span>
                        </a>
                    </aside>

                    <main className={`main-content ${sidebarCollapsed ? 'expanded' : ''}`}>
                        <header className="top-header">
                            <div className="mobile-only-brand" onClick={() => setCurrentPage('dashboard')}>
                                <div className="sidebar-logo" style={{ width: '36px', height: '36px', fontSize: '1rem' }}>LB</div>
                            </div>
                            
                            <div className="header-actions-group" style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                
                                {user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase() && (
                                    <div style={{ display: 'flex', gap: '6px', alignItems: 'center', background: 'var(--input-bg)', padding: '4px', borderRadius: '14px', border: '1px solid var(--border)' }}>
                                        <button onClick={() => setAdminView('notice')} style={{ background: 'var(--primary)', color: 'white', border: 'none', padding: '6px 10px', borderRadius: '10px', fontSize: '0.65rem', fontWeight: '800', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                                            📢 <span className="d-none-mobile">NOTICE</span>
                                        </button>
                                        <div style={{ display: 'flex', gap: '4px', padding: '0 4px' }}>
                                            <div className="live-indicator" onClick={() => setAdminView('live')} style={{ cursor: 'pointer', background: 'transparent', border: 'none', margin: 0, padding: '4px' }}>
                                                <div className="live-dot" style={{ width: '5px', height: '5px' }}></div>
                                                <span style={{ fontSize: '0.7rem', fontWeight: '800' }}>{liveUsers}</span>
                                            </div>
                                            <div className="live-indicator" onClick={() => setAdminView('marked')} style={{ cursor: 'pointer', background: 'transparent', border: 'none', color: 'var(--primary)', margin: 0, padding: '4px' }}>
                                                <div className="live-dot" style={{ width: '5px', height: '5px', background: 'var(--primary)', boxShadow: '0 0 8px var(--primary)' }}></div>
                                                <span style={{ fontSize: '0.7rem', fontWeight: '800' }}>{markedToday}</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="live-indicator registered-badge d-none-mobile" style={{ cursor: 'default', background: 'rgba(245, 158, 11, 0.1)', border: '1px solid rgba(245, 158, 11, 0.2)', color: '#F59E0B', margin: 0, padding: '6px 12px', borderRadius: '12px' }}>
                                    <span style={{ fontSize: '0.75rem', fontWeight: '800' }}>{totalRegistered} <span style={{ fontSize: '0.6rem', opacity: 0.7 }}>REG</span></span>
                                </div>
                            </div>

                            <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                <button onClick={() => setCurrentPage('tutorial')} className="header-icon-btn" title="How to Use">📖</button>
                                <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="header-icon-btn" style={{ background: isSettingsOpen ? 'var(--primary)' : 'var(--input-bg)', color: isSettingsOpen ? 'white' : 'inherit' }} title="Settings">⚙️</button>
                                <button onClick={() => setIsLightMode(!isLightMode)} className="header-icon-btn" title="Toggle Theme">{isLightMode ? '🌙' : '☀️'}</button>
                            </div>
                        </header>
                        {isSettingsOpen && (
                        <div className="glass settings-menu">
                            <div style={{ fontSize: '0.75rem', marginBottom: '15px', color: 'var(--text-dim)', textAlign: 'center' }}>{user.email}</div>
                            {deferredPrompt && (
                                <button className="btn-primary" style={{ marginBottom: '10px', background: '#10B981', color: 'white', border: 'none', boxShadow: '0 8px 20px rgba(16, 185, 129, 0.3)' }} onClick={handleInstallApp}>
                                    📱 Install App
                                </button>
                            )}
                            <button className="btn-primary" style={{ marginBottom: '10px', background: 'var(--input-bg)', color: 'var(--text-main)', border: '1px solid var(--border)' }} onClick={async () => {
                                const permission = await Notification.requestPermission();
                                if (permission === 'granted') {
                                    new Notification("LB Tracker 🚀", { body: "Reminders enabled! We'll remind you to log your hours.", icon: "lb-icon-192.png" });
                                } else {
                                    alert("Please enable notifications in your browser settings.");
                                }
                            }}>
                                🔔 Enable Reminders
                            </button>
                            

                            <button className="btn-primary" style={{ marginBottom: '10px' }} onClick={() => { setIsEditMode(true); setIsSettingsOpen(false); }}>👤 Edit Profile</button>
                            <button className="btn-primary" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', border: '1px solid rgba(239, 68, 68, 0.2)' }} onClick={handleLogout}>🚪 Logout</button>
                        </div>
                    )}


                    <nav className="mobile-nav">
                        <MobileItem active={currentPage === 'dashboard'} icon="🏠" label="Home" onClick={() => setCurrentPage('dashboard')} />
                        <MobileItem active={currentPage === 'workspace'} icon="💻" label="Work" onClick={() => setCurrentPage('workspace')} />
                        {user?.email === ADMIN_EMAIL && <MobileItem active={currentPage === 'admin'} icon="👑" label="Admin" onClick={() => setCurrentPage('admin')} />}
                        <MobileItem active={currentPage === 'feedback'} icon="⭐" label="Rate" onClick={() => setCurrentPage('feedback')} />
                    </nav>



                        <div className="container" id="mainContainer" style={{ marginTop: '2rem' }}>
                            {currentPage === 'dashboard' ? (
                                <DashboardView profile={profile} history={history} marks={marks} setHistory={h => { setHistory(h); pushData(h, marks); }} viewDate={viewDate} setViewDate={setViewDate} timeLeft={timeLeft} liveUsers={liveUsers} markedToday={markedToday} announcement={announcement} showAnnounceModal={showAnnounceModal} setShowAnnounceModal={setShowAnnounceModal} />
                            ) : currentPage === 'workspace' ? (
                                <WorkspaceView viewDate={viewDate} history={history} setHistory={h => { setHistory(h); pushData(h, marks); }} streak={(() => {
                                    let streak = 0; let curD = new Date(); let curK = getLocalISODate(curD);
                                    let todayH = Array.isArray(history[curK]) ? history[curK].filter(Boolean).length : 0;
                                    if (todayH === 0) { 
                                        curD.setDate(curD.getDate() - 1); curK = getLocalISODate(curD); 
                                        let yestH = Array.isArray(history[curK]) ? history[curK].filter(Boolean).length : 0; 
                                        if (yestH > 0) streak = 1; 
                                    } else streak = 1;
                                    if (streak > 0) {
                                        while (true) {
                                            curD.setDate(curD.getDate() - 1); let dateStr = getLocalISODate(curD);
                                            let hrs = Array.isArray(history[dateStr]) ? history[dateStr].filter(Boolean).length : 0;
                                            if (hrs > 0) streak++; else break;
                                        }
                                    } return streak;
                                })()} profile={profile} timerProps={timerProps} />
                            ) : currentPage === 'subjects' ? (
                                <SubjectsGridView subjects={profile.subjects} onSelect={s => setCurrentPage(s)} marks={marks} />
                             ) : currentPage === 'admin' ? (
                                <AdminView announcement={announcement} announcementInput={announcementInput} setAnnouncementInput={setAnnouncementInput} updateAnnouncement={updateAnnouncement} liveDetails={liveDetails} markedDetails={markedDetails} totalRegistered={totalRegistered} profile={profile} />
                             ) : currentPage === 'feedback' ? (
                                <FeedbackView profile={profile} />
                            ) : currentPage === 'tutorial' ? (
                                <TutorialView />
                            ) : (
                                <SubjectView subject={currentPage} marks={marks} setMarks={m => { setMarks(m); pushData(history, m); }} />
                            )}
                        </div>
                        <footer style={{ textAlign: 'center', padding: '4rem 1rem 3rem', color: 'var(--text-dim)', fontSize: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase', opacity: 0.5, fontWeight: '800' }}>
                            © 2026 LB Tracker • Developed by BIMSATH WALPOLA
                        </footer>
                    </main>

                    <GlobalTimerPill 
                        {...timerProps} 
                        isVisible={(timerIsActive || timerTimeLeft < (timerMode === 'focus' ? timerFocus : timerBreak) * 60) && currentPage !== 'workspace'} 
                    />

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
